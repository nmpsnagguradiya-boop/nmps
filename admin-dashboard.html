<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi-School Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#004aad;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
header h1{margin:0;font-size:24px;}
#logoutBtn{background:#f44336;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;}
.container{padding:20px;}
button{padding:10px;border:none;background:#004aad;color:white;border-radius:6px;cursor:pointer;margin:4px;}
button:hover{background:#003080;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#004aad;color:white;}
input,select{width:100%;padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:4px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:10;}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;}
</style>
</head>
<body>

<header>
<h1><i class="fas fa-school"></i> Multi-School ERP Dashboard</h1>
<button id="logoutBtn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</header>

<div class="container">

<h2>Create New School</h2>
<input id="schoolName" placeholder="School Name">
<input id="schoolAddress" placeholder="School Address">
<button onclick="createSchool()"><i class="fas fa-plus"></i> Create School</button>

<h2>Existing Schools</h2>
<table>
<thead>
<tr>
<th>School ID</th>
<th>Name</th>
<th>Address</th>
<th>Admins</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="schoolsTable"></tbody>
</table>

</div>

<!-- MODAL: CREATE ADMIN -->
<div class="modal" id="adminModal">
<div class="modal-content">
<h3>Create School Admin</h3>
<input id="adminEmail" placeholder="Admin Email">
<input id="adminPassword" placeholder="Admin Password" type="password">
<button onclick="saveAdmin()">Save Admin</button>
<button onclick="closeAdminModal()">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔹 Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let selectedSchoolId="";

// 🔹 LOGIN CHECK
onAuthStateChanged(auth,user=>{
    if(!user){ window.location.href="admin-login.html"; return; }
    loadSchools();
});

// 🔹 LOGOUT
window.logout = async()=>{
    await signOut(auth);
    location.href="admin-login.html";
}

// 🔹 CREATE SCHOOL
window.createSchool = async()=>{
    const name=document.getElementById("schoolName").value.trim();
    const address=document.getElementById("schoolAddress").value.trim();
    if(!name || !address){ alert("Enter Name & Address"); return; }

    // Auto generate school ID
    const schoolId = "SCH" + Date.now();
    await setDoc(doc(db,"schools",schoolId),{
        name,address,createdAt:new Date().toISOString()
    });
    alert("School created with ID: " + schoolId);
    document.getElementById("schoolName").value="";
    document.getElementById("schoolAddress").value="";
    loadSchools();
}

// 🔹 LOAD SCHOOLS
async function loadSchools(){
    const tbody=document.getElementById("schoolsTable");
    tbody.innerHTML="";
    const snap = await getDocs(collection(db,"schools"));
    snap.forEach(d=>{
        const data = d.data();
        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td>${d.id}</td>
        <td>${data.name}</td>
        <td>${data.address}</td>
        <td>
            <button onclick="openAdminModal('${d.id}')"><i class="fas fa-user-shield"></i> Manage Admins</button>
        </td>
        <td>
            <button onclick="deleteSchool('${d.id}')"><i class="fas fa-trash"></i></button>
        </td>
        `;
        tbody.appendChild(tr);
    });
}

// 🔹 DELETE SCHOOL
window.deleteSchool = async(schoolId)=>{
    if(confirm("Delete this school? All its data will be removed!")){
        await deleteDoc(doc(db,"schools",schoolId));
        loadSchools();
    }
}

// 🔹 ADMIN MODAL
function openAdminModal(schoolId){
    selectedSchoolId=schoolId;
    document.getElementById("adminModal").style.display="flex";
}
function closeAdminModal(){
    document.getElementById("adminModal").style.display="none";
    document.getElementById("adminEmail").value="";
    document.getElementById("adminPassword").value="";
}

// 🔹 SAVE ADMIN
window.saveAdmin = async()=>{
    const email=document.getElementById("adminEmail").value.trim();
    const password=document.getElementById("adminPassword").value.trim();
    if(!email || !password){ alert("Enter email & password"); return; }

    try{
        // Create Firebase Auth user
        const userCred = await createUserWithEmailAndPassword(auth,email,password);
        const uid = userCred.user.uid;

        // Save school admin in Firestore
        await setDoc(doc(db,"schools",selectedSchoolId,"admins",uid),{
            email,password,createdAt:new Date().toISOString()
        });

        alert("School admin created successfully!");
        closeAdminModal();
    }catch(e){
        alert("Error: " + e.message);
    }
}
</script>

</body>
</html>
