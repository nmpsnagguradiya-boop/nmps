<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#004aad;color:white;padding:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;}
button{padding:10px;border:none;background:#004aad;color:white;font-size:16px;border-radius:6px;cursor:pointer;}
button:hover{background:#003080;}
.container{padding:15px;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#004aad;color:white;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:500px;}
input{width:100%;padding:10px;margin:6px 0;}
</style>
</head>
<body>

<header>
<h2>Super Admin Dashboard</h2>
<button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</header>

<div class="container">

<h3>Schools & School Admins</h3>
<button onclick="openSchoolModal()">+ Add School</button>
<table id="schoolsTable">
<thead>
<tr><th>School ID</th><th>Name</th><th>Admin Email</th><th>Admin Password</th><th>Actions</th></tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- School Modal -->
<div class="modal" id="schoolModal">
<div class="modal-content">
<h3 id="schoolModalTitle">Add School & Admin</h3>
<input id="schoolName" placeholder="School Name" required>
<input id="schoolAddress" placeholder="Address" required>
<input id="adminEmail" placeholder="Admin Email" required>
<input id="adminPassword" placeholder="Admin Password" type="password" required>
<button onclick="saveSchoolAdmin()">Save</button>
<button onclick="closeSchoolModal()">Close</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Logout
window.logout = async()=>{await signOut(auth).catch(()=>{}); location.reload();}

// School Modal
const schoolModal = document.getElementById("schoolModal");
function openSchoolModal(){document.getElementById("schoolName").value="";document.getElementById("schoolAddress").value="";document.getElementById("adminEmail").value="";document.getElementById("adminPassword").value="";schoolModal.style.display="flex";}
function closeSchoolModal(){schoolModal.style.display="none";}

// Load Schools & Admins
async function loadSchools(){
    const schoolsSnap = await getDocs(collection(db,"schools"));
    const tbody = document.querySelector("#schoolsTable tbody");
    tbody.innerHTML="";
    schoolsSnap.forEach(d=>{
        const data=d.data();
        tbody.innerHTML += `<tr>
            <td>${d.id}</td>
            <td>${data.name}</td>
            <td>${data.adminEmail}</td>
            <td>${data.adminPassword}</td>
            <td>
            <button onclick="deleteSchool('${d.id}')">Delete</button>
            </td>
        </tr>`;
    });
}
loadSchools();

// Save School & Admin
async function saveSchoolAdmin(){
    const name=document.getElementById("schoolName").value.trim();
    const address=document.getElementById("schoolAddress").value.trim();
    const email=document.getElementById("adminEmail").value.trim();
    const password=document.getElementById("adminPassword").value.trim();
    if(!name||!address||!email||!password){alert("Fill all fields"); return;}

    const schoolId="school_"+Date.now();

    // Firebase Auth create admin
    try{
        await createUserWithEmailAndPassword(auth,email,password);
    }catch(e){alert("Error creating admin auth: "+e.message); return;}

    // Firestore save
    await setDoc(doc(db,"schools",schoolId),{
        name,address,adminEmail:email,adminPassword:password,createdAt:new Date()
    });

    alert("School & Admin saved!");
    closeSchoolModal();
    loadSchools();
}

// Delete School
async function deleteSchool(id){
    if(confirm("Delete this school and its admin?")){
        await deleteDoc(doc(db,"schools",id));
        loadSchools();
    }
}

</script>

</body>
</html>
