<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Exam & Timetable Management</title>
<style>
body {font-family:Arial; margin:0; background:#f2f2f2;}
header {background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
.container {padding:20px; max-width:1000px; margin:auto;}
.card {background:white; padding:20px; border-radius:6px; margin-bottom:20px;}
select,input,button {padding:8px; margin:5px;}
button {cursor:pointer;}
.save {background:#004aad;color:white;border:none;padding:8px 15px;}
.delete {background:#dc3545;color:white;border:none;padding:6px 10px;}
.admit {background:#28a745;color:white;border:none;padding:8px 15px;margin-top:10px;}
table {width:100%; border-collapse:collapse; margin-top:10px;}
th, td {border:1px solid #ccc; padding:8px; text-align:center;}
th {background:#004aad; color:white;}
</style>
</head>

<body>
<header>Exam & Timetable Management</header>

<div class="container">

<!-- Session & Exam -->
<div class="card">
<h3>Session & Exam Management</h3>
<select id="sessionSelect"></select>
<input type="text" id="sessionInput" placeholder="Session (e.g. 2024-25)">
<button class="save" onclick="saveSession()">Save/Update Session</button>
<button class="delete" onclick="deleteSession()">Delete Session</button>
<br>
<select id="examSelect"></select>
<input type="text" id="examInput" placeholder="Exam Name">
<button class="save" onclick="saveExam()">Save/Update Exam</button>
<button class="delete" onclick="deleteExam()">Delete Exam</button>
</div>

<!-- Subject Management -->
<div class="card">
<h3>Subject Management</h3>
<input type="text" id="subjectInput" placeholder="Subject Name">
<button class="save" onclick="saveSubject()">Save/Update Subject</button>
<select id="subjectList"></select>
<button class="delete" onclick="deleteSubject()">Delete Subject</button>
</div>

<!-- Timetable / Admit Card -->
<div class="card">
<h3>Class-wise Timetable / Admit Card</h3>
<select id="ttSession"></select>
<select id="ttExam"></select>
<select id="ttSubject"></select>
<select id="ttClass"><option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>
<input type="date" id="ttDate">
<select id="ttDay"><option value="">Select Day</option>
<option>Monday</option><option>Tuesday</option><option>Wednesday</option>
<option>Thursday</option><option>Friday</option><option>Saturday</option>
</select>
<input type="time" id="ttTime">
<button class="save" onclick="saveTimetable()">Save/Update Timetable</button>
<br>
<button class="admit" onclick="generateAdmitCard()">Generate Admit Card</button>
</div>

<div id="printArea"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId:"nmpsnagguradiya-b9b94"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editSessionId=null, editExamId=null, editSubjectId=null, editTTId=null;

// Load Sessions & Exams & Subjects
async function loadData(){
  const snap = await getDocs(collection(db,"exam_sessions"));
  let sessionHTML='<option value="">Select Session</option>';
  let examHTML='<option value="">Select Exam</option>';
  snap.forEach(d=>{
    const data=d.data();
    sessionHTML+=`<option value="${d.id}">${data.session}</option>`;
    examHTML+=`<option value="${d.id}">${data.examName}</option>`;
  });
  document.getElementById("sessionSelect").innerHTML=sessionHTML;
  document.getElementById("examSelect").innerHTML=examHTML;
  document.getElementById("ttSession").innerHTML=sessionHTML;
  document.getElementById("ttExam").innerHTML=examHTML;

  // Subjects
  const subsnap = await getDocs(collection(db,"subjects"));
  let subHTML='<option value="">Select Subject</option>';
  subsnap.forEach(d=>{ subHTML+=`<option value="${d.id}">${d.data().name}</option>`; });
  document.getElementById("subjectList").innerHTML = subHTML;
  document.getElementById("ttSubject").innerHTML = subHTML;
}
loadData();

// Session
window.saveSession = async function(){
  let session=document.getElementById("sessionInput").value;
  if(!session) return alert("Enter session");
  if(editSessionId){
    await updateDoc(doc(db,"exam_sessions",editSessionId), {session});
    editSessionId=null;
  } else{ await addDoc(collection(db,"exam_sessions"), {session, examName:""}); }
  document.getElementById("sessionInput").value="";
  loadData();
  alert("Session saved");
}
window.deleteSession = async function(){
  let id=document.getElementById("sessionSelect").value;
  if(!id) return alert("Select session");
  if(confirm("Delete session?")){ await deleteDoc(doc(db,"exam_sessions",id)); loadData(); alert("Deleted"); }
}

// Exam
window.saveExam = async function(){
  let exam=document.getElementById("examInput").value;
  let sessionId=document.getElementById("sessionSelect").value;
  if(!exam || !sessionId) return alert("Select session and enter exam name");
  if(editExamId){ await updateDoc(doc(db,"exam_sessions",editExamId), {examName:exam}); editExamId=null;}
  else{ await addDoc(collection(db,"exam_sessions"), {session:"", examName:exam}); }
  document.getElementById("examInput").value="";
  loadData();
  alert("Exam saved");
}
window.deleteExam = async function(){
  let id=document.getElementById("examSelect").value;
  if(!id) return alert("Select exam");
  if(confirm("Delete exam?")){ await deleteDoc(doc(db,"exam_sessions",id)); loadData(); alert("Deleted"); }
}

// Subject
window.saveSubject = async function(){
  let name=document.getElementById("subjectInput").value;
  if(!name) return alert("Enter subject name");
  if(editSubjectId){ await updateDoc(doc(db,"subjects",editSubjectId), {name}); editSubjectId=null;}
  else{ await addDoc(collection(db,"subjects"), {name}); }
  document.getElementById("subjectInput").value="";
  loadData();
  alert("Subject saved");
}
window.deleteSubject = async function(){
  let id=document.getElementById("subjectList").value;
  if(!id) return alert("Select subject");
  if(confirm("Delete subject?")){ await deleteDoc(doc(db,"subjects",id)); loadData(); alert("Deleted"); }
}

// Timetable
window.saveTimetable = async function(){
  const sessionId = document.getElementById("ttSession").value;
  const examId = document.getElementById("ttExam").value;
  const subjectId = document.getElementById("ttSubject").value;
  const cls = document.getElementById("ttClass").value;
  const date = document.getElementById("ttDate").value;
  const day = document.getElementById("ttDay").value;
  const time = document.getElementById("ttTime").value;
  if(!sessionId || !examId || !subjectId || !cls || !date || !day || !time) return alert("Fill all fields");

  await addDoc(collection(db,"timetable"), {sessionId, examId, subjectId, class:cls, date, day, time});
  alert("Timetable saved");
}

// Admit Card
window.generateAdmitCard = async function(){
  const sessionId = document.getElementById("ttSession").value;
  const examId = document.getElementById("ttExam").value;
  const cls = document.getElementById("ttClass").value;
  if(!sessionId || !examId || !cls) return alert("Select session, exam and class");

  const studentsSnap = await getDocs(query(collection(db,"admissions"), where("class","==",cls)));
  let printHTML="";
  for(const docSnap of studentsSnap.docs){
    const s = docSnap.data();
    const subsSnap = await getDocs(query(collection(db,"timetable"), where("examId","==",examId), where("class","==",cls)));
    let table="<tr><th>Subject</th><th>Date</th><th>Day</th><th>Time</th></tr>";
    subsSnap.forEach(sub=>{ let sd=sub.data(); table+=`<tr><td>${sd.subjectId}</td><td>${sd.date}</td><td>${sd.day}</td><td>${sd.time}</td></tr>`; });
    printHTML += `<div style="border:2px solid #004aad;padding:10px;margin:10px;">
      <h3>YOUR SCHOOL NAME</h3>
      <p><b>Name:</b> ${s.name} | <b>Father:</b> ${s.father} | <b>Roll:</b> ${s.roll} | <b>Class:</b> ${s.class}</p>
      <table>${table}</table>
      <div style="margin-top:10px;">Principal</div>
    </div>`;
  }
  document.getElementById("printArea").innerHTML = printHTML;
  window.print();
}
</script>
</body>
</html>
