<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Management</title>
<style>
body{font-family:Arial; margin:0; background:#f2f2f2;}
header{background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
.container{padding:20px; max-width:900px; margin:auto;}
.card{background:white; padding:20px; border-radius:6px; margin-bottom:20px;}
input,select,button{padding:8px; margin:5px;}
button{background:#004aad;color:white;border:none;cursor:pointer;}
.delete{background:#dc3545;color:white;border:none;padding:6px 10px;}
.save{background:#28a745;color:white;border:none;padding:8px 15px;}
</style>
</head>
<body>

<header>Exam Management</header>
<div class="container">

<!-- Session & Exam Create/Edit/Delete -->
<div class="card">
<h3>Create / Edit / Delete Session & Exam</h3>
<select id="sessionSelect"></select>
<input type="text" id="sessionInput" placeholder="Session (2024-25)">
<button class="delete" onclick="deleteSession()">Delete Session</button>
<br>
<select id="examSelect"></select>
<input type="text" id="examInput" placeholder="Exam Name">
<button class="delete" onclick="deleteExam()">Delete Exam</button>
<br>
<button class="save" onclick="saveExamSession()">Save / Update Session & Exam</button>
</div>

<!-- Subject Create/Edit/Delete -->
<div class="card">
<h3>Create / Edit / Delete Subject</h3>
<select id="sessionSubject"></select>
<select id="examSubject"></select>
<select id="subjectSelect"></select>
<input type="text" id="subjectInput" placeholder="Subject Name">
<select id="class">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>
<input type="date" id="date">
<select id="day">
<option value="">Select Day</option>
<option>Monday</option><option>Tuesday</option><option>Wednesday</option>
<option>Thursday</option><option>Friday</option><option>Saturday</option>
</select>
<input type="time" id="time">
<br>
<button class="save" onclick="saveSubject()">Save / Update Subject</button>
<button class="delete" onclick="deleteSubject()">Delete Subject</button>
</div>

<!-- Admit Card Generate -->
<div class="card">
<h3>Generate Admit Card</h3>
<select id="admitClass">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>
<select id="admitSession"></select>
<select id="admitExam"></select>
<select id="admitSubject"></select>
<br>
<button class="save" onclick="generateAdmitCard()">Generate & Download Admit Card</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let editSessionId=null, editSubjectId=null;

// Load Session & Exam
async function loadSessionsExams(){
  const snap = await getDocs(collection(db,"exam_sessions"));
  let sessionHTML='<option value="">Select Session</option>';
  let examHTML='<option value="">Select Exam</option>';
  snap.forEach(d=>{
    let e=d.data();
    sessionHTML += `<option value="${d.id}">${e.session}</option>`;
    examHTML += `<option value="${d.id}">${e.examName}</option>`;
  });
  document.getElementById("sessionSelect").innerHTML = sessionHTML;
  document.getElementById("examSelect").innerHTML = examHTML;
  document.getElementById("sessionSubject").innerHTML = sessionHTML;
  document.getElementById("examSubject").innerHTML = examHTML;
  document.getElementById("admitSession").innerHTML = sessionHTML;
  document.getElementById("admitExam").innerHTML = examHTML;
}

// Save / Update Session & Exam
window.saveExamSession = async function(){
  const session=document.getElementById("sessionInput").value;
  const exam=document.getElementById("examInput").value;
  if(!session || !exam){alert("Fill Session and Exam"); return;}
  if(editSessionId){
    await updateDoc(doc(db,"exam_sessions",editSessionId),{session,examName:exam});
    editSessionId=null;
  } else {
    await addDoc(collection(db,"exam_sessions"),{session,examName:exam});
  }
  document.getElementById("sessionInput").value="";
  document.getElementById("examInput").value="";
  loadSessionsExams();
  alert("Session & Exam Saved / Updated");
}

// Delete Session
window.deleteSession = async function(){
  const sessionId=document.getElementById("sessionSelect").value;
  if(!sessionId){alert("Select session to delete"); return;}
  if(confirm("Delete this session?")){ await deleteDoc(doc(db,"exam_sessions",sessionId)); loadSessionsExams(); alert("Session Deleted"); }
}

// Delete Exam
window.deleteExam = async function(){
  const examId=document.getElementById("examSelect").value;
  if(!examId){alert("Select exam to delete"); return;}
  if(confirm("Delete this exam?")){ await deleteDoc(doc(db,"exam_sessions",examId)); loadSessionsExams(); alert("Exam Deleted"); }
}

// Load Subjects
async function loadSubjects(){
  const snap = await getDocs(collection(db,"exam_subjects"));
  let subjectHTML='<option value="">Select Subject</option>';
  snap.forEach(d=>{
    let e = d.data();
    subjectHTML += `<option value="${d.id}">${e.subject}</option>`;
  });
  document.getElementById("subjectSelect").innerHTML = subjectHTML;
  document.getElementById("admitSubject").innerHTML = subjectHTML;
}

// Save / Update Subject
window.saveSubject = async function(){
  const sessionId=document.getElementById("sessionSubject").value;
  const examId=document.getElementById("examSubject").value;
  const subject=document.getElementById("subjectInput").value;
  const cls=document.getElementById("class").value;
  const date=document.getElementById("date").value;
  const day=document.getElementById("day").value;
  const time=document.getElementById("time").value;
  if(!sessionId || !examId || !subject || !cls){alert("Fill all required fields"); return;}
  const sessionName=document.getElementById("sessionSubject").selectedOptions[0].text;
  const examName=document.getElementById("examSubject").selectedOptions[0].text;
  if(editSubjectId){
    await updateDoc(doc(db,"exam_subjects",editSubjectId),{sessionId,sessionName,examId,examName,subject,class:cls,date,day,time});
    editSubjectId=null;
  } else {
    await addDoc(collection(db,"exam_subjects"),{sessionId,sessionName,examId,examName,subject,class:cls,date,day,time});
  }
  document.getElementById("subjectInput").value="";
  document.getElementById("class").value="";
  document.getElementById("date").value="";
  document.getElementById("day").value="";
  document.getElementById("time").value="";
  alert("Subject Saved / Updated");
  loadSubjects();
}

// Delete Subject
window.deleteSubject = async function(){
  const subjectId=document.getElementById("subjectSelect").value;
  if(!subjectId){alert("Select subject to delete"); return;}
  if(confirm("Delete this subject?")){ await deleteDoc(doc(db,"exam_subjects",subjectId)); loadSubjects(); alert("Subject Deleted"); }
}

// Generate Admit Card
window.generateAdmitCard = async function(){
  const cls=document.getElementById("admitClass").value;
  const sessionId=document.getElementById("admitSession").value;
  const examId=document.getElementById("admitExam").value;
  const subjectId=document.getElementById("admitSubject").value;
  if(!cls || !sessionId || !examId || !subjectId){alert("Select all fields"); return;}
  // redirect to print-admit-card.html
  window.location.href = `print-admit-card.html?class=${cls}&session=${sessionId}&exam=${examId}&subject=${subjectId}`;
}

// Initialize
loadSessionsExams();
loadSubjects();
</script>

</body>
</html>
