<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* MARKSHEET */

.marksheet{

width:210mm;
min-height:297mm;
background:white;
padding:20px;
margin:auto;
border:2px solid #004aad;
page-break-after:always;
position:relative;

}

.school{

display:flex;
align-items:center;
gap:10px;
border-bottom:2px solid #004aad;
padding-bottom:10px;

}

.school img{

width:40px;

}

.school-name{

font-size:20px;
font-weight:bold;
color:#004aad;

}

.student{

display:flex;
justify-content:space-between;
margin-top:15px;

}

.student img{

width:80px;
height:100px;
object-fit:cover;
border:1px solid #ccc;

}

table{

width:100%;
border-collapse:collapse;
margin-top:15px;

}

th,td{

border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;

}

th{

background:#004aad;
color:white;

}

.watermark-logo{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.05;
width:200px;

}

.watermark-text{

position:absolute;
top:40%;
left:20%;
font-size:60px;
opacity:0.05;
transform:rotate(-30deg);

}

@media print{

header,.card{
display:none;
}

}

</style>

</head>

<body>

<header>Result Print</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">

<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="watermark">

<option value="off">Watermark OFF</option>
<option value="logo">Logo Watermark</option>
<option value="name">School Name Watermark</option>

</select>

<br>

<button onclick="generate()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

schoolData=snap.data();

const sessions=schoolData.sessions||[];

let html='<option value="">Select Session</option>';

sessions.forEach(s=>{

html+=`<option>${s}</option>`;

});

sessionSelect.innerHTML=html;

}

}

loadSchool();

function grade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";

return"F";

}

window.generate=async function(){

const session=sessionSelect.value;
const cls=classSelect.value;

const studentSnap=await getDocs(query(

collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)

));

const examSnap=await getDocs(query(

collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",session)

));

const subjectSnap=await getDocs(query(

collection(db,"subjects"),
where("schoolId","==",schoolId),
where("session","==",session)

));

let exams=[];
examSnap.forEach(e=>exams.push({id:e.id,name:e.data().examName}));

let subjects=[];
subjectSnap.forEach(s=>subjects.push({id:s.id,name:s.data().name}));

let html="";

for(const st of studentSnap.docs){

const student=st.data();

const marksSnap=await getDocs(query(

collection(db,"marks"),
where("studentId","==",st.id),
where("session","==",session)

));

let marks={};

marksSnap.forEach(m=>{

const d=m.data();

marks[d.examId+"_"+d.subjectId]=d.marks;

});

let head="<tr><th>Subject</th>";

exams.forEach(e=>{

head+=`<th>${e.name}</th>`;

});

head+="<th>Total</th><th>Grade</th></tr>";

let rows="";

subjects.forEach(sub=>{

let total=0;

let row=`<tr><td>${sub.name}</td>`;

exams.forEach(ex=>{

let m=marks[ex.id+"_"+sub.id]||0;

row+=`<td>${m}</td>`;

total+=Number(m);

});

row+=`<td>${total}</td><td>${grade(total)}</td></tr>`;

rows+=row;

});

let watermarkHTML="";

if(watermark.value=="logo"){

watermarkHTML=`<img class="watermark-logo" src="${schoolData.logo}">`;

}

if(watermark.value=="name"){

watermarkHTML=`<div class="watermark-text">${schoolData.name}</div>`;

}

html+=`

<div class="marksheet">

${watermarkHTML}

<div class="school">

<img src="${schoolData.logo}">

<div>

<div class="school-name">${schoolData.name}</div>
<div>${schoolData.address}</div>
<div>Session : ${session}</div>

</div>

</div>

<div class="student">

<div>

Name : ${student.name}<br>
Father : ${student.father}<br>
Class : ${student.class}<br>
Roll : ${student.roll}<br>
DOB : ${student.dob||""}<br>
Aadhaar : ${student.aadhaar||""}<br>
SSSM : ${student.sssm||""}<br>
Village : ${student.village||""}

</div>

<img src="${student.photo||""}">

</div>

<table>

${head}

${rows}

</table>

</div>

`;

}

resultArea.innerHTML=html;

}

window.downloadPDF=function(){

html2pdf(document.getElementById("resultArea"),{

margin:5,
filename:"result.pdf",
html2canvas:{scale:2,useCORS:true},
jsPDF:{unit:"mm",format:"a4"}

});

}

</script>

</body>
  </html>
