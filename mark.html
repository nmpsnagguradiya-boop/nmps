<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Marks Entry & Edit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {font-family:Arial; margin:0; background:#f2f2f2;}
header {background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
.container {padding:20px; max-width:1200px; margin:auto;}
.card {background:white; padding:20px; border-radius:8px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
select,input,button {padding:10px; margin:5px; width:100%; max-width:300px;}
button {cursor:pointer; border:none; border-radius:5px;}
.save {background:#004aad;color:white;padding:10px;}
table {width:100%; border-collapse:collapse; margin-top:10px;}
th, td {border:1px solid #ccc; padding:8px; text-align:center;}
th {background:#004aad; color:white;}
input[type="number"]{width:60px;}
@media (max-width:768px){
  table, th, td {font-size:12px;}
  select,input,button {max-width:100%;}
}
</style>
</head>

<body>
<header>Marks Entry & Edit</header>

<div class="container">

<div class="card">
<h3>Marks Management</h3>
<select id="selectClass">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>
<button class="save" onclick="loadStudents()">Load Students</button>
</div>

<div class="card">
<h3>Student Marks</h3>
<table>
<thead>
<tr>
<th>Roll</th><th>Name</th><th>Father</th><th>Exam</th><th>Subject</th><th>Marks</th>
</tr>
</thead>
<tbody id="marksTable"></tbody>
</table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let subjects = [];
let exams = [];
let students = [];

// Load all subjects and exams
async function loadData(){
  const subSnap = await getDocs(collection(db,"subjects"));
  subjects = subSnap.docs.map(d=>({id:d.id,name:d.data().name}));

  const examSnap = await getDocs(collection(db,"exam_sessions"));
  exams = examSnap.docs.map(d=>({id:d.id,name:d.data().examName}));
}
await loadData();

window.loadStudents = async function(){
  const cls = document.getElementById("selectClass").value;
  if(!cls) return alert("Select class");
  
  const snap = await getDocs(query(collection(db,"admissions"), where("class","==",cls)));
  students = snap.docs.map(d=>({id:d.id, ...d.data()}));

  renderMarksTable();
}

async function renderMarksTable(){
  const tbody = document.getElementById("marksTable");
  tbody.innerHTML = "";

  for(const student of students){
    for(const exam of exams){
      for(const subject of subjects){
        // Check if marks already exist
        const markDocId = `${student.id}_${exam.id}_${subject.id}`;
        const markDoc = await getDoc(doc(db,"marks",markDocId));
        const marks = markDoc.exists() ? markDoc.data().marks : "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${student.roll}</td>
          <td>${student.name}</td>
          <td>${student.father}</td>
          <td>${exam.name}</td>
          <td>${subject.name}</td>
          <td><input type="number" min="0" max="100" value="${marks}" data-student="${student.id}" data-exam="${exam.id}" data-subject="${subject.id}" onblur="saveMark(this)"></td>
        `;
        tbody.appendChild(tr);
      }
    }
  }
}

// Save single mark instantly on blur
window.saveMark = async function(input){
  const marks = input.value || 0;
  const studentId = input.dataset.student;
  const examId = input.dataset.exam;
  const subjectId = input.dataset.subject;

  await setDoc(doc(db,"marks",`${studentId}_${examId}_${subjectId}`), {
    studentId, examId, subjectId, marks
  });
  input.style.backgroundColor = "#d4edda"; // green flash
  setTimeout(()=>{input.style.backgroundColor="";},500);
}

</script>
</body>
</html>
