<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks Entry + Attendance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input,button{
padding:10px;
margin:5px;
width:100%;
max-width:220px;
border-radius:5px;
border:1px solid #ccc;
}

button{
cursor:pointer;
font-weight:bold;
border:none;
}

.load{
background:#28a745;
color:white;
}

.save{
background:#004aad;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

input[type="number"]{
width:70px;
text-align:center;
}

.gradeInput{
width:60px;
}

</style>
</head>

<body>

<header>Marks Entry + Attendance System</header>

<div class="container">

<div class="card">

<h3>Select Session</h3>

<select id="sessionSelect"></select>

<p id="sessionStatus" style="color:green;font-weight:bold"></p>

</div>

<div id="marksCard" style="display:none;">

<div class="card">

<h3>Select Details</h3>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect">
<option value="">Select Exam</option>
</select>

<select id="subjectSelect">
<option value="">Select Subject</option>
</select>

<input type="number" id="maxMarks" placeholder="Maximum Marks">

<br>

<button class="load" onclick="loadStudents()">Load Students</button>
<button class="save" onclick="saveAll()">Save</button>

</div>

<div class="card">

<h3>Student Marks</h3>

<table>

<thead>
<tr>

<th>Rank</th>
<th>Roll</th>
<th>Name</th>
<th>Father</th>

<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Result</th>

<th>Sports</th>
<th>Activity</th>

<th>Working</th>
<th>Present</th>
<th>Absent</th>

</tr>
</thead>

<tbody id="marksTable"></tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let activeSession=localStorage.getItem("activeSession")||"";
const schoolId=localStorage.getItem("schoolId")||"school_001";

function getGrade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";

}

function getResult(p){
return p>=33?"PASS":"FAIL";
}

/* LOAD SESSION */

async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

const sessions=snap.data().sessions||[];

let html='<option value="">Select Session</option>';

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`;
});

sessionSelect.innerHTML=html;

}

}

loadSessions();

sessionSelect.onchange=async function(){

activeSession=this.value;

localStorage.setItem("activeSession",activeSession);

sessionStatus.innerText="Active Session: "+activeSession;

document.getElementById("marksCard").style.display="block";

loadExams();
loadSubjects();

};

/* LOAD EXAMS */

async function loadExams(){

const q=query(
collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

let html='<option value="">Select Exam</option>';

snap.forEach(d=>{
const e=d.data();
html+=`<option value="${d.id}">${e.examName}</option>`;
});

examSelect.innerHTML=html;

}

/* LOAD SUBJECTS */

async function loadSubjects(){

const q=query(
collection(db,"subjects"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

let html='<option value="">Select Subject</option>';

snap.forEach(d=>{
const s=d.data();
html+=`<option value="${d.id}">${s.name}</option>`;
});

subjectSelect.innerHTML=html;

}

/* LOAD STUDENTS */

window.loadStudents=async function(){

const cls=classSelect.value;

if(!cls||!examSelect.value||!subjectSelect.value){

alert("Select Class, Exam, Subject");

return;

}

const q=query(
collection(db,"admissions"),
where("class","==",cls),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

renderTable();

}

/* TABLE */

function renderTable(){

const tbody=document.getElementById("marksTable");

tbody.innerHTML="";

students.forEach(s=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td class="rank"></td>
<td>${s.roll||""}</td>
<td>${s.name}</td>
<td>${s.father||""}</td>

<td><input type="number" class="marks"></td>

<td class="percent"></td>
<td class="grade"></td>
<td class="result"></td>

<td><input class="sports gradeInput"></td>
<td><input class="activity gradeInput"></td>

<td><input type="number" class="work"></td>
<td><input type="number" class="present"></td>
<td class="absent"></td>

`;

tbody.appendChild(tr);

});

}

/* CALCULATE */

function calculate(){

const max=parseFloat(maxMarks.value)||1;

const rows=document.querySelectorAll("#marksTable tr");

let list=[];

rows.forEach(row=>{

const marks=parseFloat(row.querySelector(".marks").value)||0;

const percent=(marks/max)*100;

row.querySelector(".percent").innerText=percent.toFixed(2)+"%";

row.querySelector(".grade").innerText=getGrade(percent);

row.querySelector(".result").innerText=getResult(percent);

list.push({row,percent});

});

list.sort((a,b)=>b.percent-a.percent);

list.forEach((s,i)=>{
s.row.querySelector(".rank").innerText=i+1;
});

}

document.addEventListener("input",calculate);

/* SAVE */

window.saveAll=async function(){

const rows=document.querySelectorAll("#marksTable tr");

for(const row of rows){

const studentId=students[Array.from(rows).indexOf(row)].id;

const marks=parseFloat(row.querySelector(".marks").value)||0;

const sports=row.querySelector(".sports").value||"";
const activity=row.querySelector(".activity").value||"";

const work=parseInt(row.querySelector(".work").value)||0;
const present=parseInt(row.querySelector(".present").value)||0;

const absent=work-present;

await setDoc(doc(db,"marks",`${studentId}_${examSelect.value}_${subjectSelect.value}`),{

studentId,
examId:examSelect.value,
subjectId:subjectSelect.value,
marks,
maxMarks:maxMarks.value,
sportsGrade:sports,
activityGrade:activity,
class:classSelect.value,
session:activeSession,
schoolId

});

await setDoc(doc(db,"attendance",`${studentId}_${activeSession}`),{

studentId,
class:classSelect.value,
session:activeSession,
schoolId,
workingDays:work,
present,
absent

});

}

alert("Saved Successfully");

}

</script>

</body>
  </html>
