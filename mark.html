<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks Entry + Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:10px 15px;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

.tab.active{
background:#004aad;
color:white;
}

select,input,button{
padding:10px;
margin:5px;
width:100%;
max-width:220px;
border-radius:5px;
border:1px solid #ccc;
}

button{
cursor:pointer;
font-weight:bold;
border:none;
}

.load{background:#28a745;color:white;}
.save{background:#004aad;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

input[type="number"]{
width:70px;
text-align:center;
}

.gradeInput{width:60px;}

</style>
</head>

<body>

<header>School Marks Management</header>

<div class="container">

<div class="card">

<h3>Select Session</h3>

<select id="sessionSelect"></select>

<p id="sessionStatus" style="color:green;font-weight:bold"></p>

</div>

<div id="marksCard" style="display:none;">

<div class="tabs">

<div class="tab active" onclick="openTab('marksTab')">Marks</div>
<div class="tab" onclick="openTab('activityTab')">Sports / Activity</div>
<div class="tab" onclick="openTab('attendanceTab')">Attendance</div>

</div>

<div class="card">

<h3>Select Details</h3>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect"></select>
<select id="subjectSelect"></select>

<input type="number" id="maxMarks" placeholder="Maximum Marks">

<br>

<button class="load" onclick="loadStudents()">Load Students</button>
<button class="save" onclick="saveAll()">Save</button>

</div>

<!-- MARKS TAB -->

<div id="marksTab" class="card">

<h3>Marks Entry</h3>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Roll</th>
<th>Name</th>
<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Result</th>

</tr>

</thead>

<tbody id="marksTable"></tbody>

</table>

</div>

<!-- SPORTS TAB -->

<div id="activityTab" class="card" style="display:none">

<h3>Sports / Activity</h3>

<table>

<thead>

<tr>

<th>Roll</th>
<th>Name</th>
<th>Sports Grade</th>
<th>Activity Grade</th>

</tr>

</thead>

<tbody id="activityTable"></tbody>

</table>

</div>

<!-- ATTENDANCE TAB -->

<div id="attendanceTab" class="card" style="display:none">

<h3>Attendance</h3>

<table>

<thead>

<tr>

<th>Roll</th>
<th>Name</th>
<th>Working Days</th>
<th>Present</th>
<th>Absent</th>

</tr>

</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let activeSession="";
const schoolId=localStorage.getItem("schoolId")||"school_001";

/* TAB SWITCH */

window.openTab=function(tab){

document.querySelectorAll(".card").forEach(c=>{

if(c.id==="marksTab"||c.id==="activityTab"||c.id==="attendanceTab")
c.style.display="none"

})

document.getElementById(tab).style.display="block"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

event.target.classList.add("active")

}

/* SESSION */

async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

const sessions=snap.data().sessions||[];

sessionSelect.innerHTML='<option value="">Select</option>'+
sessions.map(s=>`<option>${s}</option>`).join("");

}

loadSessions();

sessionSelect.onchange=async function(){

activeSession=this.value;

sessionStatus.innerText="Active Session: "+activeSession;

document.getElementById("marksCard").style.display="block";

loadExams();
loadSubjects();

}

/* LOAD EXAMS */

async function loadExams(){

const q=query(
collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

examSelect.innerHTML='<option value="">Exam</option>'+
snap.docs.map(d=>`<option value="${d.id}">${d.data().examName}</option>`).join("");

}

/* LOAD SUBJECTS */

async function loadSubjects(){

const q=query(
collection(db,"subjects"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

subjectSelect.innerHTML='<option value="">Subject</option>'+
snap.docs.map(d=>`<option value="${d.id}">${d.data().name}</option>`).join("");

}

/* LOAD STUDENTS */

window.loadStudents=async function(){

const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("class","==",cls),
where("session","==",activeSession),
where("schoolId","==",schoolId)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

renderTables();

}

/* RENDER */

function renderTables(){

marksTable.innerHTML="";
activityTable.innerHTML="";
attendanceTable.innerHTML="";

students.forEach(s=>{

marksTable.innerHTML+=`
<tr>
<td class="rank"></td>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="marks"></td>
<td class="percent"></td>
<td class="grade"></td>
<td class="result"></td>
</tr>`;

activityTable.innerHTML+=`
<tr>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="sports"></td>
<td><input class="activity"></td>
</tr>`;

attendanceTable.innerHTML+=`
<tr>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="work"></td>
<td><input class="present"></td>
<td class="absent"></td>
</tr>`;

});

}

</script>

</body>
</html>
