<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks Entry + Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input,button{
padding:10px;
margin:5px;
width:100%;
max-width:220px;
border-radius:5px;
border:1px solid #ccc;
}

button{
cursor:pointer;
font-weight:bold;
border:none;
}

.load{background:#28a745;color:white;}
.save{background:#004aad;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

input[type="number"]{
width:70px;
text-align:center;
}

.gradeInput{width:60px;}

</style>
</head>

<body>

<header>Marks Entry + Attendance System</header>

<div class="container">

<div class="card">

<h3>Select Session</h3>

<select id="sessionSelect"></select>

<p id="sessionStatus" style="color:green;font-weight:bold"></p>

</div>

<div id="marksCard" style="display:none;">

<div class="card">

<h3>Select Details</h3>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect"></select>
<select id="subjectSelect"></select>

<input type="number" id="maxMarks" placeholder="Maximum Marks">

<br>

<button class="load" onclick="loadStudents()">Load Students</button>
<button class="save" onclick="saveAll()">Save</button>

</div>

<div class="card">

<h3>Student Marks</h3>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Roll</th>
<th>Name</th>
<th>Father</th>

<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Result</th>

<th>Sports</th>
<th>Activity</th>

<th>Working</th>
<th>Present</th>
<th>Absent</th>

</tr>

</thead>

<tbody id="marksTable"></tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let activeSession="";
const schoolId=localStorage.getItem("schoolId")||"school_001";

function getGrade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";

return"F";

}

function getResult(p){
return p>=33?"PASS":"FAIL";
}

/* SESSION */

async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

const sessions=snap.data().sessions||[];

sessionSelect.innerHTML='<option value="">Select</option>'+
sessions.map(s=>`<option>${s}</option>`).join("");

}

loadSessions();

sessionSelect.onchange=async function(){

activeSession=this.value;

sessionStatus.innerText="Active Session: "+activeSession;

document.getElementById("marksCard").style.display="block";

loadExams();
loadSubjects();

}

/* EXAMS */

async function loadExams(){

const q=query(
collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

examSelect.innerHTML='<option value="">Exam</option>'+
snap.docs.map(d=>`<option value="${d.id}">${d.data().examName}</option>`).join("");

}

/* SUBJECTS */

async function loadSubjects(){

const q=query(
collection(db,"subjects"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

subjectSelect.innerHTML='<option value="">Subject</option>'+
snap.docs.map(d=>`<option value="${d.id}">${d.data().name}</option>`).join("");

}

/* LOAD STUDENTS */

window.loadStudents=async function(){

const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("class","==",cls),
where("session","==",activeSession),
where("schoolId","==",schoolId)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

renderTable();

}

/* TABLE */

async function renderTable(){

const tbody=document.getElementById("marksTable");

tbody.innerHTML="";

for(const s of students){

const tr=document.createElement("tr");

tr.innerHTML=`

<td class="rank"></td>
<td>${s.roll||""}</td>
<td>${s.name}</td>
<td>${s.father||""}</td>

<td><input type="number" class="marks"></td>

<td class="percent"></td>
<td class="grade"></td>
<td class="result"></td>

<td><input class="sports gradeInput"></td>
<td><input class="activity gradeInput"></td>

<td><input type="number" class="work"></td>
<td><input type="number" class="present"></td>
<td class="absent"></td>

`;

tbody.appendChild(tr);

/* LOAD MARKS */

const markDoc=await getDoc(doc(db,"marks",`${s.id}_${examSelect.value}_${subjectSelect.value}`));

if(markDoc.exists()){

tr.querySelector(".marks").value=markDoc.data().marks;

}

/* LOAD ATTENDANCE + SPORTS */

const attDoc=await getDoc(doc(db,"attendance",`${s.id}_${activeSession}`));

if(attDoc.exists()){

const a=attDoc.data();

tr.querySelector(".sports").value=a.sportsGrade||"";
tr.querySelector(".activity").value=a.activityGrade||"";

tr.querySelector(".work").value=a.workingDays||"";
tr.querySelector(".present").value=a.present||"";

tr.querySelector(".absent").innerText=a.absent||"";

}

}

}

/* CALCULATE */

document.addEventListener("input",()=>{

const max=maxMarks.value||1;

const rows=document.querySelectorAll("#marksTable tr");

let arr=[];

rows.forEach(r=>{

const marks=r.querySelector(".marks").value||0;

const percent=(marks/max)*100;

r.querySelector(".percent").innerText=percent.toFixed(2)+"%";

r.querySelector(".grade").innerText=getGrade(percent);

r.querySelector(".result").innerText=getResult(percent);

arr.push({row:r,percent});

const work=r.querySelector(".work").value||0;
const present=r.querySelector(".present").value||0;

r.querySelector(".absent").innerText=work-present;

});

arr.sort((a,b)=>b.percent-a.percent);

arr.forEach((s,i)=>{

s.row.querySelector(".rank").innerText=i+1;

});

});

/* SAVE */

window.saveAll=async function(){

const rows=document.querySelectorAll("#marksTable tr");

for(let i=0;i<rows.length;i++){

const row=rows[i];
const s=students[i];

const marks=row.querySelector(".marks").value||0;

await setDoc(doc(db,"marks",`${s.id}_${examSelect.value}_${subjectSelect.value}`),{

studentId:s.id,
examId:examSelect.value,
subjectId:subjectSelect.value,
marks,
maxMarks:maxMarks.value,
class:classSelect.value,
session:activeSession,
schoolId

});

/* SESSION WISE ATTENDANCE */

await setDoc(doc(db,"attendance",`${s.id}_${activeSession}`),{

studentId:s.id,
class:classSelect.value,
session:activeSession,
schoolId,

sportsGrade:row.querySelector(".sports").value||"",
activityGrade:row.querySelector(".activity").value||"",

workingDays:row.querySelector(".work").value||0,
present:row.querySelector(".present").value||0,
absent:row.querySelector(".absent").innerText||0

});

}

alert("Data Saved");

}

</script>

</body>
</html>
