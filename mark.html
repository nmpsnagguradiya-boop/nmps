<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks Entry + Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:10px 15px;
background:#ddd;
cursor:pointer;
border-radius:5px;
}

.tab.active{
background:#004aad;
color:white;
}

select,input,button{
padding:10px;
margin:5px;
width:100%;
max-width:220px;
border-radius:5px;
border:1px solid #ccc;
}

button{
cursor:pointer;
font-weight:bold;
border:none;
}

.load{background:#28a745;color:white;}
.save{background:#004aad;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

input[type="number"]{
width:70px;
text-align:center;
}

.gradeInput{width:60px;}

</style>
</head>

<body>

<header>School Marks Management</header>

<div class="container">

<div class="card">

<h3>Select Session</h3>

<select id="sessionSelect"></select>
<p id="sessionStatus"></p>

</div>

<div id="mainSystem" style="display:none">

<div class="tabs">

<div class="tab active" onclick="openTab('marksTab')">Marks</div>
<div class="tab" onclick="openTab('sportsTab')">Sports / Activity</div>
<div class="tab" onclick="openTab('attendanceTab')">Attendance</div>

</div>

<div class="card">

<h3>Select Class</h3>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect"></select>
<select id="subjectSelect"></select>

<input type="number" id="maxMarks" placeholder="Maximum Marks">

<br>

<button class="load" onclick="loadStudents()">Load Students</button>
<button class="save" onclick="saveAll()">Save</button>

</div>

<!-- MARKS -->

<div id="marksTab" class="card">

<table>

<thead>
<tr>
<th>Rank</th>
<th>Roll</th>
<th>Name</th>
<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Result</th>
</tr>
</thead>

<tbody id="marksTable"></tbody>

</table>

</div>

<!-- SPORTS -->

<div id="sportsTab" class="card" style="display:none">

<table>

<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Sports</th>
<th>Activity</th>
</tr>
</thead>

<tbody id="sportsTable"></tbody>

</table>

</div>

<!-- ATTENDANCE -->

<div id="attendanceTab" class="card" style="display:none">

<table>

<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Working</th>
<th>Present</th>
<th>Absent</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,setDoc,query,where }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
let activeSession="";
let students=[];

function grade(p){
if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";
}

window.openTab=function(id){
marksTab.style.display="none";
sportsTab.style.display="none";
attendanceTab.style.display="none";
document.getElementById(id).style.display="block";
}

/* SESSION */

async function loadSessions(){
const snap=await getDoc(doc(db,"schools",schoolId));
const sessions=snap.data()?.sessions||[];
sessionSelect.innerHTML='<option>Select</option>'+sessions.map(s=>`<option>${s}</option>`).join("");
}

loadSessions();

sessionSelect.onchange=async function(){
activeSession=this.value;
sessionStatus.innerText="Active Session : "+activeSession;
mainSystem.style.display="block";
loadExams();
loadSubjects();
}

/* EXAM */

async function loadExams(){
const q=query(collection(db,"exam_sessions"),where("schoolId","==",schoolId),where("session","==",activeSession));
const snap=await getDocs(q);
examSelect.innerHTML='<option>Exam</option>'+snap.docs.map(d=>`<option value="${d.id}">${d.data().examName}</option>`).join("");
}

/* SUBJECT */

async function loadSubjects(){
const q=query(collection(db,"subjects"),where("schoolId","==",schoolId),where("session","==",activeSession));
const snap=await getDocs(q);
subjectSelect.innerHTML='<option>Subject</option>'+snap.docs.map(d=>`<option value="${d.id}">${d.data().name}</option>`).join("");
}

/* LOAD STUDENTS */

window.loadStudents=async function(){
const cls=classSelect.value;
const q=query(collection(db,"admissions"),where("class","==",cls),where("session","==",activeSession),where("schoolId","==",schoolId));
const snap=await getDocs(q);
students=snap.docs.map(d=>({id:d.id,...d.data()}));
renderTables();
}

/* TABLES */

async function renderTables(){
marksTable.innerHTML="";
sportsTable.innerHTML="";
attendanceTable.innerHTML="";

for(const s of students){

// MARKS LOAD
let marksVal=0;
const m=await getDoc(doc(db,"marks",`${s.id}_${examSelect.value}_${subjectSelect.value}`));
if(m.exists()) marksVal=m.data().marks;

// SPORTS / ACTIVITY
let sport="",act="";
const sa=await getDoc(doc(db,"attendance",`${s.id}_${activeSession}`));
if(sa.exists()){
sport=sa.data().sports||"";
act=sa.data().activity||"";
}

// ATTENDANCE
let work=0,present=0,absent=0;
if(sa.exists()){
work=sa.data().work||0;
present=sa.data().present||0;
absent=work-present;
}

marksTable.innerHTML+=`
<tr>
<td></td>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="marks" value="${marksVal}"></td>
<td class="percent"></td>
<td class="grade"></td>
<td class="result"></td>
</tr>`;

sportsTable.innerHTML+=`
<tr>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="sport" value="${sport}"></td>
<td><input class="activity" value="${act}"></td>
</tr>`;

attendanceTable.innerHTML+=`
<tr>
<td>${s.roll}</td>
<td>${s.name}</td>
<td><input class="work" value="${work}"></td>
<td><input class="present" value="${present}"></td>
<td class="absent">${absent}</td>
</tr>`;
}

// CALCULATE RANK
document.querySelectorAll("#marksTable tr").forEach((r,i)=>{
const marks=r.querySelector(".marks").value||0;
const max=maxMarks.value||1;
const percent=(marks/max)*100;
r.querySelector(".percent").innerText=i+1; // Rank instead of %
r.querySelector(".grade").innerText=grade(percent);
r.querySelector(".result").innerText=percent>=33?"PASS":"FAIL";
});
}

/* SAVE */

window.saveAll=async function(){
const rows=document.querySelectorAll("#marksTable tr");
for(let i=0;i<rows.length;i++){
const s=students[i];
const marks=rows[i].querySelector(".marks").value||0;

// SAVE MARKS
await setDoc(doc(db,"marks",`${s.id}_${examSelect.value}_${subjectSelect.value}`),{
studentId:s.id,
marks,
examId:examSelect.value,
subjectId:subjectSelect.value,
class:classSelect.value,
session:activeSession,
schoolId
});

// SAVE SPORTS / ACTIVITY
const sport=sportsTable.rows[i].querySelector(".sport").value||"";
const activity=sportsTable.rows[i].querySelector(".activity").value||"";

// SAVE ATTENDANCE
const work=attendanceTable.rows[i].querySelector(".work").value||0;
const present=attendanceTable.rows[i].querySelector(".present").value||0;
const absent=work-present;

await setDoc(doc(db,"attendance",`${s.id}_${activeSession}`),{
studentId:s.id,
sports:sport,
activity:activity,
work,
present,
absent,
class:classSelect.value,
session:activeSession,
schoolId
});
}

alert("Saved Successfully");
}

</script>

</body>
  </html>
