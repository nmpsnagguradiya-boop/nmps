<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Admission</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

.success{
color:green;
text-align:center;
margin-top:10px;
font-weight:bold;
}

.counter{
text-align:center;
margin-bottom:15px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Admission Form</h2>

<div class="counter">
Total Students : <span id="totalStudents">0</span>
</div>

<form id="admissionForm">

<label>Photo (Optional)</label>
<input type="file" id="photo">

<label>Student Name</label>
<input type="text" id="studentName" required>

<label>Father's Name</label>
<input type="text" id="fatherName" required>

<label>Mother's Name</label>
<input type="text" id="motherName" required>

<label>Class</label>
<select id="class">
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<label>Mobile Number</label>
<input type="number" id="mobile">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Date of Admission</label>
<input type="date" id="doa">

<label>Village / City</label>
<input type="text" id="village">

<label>Post</label>
<input type="text" id="post">

<label>District</label>
<input type="text" id="district">

<label>State</label>
<input type="text" id="state">

<label>National</label>
<input type="text" id="national">

<label>SSSM ID</label>
<input type="text" id="sssm">

<label>Family ID</label>
<input type="text" id="family">

<label>APAR ID</label>
<input type="text" id="apar">

<label>Aadhar Card</label>
<input type="text" id="aadhar">

<label>Caste</label>
<input type="text" id="caste">

<label>Category</label>
<input type="text" id="category">

<label>Roll Number</label>
<input type="text" id="roll">

<label>Scholar Number</label>
<input type="text" id="scholar">

<button type="submit">Submit Admission</button>

</form>

<div class="success" id="successMsg"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("students");

function uploadImage(file){

return new Promise((resolve,reject)=>{

if(!file){
resolve("");
return;
}

let formData = new FormData();
formData.append("image",file);

fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{
resolve(data.data.url);
})
.catch(err=>{
reject(err);
});

});

}

document.getElementById("admissionForm").addEventListener("submit",async function(e){

e.preventDefault();

let file = document.getElementById("photo").files[0];

let imageUrl = await uploadImage(file);

let studentData = {

photo:imageUrl,
studentName:studentName.value,
fatherName:fatherName.value,
motherName:motherName.value,
class:document.getElementById("class").value,
mobile:mobile.value,
dob:dob.value,
doa:doa.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
aadhar:aadhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholar:scholar.value

};

db.push(studentData);

document.getElementById("successMsg").innerText="Admission Successful";

document.getElementById("admissionForm").reset();

});

db.on("value",snapshot=>{
let total = snapshot.numChildren();
document.getElementById("totalStudents").innerText = total;
});

</script>

</body>
                   </html>
