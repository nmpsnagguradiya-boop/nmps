<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Admission</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:18px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

form{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

button{
margin-top:18px;
background:#004aad;
color:white;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:17px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:10px;
font-size:16px;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ccc;
padding:10px;
text-align:center;
font-size:14px;
}

table th{
background:#004aad;
color:white;
}

img{
width:50px;
border-radius:5px;
}

.filter{
margin-top:20px;
}

/* MOBILE RESPONSIVE */

@media (max-width:768px){

.container{
padding:12px;
}

form{
padding:20px;
}

input,select,textarea{
padding:14px;
font-size:17px;
}

button{
padding:16px;
font-size:18px;
}

table th,table td{
font-size:16px;
padding:12px;
}

header{
font-size:22px;
padding:16px;
}

img{
width:60px;
}

}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="hidden" id="studentId">

<input type="text" id="name" placeholder="Student Name" required>

<input type="text" id="father" placeholder="Father Name" required>

<input type="text" id="mother" placeholder="Mother Name">

<input type="text" id="mobile" placeholder="Mobile Number" required>

<input type="text" id="village" placeholder="Village">
<input type="text" id="city" placeholder="City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">

<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">

<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">

<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">

<input type="text" id="admissionDate" placeholder="Admission Date (dd/mm/yyyy)">

<select id="class">

<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<input type="text" id="dob" placeholder="Date Of Birth (dd/mm/yyyy)">

<textarea id="message" placeholder="Message"></textarea>

<label>Student Photo</label>
<input type="file" id="photo">

<img id="previewPhoto" src="" style="margin-top:10px;max-width:100px;display:none;border-radius:5px;">

<button type="submit">Submit Admission</button>

<div class="success" id="msg"></div>

</form>

<h3>Total Students : <span id="total">0</span></h3>

<div class="filter">

<select id="classFilter" onchange="loadStudents()">

<option value="">All Classes</option>

<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<!-- ⚠️ आपका पूरा Firebase JS नीचे वही रहेगा (कोई बदलाव नहीं) -->

</body>
  </html>
