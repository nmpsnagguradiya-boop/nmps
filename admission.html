<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#004aad;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name" required>
<input type="text" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="village" placeholder="Village">
<input type="text" id="city" placeholder="City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">
<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">

<input type="text" id="admissionDate" placeholder="Admission Date (dd/mm/yyyy)">

<select id="class">

<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<input type="text" id="dob" placeholder="Date Of Birth (dd/mm/yyyy)">

<textarea id="message" placeholder="Message"></textarea>

<label>Student Photo</label>
<input type="file" id="photo">

<label>Document Upload</label>
<input type="file" id="document">

<button type="submit">Submit Admission</button>

<div class="success" id="msg"></div>

</form>

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

const form=document.getElementById("form");

form.addEventListener("submit",async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const father=document.getElementById("father").value;
const mobile=document.getElementById("mobile").value;
const className=document.getElementById("class").value;

const photoFile=document.getElementById("photo").files[0];

let photoURL="";

if(photoFile){
photoURL=await uploadImgBB(photoFile);
}

await addDoc(collection(db,"admissions"),{

schoolId:schoolId,

name:name,
father:father,
mobile:mobile,
class:className,
photo:photoURL

});

document.getElementById("msg").innerText="Admission Submitted Successfully";

form.reset();

loadStudents();

});

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

if(data.schoolId!==schoolId) return;

count++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ""}" width="40"></td>

<td>
<button onclick="deleteStudent('${docSnap.id}')">Delete</button>
</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

}

loadStudents();

window.deleteStudent = async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"admissions",id));

loadStudents();

}

}

</script>

</body>
  </html>
