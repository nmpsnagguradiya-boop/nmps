<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NMPS Admin Panel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#82caff;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#82caff;
border:none;
padding:10px 20px;
border-radius:5px;
color:white;
}

.teacher{
display:flex;
gap:10px;
margin:10px 0;
}

.teacher img{
width:80px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h2>NMPS Admin Panel</h2>

</header>

<div class="container">

<div id="loginBox" class="card">

<h3>Admin Login</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<div class="card">

<h3>Upload Notice</h3>

<textarea id="noticeText"></textarea>

<button onclick="uploadNotice()">Post Notice</button>

</div>

<div class="card">

<h3>Upload Photo</h3>

<input type="file" id="photoFile">

<button onclick="uploadPhoto()">Upload</button>

</div>

<div class="card">

<h3>Upload Video</h3>

<input type="file" id="videoFile">

<button onclick="uploadVideo()">Upload</button>

</div>

<div class="card">

<h3>Upload Result</h3>

<input id="sssm" placeholder="SSSM ID">

<input type="file" id="resultPdf">

<button onclick="uploadResult()">Upload Result</button>

</div>

<div class="card">

<h3>Add Teacher</h3>

<input id="teacherName" placeholder="Teacher Name">

<input id="teacherSubject" placeholder="Subject">

<input type="file" id="teacherPhoto">

<button onclick="addTeacher()">Add Teacher</button>

</div>

<div class="card">

<h3>Teacher List</h3>

<div id="teacherList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getStorage,ref,uploadBytes,getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {

apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",

authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",

projectId: "nmpsnagguradiya-b9b94",

storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",

messagingSenderId: "811957568318",

appId: "1:811957568318:web:7058de9ba52df9d6bae26f"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);



window.login=function(){

const email=document.getElementById("email").value

const password=document.getElementById("password").value

if(email=="nmpsnagguradiya@gmail.com" && password=="Nmps@123"){

document.getElementById("loginBox").style.display="none"

document.getElementById("dashboard").style.display="block"

}

else{

alert("Wrong Login")

}

}



window.uploadNotice=async function(){

const text=document.getElementById("noticeText").value

await addDoc(collection(db,"notice"),{text:text})

alert("Notice Uploaded")

}



window.uploadPhoto=async function(){

const file=document.getElementById("photoFile").files[0]

const storageRef=ref(storage,"images/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"gallery"),{type:"image",url:url})

alert("Photo Uploaded")

}



window.uploadVideo=async function(){

const file=document.getElementById("videoFile").files[0]

const storageRef=ref(storage,"videos/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"gallery"),{type:"video",url:url})

alert("Video Uploaded")

}



window.uploadResult=async function(){

const id=document.getElementById("sssm").value

const file=document.getElementById("resultPdf").files[0]

const storageRef=ref(storage,"results/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"results"),{

sssm:id,

url:url

})

alert("Result Uploaded")

}



window.addTeacher=async function(){

const name=document.getElementById("teacherName").value

const subject=document.getElementById("teacherSubject").value

const file=document.getElementById("teacherPhoto").files[0]

const storageRef=ref(storage,"teachers/"+file.name)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await addDoc(collection(db,"teachers"),{

name:name,

subject:subject,

photo:url

})

loadTeachers()

}



async function loadTeachers(){

const querySnapshot=await getDocs(collection(db,"teachers"))

const list=document.getElementById("teacherList")

list.innerHTML=""

querySnapshot.forEach((d)=>{

const data=d.data()

const div=document.createElement("div")

div.className="teacher"

div.innerHTML=`

<img src="${data.photo}">

<div>

<b>${data.name}</b>

<p>${data.subject}</p>

<button onclick="deleteTeacher('${d.id}')">Delete</button>

</div>

`

list.appendChild(div)

})

}



window.deleteTeacher=async function(id){

await deleteDoc(doc(db,"teachers",id))

loadTeachers()

}

loadTeachers()

</script>

</body>
</html>
