<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NMPS Admin Panel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#82caff;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#82caff;
border:none;
padding:10px 20px;
border-radius:5px;
color:white;
cursor:pointer;
}

.media img{
width:120px;
border-radius:10px;
margin:5px;
}

</style>

</head>

<body>

<header>
<h2>NMPS Admin Panel</h2>
</header>

<div class="container">

<div id="loginBox" class="card">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="card">
<h3>Upload Notice</h3>
<textarea id="noticeText"></textarea>
<button onclick="uploadNotice()">Post Notice</button>

<h4>Notice List</h4>
<div id="noticeList"></div>
</div>

<div class="card">
<h3>Upload Photos (Multiple)</h3>
<input type="file" id="photoFiles" multiple>
<input id="photoTitle" placeholder="Photo Title">
<input id="photoLink" placeholder="Optional Link (URL)">
<button onclick="uploadPhotos()">Upload</button>

<h4>Photo List</h4>
<div id="photoList"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function openDashboard(){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadPhotos();
loadNotices();
}

window.login=function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
if(email=="nmpsnagguradiya@gmail.com" && password=="Nmps@123"){
localStorage.setItem("adminLogin","true");
openDashboard();
}else{
alert("Wrong Login");
}
}

if(localStorage.getItem("adminLogin")=="true"){
openDashboard();
}

// Notice functions
window.uploadNotice=async function(){
const text=document.getElementById("noticeText").value;
if(!text){ alert("Enter notice text"); return; }
await addDoc(collection(db,"notice"),{text:text});
alert("Notice Uploaded");
loadNotices();
}

async function loadNotices(){
const snapshot=await getDocs(collection(db,"notice"));
const list=document.getElementById("noticeList");
list.innerHTML="";
snapshot.forEach((d)=>{
const data=d.data();
const div=document.createElement("div");
div.innerHTML=`<p>${data.text}</p>
<button onclick="deleteNotice('${d.id}')">Delete</button>`;
list.appendChild(div);
});
}

window.deleteNotice=async function(id){
await deleteDoc(doc(db,"notice",id));
loadNotices();
}

// Photo functions (Multiple)
window.uploadPhotos=async function(){
const files=document.getElementById("photoFiles").files;
const title=document.getElementById("photoTitle").value;
const link=document.getElementById("photoLink").value;

if(files.length==0){ alert("Select at least one file"); return; }

for(let i=0;i<files.length;i++){
const file=files[i];
const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
const url=data.data.url;

await addDoc(collection(db,"gallery"),{type:"image",url:url,title:title,link:link});
}

alert("Photos Uploaded Successfully");
loadPhotos();
}

async function loadPhotos(){
const snapshot=await getDocs(collection(db,"gallery"));
const list=document.getElementById("photoList");
list.innerHTML="";
snapshot.forEach((d)=>{
const data=d.data();
if(data.type=="image"){
const div=document.createElement("div");
div.className="media";
div.innerHTML=`
<img src="${data.url}">
<p><b>${data.title || ''}</b></p>
${data.link ? `<a href="${data.link}" target="_blank">Link</a>` : ''}
<button onclick="deletePhoto('${d.id}')">Delete</button>`;
list.appendChild(div);
}
});
}

window.deletePhoto=async function(id){
await deleteDoc(doc(db,"gallery",id));
loadPhotos();
}

</script>

</body>
</html>
