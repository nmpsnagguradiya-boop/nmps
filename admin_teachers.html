<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Admin - Teachers</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

form{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
margin-top:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

.teacherList{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.actions button{
width:48%;
margin-top:5px;
}

</style>

</head>

<body>

<header>Admin - Teacher Management</header>

<div class="container">

<form id="teacherForm">

<input type="text" id="name" placeholder="Teacher Name" required>

<input type="text" id="subject" placeholder="Subject" required>

<input type="text" id="qualification" placeholder="Qualification" required>

<input type="text" id="mobile" placeholder="Mobile Number" required>

<label>Teacher Photo</label>
<input type="file" id="photo" required>

<button type="submit">Add Teacher</button>

</form>

<div class="teacherList" id="teacherList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId=null;

document.getElementById("teacherForm").addEventListener("submit",async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const subject=document.getElementById("subject").value;
const qualification=document.getElementById("qualification").value;
const mobile=document.getElementById("mobile").value;

const file=document.getElementById("photo").files[0];

let photoURL="";

if(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{

method:"POST",
body:formData

});

const data=await res.json();
photoURL=data.data.url;

}

if(editId){

await updateDoc(doc(db,"teachers",editId),{

name:name,
subject:subject,
qualification:qualification,
mobile:mobile,
photo:photoURL

});

editId=null;

}else{

await addDoc(collection(db,"teachers"),{

name:name,
subject:subject,
qualification:qualification,
mobile:mobile,
photo:photoURL

});

}

document.getElementById("teacherForm").reset();

loadTeachers();

});

async function loadTeachers(){

const querySnapshot=await getDocs(collection(db,"teachers"));

let html="";

querySnapshot.forEach((d)=>{

const data=d.data();

html+=`

<div class="card">

<img src="${data.photo}">

<h3>${data.name}</h3>

<p>${data.subject}</p>

<p>${data.qualification}</p>

<p>${data.mobile}</p>

<div class="actions">

<button onclick="editTeacher('${d.id}','${data.name}','${data.subject}','${data.qualification}','${data.mobile}')">Edit</button>

<button onclick="deleteTeacher('${d.id}')">Delete</button>

</div>

</div>

`;

});

document.getElementById("teacherList").innerHTML=html;

}

window.deleteTeacher=async function(id){

if(confirm("Delete Teacher?")){

await deleteDoc(doc(db,"teachers",id));

loadTeachers();

}

}

window.editTeacher=function(id,name,subject,qualification,mobile){

editId=id;

document.getElementById("name").value=name;
document.getElementById("subject").value=subject;
document.getElementById("qualification").value=qualification;
document.getElementById("mobile").value=mobile;

window.scrollTo(0,0);

}

loadTeachers();

</script>

</body>

</html>
