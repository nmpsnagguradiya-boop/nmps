<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:500px;margin:40px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input,button{width:100%;padding:10px;margin:8px 0;}
button{border:none;background:#004aad;color:white;font-size:16px;border-radius:8px;cursor:pointer;}
button:hover{background:#003080;}
img#preview{width:100px;height:100px;object-fit:cover;margin-top:10px;border-radius:50%;display:none;}
</style>
</head>
<body>

<div class="container">
<h2>School Profile</h2>
<input id="pname" placeholder="School Name" required>
<input id="paddress" placeholder="Address" required>
<input id="pschoolid" placeholder="School ID (Optional)">
<input id="pdise" placeholder="DISE Code" required>
<input type="file" id="plogo">
<img id="preview" alt="Logo Preview">
<button onclick="saveProfile()">Save Profile</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔹 Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94",
  storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
  messagingSenderId: "811957568318",
  appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 Imgbb upload function
async function uploadImg(file){
  const key = "21000d5a5d14fcef4b6af4d13647da5a8"; // Apka Imgbb API Key
  const fd = new FormData();
  fd.append("image", file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${key}`, {method:"POST", body:fd});
  const data = await res.json();
  return data.data.url;
}

// 🔹 Show logo preview
const plogo = document.getElementById("plogo");
plogo.addEventListener("change", ()=>{
  const file = plogo.files[0];
  if(file){
    const preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

// 🔹 Save Profile
window.saveProfile = async function(){
  const name = document.getElementById("pname").value.trim();
  const address = document.getElementById("paddress").value.trim();
  const schoolId = document.getElementById("pschoolid").value.trim();
  const dise = document.getElementById("pdise").value.trim();
  const file = plogo.files[0];
  
  if(!name || !address || !dise){
    alert("Please fill all required fields!");
    return;
  }

  let logo = "";
  if(file) logo = await uploadImg(file);

  await setDoc(doc(db,"school_profile","profile"),{
    name,
    address,
    schoolId: schoolId || "",
    dise,
    logo
  }, {merge:true});

  alert("Profile saved successfully!");
  window.location.href = "Admin-login.html"; // Redirect after save
};

// 🔹 Load existing profile if available
(async()=>{
  const snap = await getDoc(doc(db,"school_profile","profile"));
  if(snap.exists()){
    const d = snap.data();
    document.getElementById("pname").value = d.name || "";
    document.getElementById("paddress").value = d.address || "";
    document.getElementById("pschoolid").value = d.schoolId || "";
    document.getElementById("pdise").value = d.dise || "";
    if(d.logo){
      const preview = document.getElementById("preview");
      preview.src = d.logo;
      preview.style.display = "block";
    }
  }
})();
</script>

</body>
</html>
