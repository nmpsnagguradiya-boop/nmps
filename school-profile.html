<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Profile</title>

<style>
body{font-family:Arial;background:#f2f2f2}
.container{max-width:600px;margin:30px auto;background:white;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#004aad;color:white;border:none;border-radius:8px}
img{width:120px;height:120px;border-radius:10px;margin-top:10px;object-fit:cover}
</style>

</head>
<body>

<div class="container">

<h2>School Profile</h2>

<input id="sname" placeholder="School Name">
<input id="semail" placeholder="Admin Email">
<input id="spass" placeholder="Admin Password">
<input id="saddress" placeholder="Address">
<input id="sdise" placeholder="DISE Code">
<input id="srecognition" placeholder="Recognition ID">
<input id="ssession" placeholder="Session">

<label>School Logo</label>
<input type="file" id="logo">

<img id="logoPreview">

<button onclick="saveProfile()">Save Profile</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

let currentLogo="";

const logoInput=document.getElementById("logo");
const preview=document.getElementById("logoPreview");


logoInput.addEventListener("change",()=>{
const file=logoInput.files[0];
if(file){
preview.src=URL.createObjectURL(file);
}
});


async function uploadImage(file){

const formData=new FormData();

formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{

method:"POST",
body:formData

});

const data=await res.json();

if(data.success){

return data.data.url;

}else{

console.log(data);
alert("Image upload failed");
return "";

}

}


async function loadProfile(){

const ref=doc(db,"schools",schoolId);

const snap=await getDoc(ref);

if(snap.exists()){

const d=snap.data();

sname.value=d.name||"";
semail.value=d.adminEmail||"";
spass.value=d.adminPassword||"";
saddress.value=d.address||"";
sdise.value=d.dise||"";
srecognition.value=d.recognition||"";
ssession.value=d.session||"";

if(d.logo){

preview.src=d.logo;
currentLogo=d.logo;

}

}

}

loadProfile();


window.saveProfile=async function(){

let logoURL=currentLogo;

const file=logoInput.files[0];

if(file){

logoURL=await uploadImage(file);

if(!logoURL) return;

}

await setDoc(doc(db,"schools",schoolId),{

name:sname.value,
adminEmail:semail.value,
adminPassword:spass.value,
address:saddress.value,
dise:sdise.value,
recognition:srecognition.value,
session:ssession.value,
logo:logoURL

},{merge:true});


preview.src=logoURL;

alert("Profile saved successfully");

}

</script>

</body>
</html>
