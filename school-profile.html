<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload School Logo</title>
<style>
body{font-family:Arial;padding:40px}
img{width:120px;margin-top:10px}
</style>
</head>
<body>

<h2>Upload School Logo</h2>

<input type="file" id="logo">
<br><br>

<button onclick="uploadLogo()">Upload Logo</button>

<br>
<img id="preview">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=> resolve(reader.result.split(',')[1]);
reader.onerror = error => reject(error);
});
}

window.uploadLogo = async function(){

const file = document.getElementById("logo").files[0];

if(!file){
alert("Select logo first");
return;
}

const base64 = await toBase64(file);

const formData = new FormData();
formData.append("image",base64);

const res = await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{
method:"POST",
body:formData
});

const data = await res.json();

if(!data.success){
alert("Image upload failed");
console.log(data);
return;
}

const url = data.data.url;

document.getElementById("preview").src = url;

await setDoc(doc(db,"schools",schoolId),{
logo:url
},{merge:true});

alert("Logo saved successfully");

}

</script>

</body>
</html>
