<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update School Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:600px;margin:30px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input,button{width:100%;padding:10px;margin:8px 0;}
button{border:none;background:#004aad;color:white;font-size:16px;border-radius:8px;cursor:pointer;}
button:hover{background:#003080;}
img.preview{width:100px;height:100px;object-fit:cover;margin-top:5px;border-radius:10px;display:none;}
</style>
</head>
<body>

<div class="container">
<h2>Update School Profile</h2>
<input type="hidden" id="schoolId">
<input id="sname" placeholder="School Name" required>
<input id="semail" placeholder="Admin Email" required>
<input id="spass" placeholder="Admin Password" required>
<input id="saddress" placeholder="Address" required>
<input id="sdise" placeholder="DISE Code" required>
<input id="srecognition" placeholder="Recognition / Manyata ID">
<label>School Logo</label>
<input type="file" id="slogo" accept="image/*">
<img id="logoPreview" class="preview">
<label>Current Session / Academic Year</label>
<input id="ssession" placeholder="Ex: 2026-2027">
<button id="saveBtn">Save Profile</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const slogo = document.getElementById("slogo");
const logoPreview = document.getElementById("logoPreview");

// Current admin schoolId (from login)
const currentSchoolId = localStorage.getItem("schoolId") || "school_001";

// Show preview on file select
slogo.addEventListener("change", ()=>{
    const file = slogo.files[0];
    if(file){ 
        logoPreview.src = URL.createObjectURL(file); 
        logoPreview.style.display="block"; 
    }
});

// Imgbb Upload
async function uploadImg(file){
    if(!file) return "";
    const key = "21000d5a5d14fcef4b6af4d13647da5a8";
    const fd = new FormData();
    fd.append("image", file);
    try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${key}`, {method:"POST", body:fd});
        const data = await res.json();
        return data?.data?.url || "";
    } catch(err){
        console.error("Image upload failed:", err);
        return "";
    }
}

// Load existing profile
async function loadProfile(){
    try {
        const schoolRef = doc(db,"schools",currentSchoolId);
        const snap = await getDoc(schoolRef);
        if(snap.exists()){
            const d = snap.data();
            document.getElementById("sname").value = d.name || "";
            document.getElementById("semail").value = d.adminEmail || "";
            document.getElementById("spass").value = d.adminPassword || "";
            document.getElementById("saddress").value = d.address || "";
            document.getElementById("sdise").value = d.dise || "";
            document.getElementById("srecognition").value = d.recognition || "";
            document.getElementById("ssession").value = d.session || "";
            if(d.logo){ 
                logoPreview.src = d.logo; 
                logoPreview.style.display="block"; 
            }
        }
    } catch(e) {
        console.error("Error loading profile:", e);
    }
}

loadProfile();

// Save / Update
document.getElementById("saveBtn").addEventListener("click", async ()=>{
    const name = document.getElementById("sname").value.trim();
    const email = document.getElementById("semail").value.trim();
    const password = document.getElementById("spass").value.trim();
    const address = document.getElementById("saddress").value.trim();
    const dise = document.getElementById("sdise").value.trim();
    const recognition = document.getElementById("srecognition").value.trim();
    const session = document.getElementById("ssession").value.trim();
    const logoFile = slogo.files[0];

    if(!name||!email||!password||!address||!dise){ 
        alert("Please fill all required fields"); 
        return; 
    }

    try{
        let logoUrl = "";
        if(logoFile){ 
            logoUrl = await uploadImg(logoFile);
            if(!logoUrl) console.warn("Logo upload failed, saving without logo");
        }

        const schoolRef = doc(db,"schools",currentSchoolId);
        await setDoc(schoolRef,{
            name,
            adminEmail: email,
            adminPassword: password,
            address,
            dise,
            recognition: recognition || "",
            session: session || "",
            ...(logoUrl ? {logo: logoUrl} : {})
        },{merge:true});

        // Show saved logo immediately
        if(logoUrl){
            logoPreview.src = logoUrl;
            logoPreview.style.display="block";
        }

        alert("Profile saved successfully!");
    } catch(e){
        console.error("Error saving profile:", e);
        alert("Error saving profile, please check console");
    }
});
</script>

</body>
</html>
