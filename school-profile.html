<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:500px;margin:30px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input{width:100%;padding:10px;margin:8px 0;}
input[readonly]{background:#e0e0e0;}
button{padding:12px;border:none;background:#004aad;color:white;font-size:16px;border-radius:8px;cursor:pointer;}
button:hover{background:#003080;}
button#saveBtn{margin-top:10px;}
</style>
</head>
<body>

<div class="container">
<h2>School Profile</h2>
<input id="pname" placeholder="School Name">
<input id="paddress" placeholder="Address">
<input id="pschoolid" placeholder="School ID">
<input id="pdise" placeholder="DISE Code">
<input type="file" id="plogo">
<button id="saveBtn" onclick="saveProfile()">Save Profile</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const pname = document.getElementById("pname");
const paddress = document.getElementById("paddress");
const pschoolid = document.getElementById("pschoolid");
const pdise = document.getElementById("pdise");
const plogo = document.getElementById("plogo");
const saveBtn = document.getElementById("saveBtn");

// IMGBB upload
async function uploadImg(file){
    const key="21000d5a5d14fcef4b6af4d13647da5a8";
    const fd = new FormData();
    fd.append("image",file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${key}`,{method:"POST",body:fd});
    const data = await res.json();
    return data.data.url;
}

// Save profile
async function saveProfile(){
    let logo = "";
    const file = plogo.files[0];
    if(file) logo = await uploadImg(file);

    await setDoc(doc(db,"school","profile"),{
        name: pname.value,
        address: paddress.value,
        schoolId: pschoolid.value,
        dise: pdise.value,
        logo
    },{merge:true});

    alert("Profile Saved!");
}

// Load existing profile
async function loadProfile(){
    const snap = await getDoc(doc(db,"school","profile"));
    if(snap.exists()){
        const d = snap.data();
        pname.value = d.name || "";
        paddress.value = d.address || "";
        pschoolid.value = d.schoolId || "";
        pdise.value = d.dise || "";
    }
}

// Check user role
onAuthStateChanged(auth, async user => {
    if(!user) {
        alert("Please login as Admin");
        location.href = "login.html";
        return;
    }

    const adminRef = doc(db,"admins",user.uid);
    const adminSnap = await getDoc(adminRef);

    if(adminSnap.exists()){
        // Admin -> editable
        pname.readOnly = false;
        paddress.readOnly = false;
        pschoolid.readOnly = false;
        pdise.readOnly = false;
        plogo.disabled = false;
        saveBtn.style.display = "block";
    } else {
        // Teacher -> readonly
        pname.readOnly = true;
        paddress.readOnly = true;
        pschoolid.readOnly = true;
        pdise.readOnly = true;
        plogo.disabled = true;
        saveBtn.style.display = "none";
    }

    await loadProfile();
});
</script>
</body>
</html>
