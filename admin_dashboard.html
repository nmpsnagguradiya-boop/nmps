<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login - Multi-School ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.container{max-width:400px;margin:80px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.3);}
input,button{width:100%;padding:12px;margin:8px 0;}
button{background:#004aad;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
button:hover{background:#003080;}
</style>
</head>
<body>
<div class="container">
<h2>Admin Login</h2>
<input id="email" type="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94",
  storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
  messagingSenderId: "811957568318",
  appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();
  if(!email || !pass){ alert("Enter email & password"); return; }
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    alert("Login Successful!");
    window.location.href="dashboard.html";
  } catch(e){
    alert("Login Failed: "+e.message);
  }
}
</script>
</body>
</html>
