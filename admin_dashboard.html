<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate School ERP - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
#loginBox{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.loginCard{background:white;padding:30px;box-shadow:0 0 10px rgba(0,0,0,0.3);border-radius:10px;width:90%;max-width:350px;text-align:center;}
select,input{width:100%;padding:10px;margin:8px 0;}
button{padding:12px;border:none;background:#004aad;color:white;font-size:16px;border-radius:8px;cursor:pointer;width:100%;margin-top:10px;}
button:hover{background:#003080;}
</style>
</head>
<body>

<div id="loginBox">
<div class="loginCard">
<h3>School ERP Login</h3>
<select id="schoolSelect"><option value="">Select School</option></select>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔹 Load schools into dropdown
async function loadSchools(){
    const snap = await getDocs(collection(db,"schools"));
    snap.forEach(d=>{
        const option = document.createElement("option");
        option.value = d.id;
        option.innerText = d.data().name || d.id;
        document.getElementById("schoolSelect").appendChild(option);
    });
}
loadSchools();

let selectedSchoolId = "";
document.getElementById("schoolSelect").addEventListener("change", e=>{
    selectedSchoolId = e.target.value;
});

// 🔹 Login function
window.login = async function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!selectedSchoolId){ alert("Select a school"); return; }
    if(!email || !password){ alert("Enter email & password"); return; }

    // Admin login via Firebase Auth
    try{
        await signInWithEmailAndPassword(auth,email,password);
        sessionStorage.setItem("schoolId",selectedSchoolId);
        sessionStorage.setItem("userType","admin");
        window.location.href="admin-dashboard.html";
        return;
    }catch(e){ 
        // Not admin, try teacher login
    }

    // Teacher login via Firestore
    const teachersSnap = await getDocs(collection(db,`schools/${selectedSchoolId}/teachers`));
    let found = false;
    teachersSnap.forEach(docSnap=>{
        const data = docSnap.data();
        if(data.email===email && data.password===password){
            found = true;
            sessionStorage.setItem("schoolId",selectedSchoolId);
            sessionStorage.setItem("userType","teacher");
            sessionStorage.setItem("teacherPages",JSON.stringify(data.pages||[]));
        }
    });

    if(found){
        window.location.href="admin-dashboard.html";
    }else{
        alert("Invalid credentials");
    }
}

// 🔹 Persist session on refresh
onAuthStateChanged(auth,user=>{
    const schoolId = sessionStorage.getItem("schoolId");
    const type = sessionStorage.getItem("userType");
    if(user || (schoolId && type)){
        window.location.href="admin-dashboard.html";
    }
});
</script>

</body>
</html>
