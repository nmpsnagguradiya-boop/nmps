<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admit Card Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,input,textarea,button{
padding:10px;
margin:6px;
width:100%;
max-width:280px;
}

textarea{height:70px}

button{
background:#004aad;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.students{
border:1px solid #ccc;
padding:10px;
max-height:250px;
overflow:auto;
}

.admit-container{
display:grid;
gap:15px;
}

.two{grid-template-columns:1fr 1fr;}
.four{grid-template-columns:1fr 1fr;}
.six{grid-template-columns:1fr 1fr 1fr;}

.admit-card{
border:2px solid #004aad;
padding:10px;
border-radius:6px;
background:white;
position:relative;
overflow:hidden;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.07;
width:180px;
}

.school{
display:flex;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:5px;
margin-bottom:5px;
}

.school img{
width:50px;
height:50px;
object-fit:cover;
}

.school-name{
font-weight:bold;
color:#004aad;
font-size:16px;
}

.school-address{
font-size:12px;
}

.exam-title{
text-align:center;
font-weight:bold;
margin-top:4px;
}

.title{
text-align:center;
font-weight:bold;
font-size:18px;
}

.student{
display:flex;
justify-content:space-between;
}

.student img{
width:70px;
height:80px;
object-fit:cover;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:6px;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
text-align:center;
}

.guideline{
font-size:11px;
margin-top:8px;
}

.sign{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

.bulk{
margin-bottom:10px;
}

@media print{
header,.card{display:none}
}

</style>
</head>

<body>

<header>Admit Card Print</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect"></select>

<select id="examSelect"></select>

<select id="layout">
<option value="two">2 Card Per Page</option>
<option value="four">4 Card Per Page</option>
<option value="six">6 Card Per Page</option>
</select>

<select id="watermarkSelect">
<option value="no">Without Watermark</option>
<option value="yes">With Watermark</option>
</select>

<input id="durationInput" placeholder="Exam Duration Example 3 Hours">

<textarea id="guidelineInput" placeholder="Enter Guidelines"></textarea>

<button onclick="loadStudents()">Load Students</button>

</div>

<div class="card">

<div class="bulk">

<button onclick="selectAll()">Select All</button>
<button onclick="unselectAll()">Unselect All</button>

</div>

<div id="studentList" class="students"></div>

<button onclick="generateCards()">Generate Admit Card</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="admitArea" class="admit-container"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let activeSession="";
let students=[];
let timetable=[];
let schoolData={};
let examName="";

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()) schoolData=snap.data();

}

loadSchool();


async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

const sessions=snap.data().sessions||[];

let html='<option>Select Session</option>';

sessions.forEach(s=>html+=`<option>${s}</option>`);

sessionSelect.innerHTML=html;

}

loadSessions();


sessionSelect.onchange=function(){

activeSession=this.value;

loadClasses();

loadExams();

}


async function loadClasses(){

const q=query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

let classes=new Set();

snap.forEach(d=>{

classes.add(d.data().class);

});

let html='<option>Select Class</option>';

classes.forEach(c=>{

html+=`<option>${c}</option>`;

});

classSelect.innerHTML=html;

}


async function loadExams(){

const q=query(
collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

let html='<option>Select Exam</option>';

snap.forEach(d=>{

html+=`<option value="${d.id}">${d.data().examName}</option>`;

});

examSelect.innerHTML=html;

}


window.loadStudents=async function(){

const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",activeSession),
where("class","==",cls)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

let html="";

students.forEach(s=>{

html+=`
<label>
<input type="checkbox" value="${s.id}">
${s.roll||""} - ${s.name}
</label><br>
`;

});

studentList.innerHTML=html;

}


window.selectAll=function(){

document.querySelectorAll("#studentList input").forEach(i=>i.checked=true);

}

window.unselectAll=function(){

document.querySelectorAll("#studentList input").forEach(i=>i.checked=false);

}

window.downloadPDF=function(){

const element=document.getElementById("admitArea");

html2pdf().from(element).save("admit-cards.pdf");

}

</script>

</body>
</html>
