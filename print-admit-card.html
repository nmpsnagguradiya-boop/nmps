<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Admit Card</title>
<style>
body{font-family:Arial; background:#f2f2f2; margin:0; padding:0;}
header{background:#004aad; color:white; padding:15px; text-align:center; font-size:22px;}
.container{padding:20px; max-width:900px; margin:auto;}
select,button{padding:8px; margin:5px;}
button{background:#004aad; color:white; border:none; cursor:pointer;}
.admitCardContainer{display:flex; flex-wrap:wrap; justify-content:space-between;}
.admitCard{width:48%; border:2px solid #004aad; background:#e6f0ff; margin-bottom:15px; padding:15px; box-sizing:border-box;}
.schoolHeader{background:#004aad; color:white; padding:5px; text-align:center; margin-bottom:10px; font-weight:bold;}
.studentPhoto{width:80px; height:80px; border:1px solid #000; margin-bottom:10px;}
.timetable, .guidelines{font-size:12px; margin-top:10px;}
table{width:100%; border-collapse:collapse; font-size:12px; margin-top:5px;}
table, th, td{border:1px solid #000;}
th, td{padding:4px; text-align:center;}
.principal{margin-top:20px; text-align:right; font-weight:bold;}
@media print{
  body *{visibility:hidden;}
  #printSection, #printSection *{visibility:visible;}
  #printSection{position:absolute; top:0; left:0; width:100%;}
}
</style>
</head>
<body>

<header>Print Admit Card</header>
<div class="container">
  <div>
    <label>Select Session:</label>
    <select id="sessionSelect"></select>
    <label>Select Exam:</label>
    <select id="examSelect"></select>
    <label>Select Class:</label>
    <select id="classSelect">
      <option value="">Select Class</option>
      <option>Nursery</option>
      <option>LKG</option>
      <option>UKG</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
      <option>9</option>
      <option>10</option>
    </select>
    <label>Select Student:</label>
    <select id="studentSelect"><option value="">Select Student</option></select>
    <br>
    <button onclick="generateAdmitCard()">Generate Admit Card</button>
  </div>

  <div id="printSection" class="admitCardContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId:"nmpsnagguradiya-b9b94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let sessions=[], exams=[], students=[];

async function loadSessionsExams(){
  // Load Sessions
  const snapSessions = await getDocs(collection(db,"exam_sessions"));
  let htmlSession = '<option value="">Select Session</option>';
  snapSessions.forEach(d=>{let e=d.data(); htmlSession+=`<option value="${d.id}">${e.session}</option>`;});
  document.getElementById("sessionSelect").innerHTML = htmlSession;

  // Load Exams
  const snapExams = await getDocs(collection(db,"exam_sessions"));
  let htmlExam = '<option value="">Select Exam</option>';
  snapExams.forEach(d=>{let e=d.data(); htmlExam+=`<option value="${d.id}">${e.examName}</option>`;});
  document.getElementById("examSelect").innerHTML = htmlExam;
}

document.getElementById("classSelect").addEventListener("change", async function(){
  let cls = this.value;
  let studentSel = document.getElementById("studentSelect");
  studentSel.innerHTML = "<option value=''>Select Student</option>";
  if(cls=="") return;
  const q = query(collection(db,"admissions"), where("class","==",cls));
  const snap = await getDocs(q);
  if(snap.empty){
    alert("No students found in this class");
    return;
  }
  snap.forEach(d=>{
    let s = d.data();
    students.push({id:d.id,...s});
    let name = s.name || "";
    studentSel.innerHTML += `<option value="${d.id}">${name}</option>`;
  });
});

window.generateAdmitCard = async function(){
  let studentId = document.getElementById("studentSelect").value;
  if(!studentId){alert("Select a student"); return;}
  const student = students.find(s=>s.id==studentId);
  const examId = document.getElementById("examSelect").value;
  const sessionId = document.getElementById("sessionSelect").value;
  if(!examId || !sessionId){alert("Select Session & Exam"); return;}

  const q = query(collection(db,"exam_subjects"), where("class","==",student.class), where("sessionId","==",sessionId), where("examId","==",examId));
  const snap = await getDocs(q);
  let timetable = "";
  snap.forEach(d=>{
    let s = d.data();
    timetable += `<tr><td>${s.subject}</td><td>${s.date}</td><td>${s.day}</td><td>${s.time}</td></tr>`;
  });

  let printDiv = document.getElementById("printSection");
  printDiv.innerHTML = `
    <div class="admitCard">
      <div class="schoolHeader">YOUR SCHOOL NAME</div>
      <p><b>Session:</b> ${document.getElementById("sessionSelect").selectedOptions[0].text}</p>
      <p><b>Exam:</b> ${document.getElementById("examSelect").selectedOptions[0].text}</p>
      <img src="${student.photo||''}" class="studentPhoto" alt="Photo">
      <p><b>Name:</b> ${student.name}</p>
      <p><b>Father:</b> ${student.father}</p>
      <p><b>Mother:</b> ${student.mother||''}</p>
      <p><b>Roll No:</b> ${student.roll}</p>
      <p><b>Class:</b> ${student.class}</p>
      <p><b>Mobile:</b> ${student.mobile}</p>
      <h4>Timetable</h4>
      <table><tr><th>Subject</th><th>Date</th><th>Day</th><th>Time</th></tr>${timetable}</table>
      <div class="guidelines"><b>Guidelines:</b> Follow all exam rules and reach school 15 minutes early.</div>
      <div class="principal">Principal Sign</div>
    </div>
  `;

  // Duplicate for 2 cards per page
  printDiv.innerHTML += printDiv.innerHTML;
  window.print();
}

loadSessionsExams();
</script>

</body>
</html>
