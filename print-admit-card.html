<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Admit Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {font-family:Arial, sans-serif; background:#f2f2f2; margin:0; padding:0;}
header {background:#004aad; color:white; text-align:center; padding:15px; font-size:22px;}
.container {max-width:1000px; margin:auto; padding:20px;}
.card {background:white; padding:20px; margin-bottom:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.admit-card {border:2px solid #004aad; padding:10px; margin:10px; width:48%; display:inline-block; vertical-align:top; box-sizing:border-box; page-break-inside:avoid; background:white;}
.admit-card img {width:80px; height:100px; object-fit:cover; float:right;}
.admit-card h3 {margin:5px 0;}
.admit-card table {width:100%; border-collapse:collapse; margin-top:10px;}
.admit-card table, th, td {border:1px solid #ccc;}
th, td {padding:6px; text-align:center;}
.guideline {margin-top:10px; font-size:14px; color:#333;}
.signature {margin-top:20px; display:flex; justify-content:space-between; font-weight:bold;}
button {padding:8px 12px; margin:5px; border:none; border-radius:5px; cursor:pointer;}
.save {background:#004aad;color:white;}
.print {background:#28a745;color:white;}
#studentsList {max-height:150px; overflow-y:auto; border:1px solid #ccc; padding:5px;}
.studentItem {display:block; margin:3px 0;}
input[type=time] {width:auto;}
@media (max-width:768px){
  .admit-card {width:100%; margin:5px 0;}
  img {float:none; display:block; margin:auto;}
}
</style>
</head>
<body>
<header>Print Admit Cards</header>
<div class="container">

<!-- Class & Exam Select -->
<div class="card">
<h3>Select Class & Exam</h3>
<select id="selectClass"><option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<select id="selectExam"><option value="">Select Exam</option></select>
<button class="save" onclick="loadStudents()">Load Students</button>
</div>

<!-- Guideline & Time -->
<div class="card">
<input type="text" id="guidelineInput" placeholder="Enter guideline for admit card">
<input type="time" id="timeInput" value="09:00">
<button class="save" onclick="saveGuideline()">Save Guideline & Time</button>
</div>

<!-- Student Selection -->
<div class="card">
<h3>Students List</h3>
<div id="studentsList"></div>
<button class="save" onclick="generateAdmitCards()">Generate Selected Admit Cards</button>
</div>

<!-- Admit Cards -->
<div id="admitCardsContainer"></div>
<button class="print" onclick="window.print()">Print Admit Cards</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId:"nmpsnagguradiya-b9b94"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let guidelineText = "";
let examTime = "";

// Load exams into dropdown
async function loadExams(){
  const snap = await getDocs(collection(db,"exam_sessions"));
  let html='<option value="">Select Exam</option>';
  snap.forEach(d=>{ html+=`<option value="${d.id}">${d.data().examName}</option>`; });
  document.getElementById("selectExam").innerHTML = html;
}
loadExams();

// Save guideline & time
window.saveGuideline = async function(){
  guidelineText = document.getElementById("guidelineInput").value;
  examTime = document.getElementById("timeInput").value;
  if(!guidelineText) return alert("Enter guideline");
  await setDoc(doc(db,"admit_guidelines","guideline"), {text: guidelineText, time: examTime});
  alert("Guideline & Time saved");
}

// Load students for selected class
window.loadStudents = async function(){
  const cls = document.getElementById("selectClass").value;
  if(!cls) return alert("Select class");
  const studentSnap = await getDocs(collection(db,"admissions"));
  const students = studentSnap.docs.filter(d=>d.data().class===cls);
  let html="";
  students.forEach(s=>{
    html += `<label class="studentItem">
      <input type="checkbox" class="studentCheckbox" value="${s.id}"> ${s.data().name} (Roll: ${s.data().roll})
    </label>`;
  });
  document.getElementById("studentsList").innerHTML = html;
}

// Generate admit cards for selected students
window.generateAdmitCards = async function(){
  const cls = document.getElementById("selectClass").value;
  const examId = document.getElementById("selectExam").value;
  if(!cls || !examId) return alert("Select class and exam");

  const selectedIds = Array.from(document.querySelectorAll(".studentCheckbox:checked")).map(cb=>cb.value);
  if(selectedIds.length===0) return alert("Select at least one student");

  // Get timetable for class & exam
  const ttSnap = await getDocs(collection(db,"timetable"));
  const timetableDocs = ttSnap.docs.filter(d=>d.data().class===cls && d.data().examId===examId);

  // Get subjects names
  const subjectSnap = await getDocs(collection(db,"subjects"));
  const subjectsMap = {};
  subjectSnap.docs.forEach(d=>{ subjectsMap[d.id] = d.data().name; });

  // Get guideline & time
  const guideDoc = await getDoc(doc(db,"admit_guidelines","guideline"));
  guidelineText = guideDoc.exists() ? guideDoc.data().text : "";
  examTime = guideDoc.exists() ? guideDoc.data().time : "09:00";

  let html="";
  for(let i=0;i<selectedIds.length;i++){
    const sDoc = await getDoc(doc(db,"admissions",selectedIds[i]));
    if(!sDoc.exists()) continue;
    const s = sDoc.data();

    html += `<div class="admit-card">
      <img src="${s.photo || ''}" alt="Photo">
      <h3>YOUR SCHOOL NAME</h3>
      <p><b>Name:</b> ${s.name}</p>
      <p><b>Father:</b> ${s.father}</p>
      <p><b>Roll:</b> ${s.roll}</p>
      <p><b>Class:</b> ${s.class}</p>
      <p><b>Exam Time:</b> ${examTime}</p>
      <table>
        <tr><th>Subject</th><th>Date</th><th>Day</th><th>Time</th></tr>`;

    timetableDocs.forEach(tt=>{
      html += `<tr>
        <td>${subjectsMap[tt.data().subjectId] || tt.data().subjectId}</td>
        <td>${tt.data().date}</td>
        <td>${tt.data().day}</td>
        <td>${tt.data().time}</td>
      </tr>`;
    });

    html += `</table>
      <div class="guideline">${guidelineText}</div>
      <div class="signature">
        <span>Principal</span>
        <span>Director</span>
      </div>
    </div>`;

    if((i+1)%2===0) html+='<div style="clear:both"></div>';
  }

  document.getElementById("admitCardsContainer").innerHTML = html;
}
</script>
</body>
  </html>
