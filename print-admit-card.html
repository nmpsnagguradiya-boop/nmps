<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admit Card Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{padding:20px;max-width:1200px;margin:auto;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,input,textarea,button{
padding:10px;
margin:5px;
width:100%;
max-width:300px;
}

textarea{height:80px;}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

.students{
border:1px solid #ccc;
padding:10px;
max-height:250px;
overflow:auto;
}

.admit-container{
display:grid;
gap:15px;
}

.two{grid-template-columns:1fr 1fr;}
.four{grid-template-columns:1fr 1fr;}

.admit-card{
border:2px solid #004aad;
padding:10px;
border-radius:6px;
background:white;
}

.school{
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:5px;
margin-bottom:5px;
}

.school img{
width:50px;
height:50px;
object-fit:cover;
}

.school-name{
font-weight:bold;
font-size:16px;
color:#004aad;
}

.school-address{
font-size:12px;
}

.title{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:5px;
}

.student{
display:flex;
justify-content:space-between;
}

.student img{
width:70px;
height:80px;
object-fit:cover;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:8px;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
text-align:center;
}

.guideline{
margin-top:10px;
font-size:11px;
}

.sign{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

@media print{
header,.card{display:none;}
}

</style>
</head>

<body>

<header>Admit Card Print</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect"></select>

<select id="layout">
<option value="two">2 Card Per Page</option>
<option value="four">4 Card Per Page</option>
</select>

<input type="text" id="durationInput" placeholder="Exam Duration Example: 3 Hours">

<textarea id="guidelineInput" placeholder="Enter Exam Guidelines"></textarea>

<button onclick="loadStudents()">Load Students</button>

</div>

<div class="card">

<div id="studentList" class="students"></div>

<button onclick="generateCards()">Generate Admit Cards</button>
<button onclick="window.print()">Print</button>

</div>

<div id="admitArea" class="admit-container"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let activeSession="";
let students=[];
let timetable=[];
let schoolData={};


// LOAD SCHOOL DATA

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()) schoolData=snap.data();

}

loadSchool();


// LOAD SESSIONS

async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(!snap.exists()) return;

const sessions=snap.data().sessions||[];

let html='<option value="">Select Session</option>';

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`;
});

sessionSelect.innerHTML=html;

}

loadSessions();


// SESSION SELECT

sessionSelect.onchange=function(){

activeSession=this.value;

localStorage.setItem("activeSession",activeSession);

loadExams();

}


// LOAD EXAMS

async function loadExams(){

const q=query(
collection(db,"exam_sessions"),
where("schoolId","==",schoolId),
where("session","==",activeSession)
);

const snap=await getDocs(q);

let html='<option value="">Select Exam</option>';

snap.forEach(d=>{
html+=`<option value="${d.id}">${d.data().examName}</option>`;
});

examSelect.innerHTML=html;

}


// LOAD STUDENTS

window.loadStudents=async function(){

const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",activeSession),
where("class","==",cls)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

let html="";

students.forEach(s=>{
html+=`
<label>
<input type="checkbox" value="${s.id}">
${s.roll||""} - ${s.name}
</label><br>
`;
});

studentList.innerHTML=html;

loadTimetable();

}


// LOAD TIMETABLE

async function loadTimetable(){

const examId=examSelect.value;
const cls=classSelect.value;

const q=query(
collection(db,"timetable"),
where("schoolId","==",schoolId),
where("session","==",activeSession),
where("examId","==",examId),
where("class","==",cls)
);

const snap=await getDocs(q);

timetable=[];

for(const d of snap.docs){

const data=d.data();

const subDoc=await getDoc(doc(db,"subjects",data.subjectId));

const subject=subDoc.exists()?subDoc.data().name:"";

timetable.push({
subject,
date:data.date,
day:data.day,
time:data.time
});

}

}


// GENERATE ADMIT CARD

window.generateCards=function(){

const layout=document.getElementById("layout").value;
const duration=document.getElementById("durationInput").value;
const guideline=document.getElementById("guidelineInput").value;

admitArea.className="admit-container "+layout;

const selected=[...document.querySelectorAll("#studentList input:checked")].map(e=>e.value);

let html="";

selected.forEach(id=>{

const s=students.find(x=>x.id==id);

let rows="";

timetable.forEach(t=>{
rows+=`
<tr>
<td>${t.subject}</td>
<td>${t.date}</td>
<td>${t.day}</td>
<td>${t.time}</td>
<td>${duration}</td>
</tr>
`;
});

html+=`

<div class="admit-card">

<div class="school">

<img src="${schoolData.logo||""}">

<div>

<div class="school-name">${schoolData.name||""}</div>
<div class="school-address">${schoolData.address||""}</div>
<div>Session : ${activeSession}</div>

</div>

</div>

<div class="title">ADMIT CARD</div>

<div class="student">

<div>

Roll : ${s.roll||""}<br>
Name : ${s.name||""}<br>
Father : ${s.father||""}<br>
Class : ${s.class||""}

</div>

<img src="${s.photo||""}">

</div>

<table>

<tr>
<th>Subject</th>
<th>Date</th>
<th>Day</th>
<th>Time</th>
<th>Duration</th>
</tr>

${rows}

</table>

<div class="guideline">

<b>Guidelines:</b><br>
${guideline}

</div>

<div class="sign">

<div>Principal Sign</div>
<div>Director Sign</div>

</div>

</div>

`;

});

admitArea.innerHTML=html;

}

</script>

</body>
  </html>
