<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admit Card Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{padding:20px;max-width:1200px;margin:auto;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,input,textarea,button{
padding:10px;
margin:5px;
width:100%;
max-width:300px;
}

textarea{height:80px;}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.students{
border:1px solid #ccc;
padding:10px;
max-height:250px;
overflow:auto;
}

.admit-container{
display:grid;
gap:15px;
}

.two{grid-template-columns:1fr 1fr;}
.four{grid-template-columns:1fr 1fr;}
.six{grid-template-columns:1fr 1fr 1fr;}

.admit-card{
border:2px solid #004aad;
padding:10px;
border-radius:6px;
background:white;
position:relative;
overflow:hidden;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.08;
width:180px;
}

.school{
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:5px;
margin-bottom:5px;
}

.school img{
width:50px;
height:50px;
object-fit:cover;
}

.school-name{
font-weight:bold;
font-size:16px;
color:#004aad;
}

.school-address{
font-size:12px;
}

.exam-title{
text-align:center;
font-weight:bold;
font-size:16px;
margin-top:5px;
}

.title{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:5px;
}

.student{
display:flex;
justify-content:space-between;
}

.student img{
width:70px;
height:80px;
object-fit:cover;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:8px;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
text-align:center;
}

.guideline{
margin-top:10px;
font-size:11px;
}

.sign{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

@media print{
header,.card{display:none;}
body{background:white;}
}

</style>
</head>

<body>

<header>Admit Card Print</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect"></select>

<select id="layout">
<option value="two">2 Card Per Page</option>
<option value="four">4 Card Per Page</option>
<option value="six">6 Card Per Page</option>
</select>

<select id="watermarkSelect">
<option value="off">Watermark OFF</option>
<option value="on">Watermark ON</option>
</select>

<input type="text" id="durationInput" placeholder="Exam Duration Example: 3 Hours">

<textarea id="guidelineInput" placeholder="Enter Exam Guidelines"></textarea>

<button onclick="loadStudents()">Load Students</button>

</div>

<div class="card">

<div id="studentList" class="students"></div>

<button onclick="generateCards()">Generate Admit Cards</button>
<button onclick="printCards()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="admitArea" class="admit-container"></div>

</div>

<script>

let students=[];
let timetable=[];
let examName="";

function generateCards(){

const selected=[...document.querySelectorAll("#studentList input:checked")].map(e=>e.value);

let html="";

selected.forEach(id=>{

const s=students.find(x=>x.id==id);

let rows="";

timetable.forEach(t=>{
rows+=`
<tr>
<td>${t.subject}</td>
<td>${t.date}</td>
<td>${t.day}</td>
<td>${t.time}</td>
<td>${durationInput.value}</td>
</tr>
`;
});

html+=`

<div class="admit-card">

<div class="title">ADMIT CARD</div>

<div class="student">

<div>
Roll : ${s.roll}<br>
Name : ${s.name}<br>
Father : ${s.father}<br>
Class : ${s.class}
</div>

<img src="${s.photo}">

</div>

<table>

<tr>
<th>Subject</th>
<th>Date</th>
<th>Day</th>
<th>Time</th>
<th>Duration</th>
</tr>

${rows}

</table>

</div>

`;

});

document.getElementById("admitArea").innerHTML=html;

}

function printCards(){

generateCards();

const content=document.getElementById("admitArea").innerHTML;

const win=window.open("","","width=900,height=700");

win.document.write(`
<html>
<head>
<title>Print</title>

<style>
body{font-family:Arial;padding:20px;}
.admit-card{border:2px solid #004aad;padding:10px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:4px;text-align:center;}
</style>

</head>

<body>

${content}

<script>
window.onload=function(){window.print()}
<\/script>

</body>
</html>
`);

win.document.close();

}

function downloadPDF(){

generateCards();

setTimeout(()=>{

const element=document.getElementById("admitArea");

html2pdf().set({
margin:5,
filename:"admit-cards.pdf",
html2canvas:{scale:3},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
}).from(element).save();

},500);

}

</script>

</body>
</html>
