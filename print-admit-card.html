<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Admit Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {font-family:Arial, sans-serif; background:#f2f2f2; margin:0; padding:0;}
header {background:#004aad; color:white; text-align:center; padding:15px; font-size:22px;}
.container {max-width:1000px; margin:auto; padding:20px;}
.admit-card {border:2px solid #004aad; padding:10px; margin:10px; width:48%; display:inline-block; vertical-align:top; box-sizing:border-box; page-break-inside:avoid;}
.admit-card img {width:80px; height:100px; object-fit:cover; float:right;}
.admit-card h3 {margin:5px 0;}
.admit-card table {width:100%; border-collapse:collapse; margin-top:10px;}
.admit-card table, th, td {border:1px solid #ccc;}
th, td {padding:6px; text-align:center;}
.guideline {margin-top:10px; font-size:14px; color:#333;}
button {padding:8px 12px; margin:5px; border:none; border-radius:5px; cursor:pointer;}
.save {background:#004aad;color:white;}
.print {background:#28a745;color:white;}
@media (max-width:768px){
  .admit-card {width:100%; margin:5px 0;}
  img {float:none; display:block; margin:auto;}
}
</style>
</head>
<body>
<header>Print Admit Cards</header>
<div class="container">

<!-- Exam/Class Select -->
<div class="card">
<select id="selectClass"><option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<select id="selectExam"><option value="">Select Exam</option></select>
<button class="save" onclick="loadAdmitCards()">Load Admit Cards</button>
</div>

<!-- Guideline -->
<div class="card">
<input type="text" id="guidelineInput" placeholder="Enter guideline for admit card">
<button class="save" onclick="saveGuideline()">Save Guideline</button>
</div>

<!-- Admit Cards -->
<div id="admitCardsContainer"></div>
<button class="print" onclick="window.print()">Print Admit Cards</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, addDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId:"nmpsnagguradiya-b9b94"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let guidelineText = "";

// Load exams into dropdown
async function loadExams(){
  const snap = await getDocs(collection(db,"exam_sessions"));
  let html='<option value="">Select Exam</option>';
  snap.forEach(d=>{ html+=`<option value="${d.id}">${d.data().examName}</option>`; });
  document.getElementById("selectExam").innerHTML = html;
}
loadExams();

// Save guideline
window.saveGuideline = async function(){
  guidelineText = document.getElementById("guidelineInput").value;
  if(!guidelineText) return alert("Enter guideline");
  await setDoc(doc(db,"admit_guidelines","guideline"), {text: guidelineText});
  alert("Guideline saved");
}

// Load Admit Cards
window.loadAdmitCards = async function(){
  const cls = document.getElementById("selectClass").value;
  const examId = document.getElementById("selectExam").value;
  if(!cls || !examId) return alert("Select class and exam");

  // Get students
  const studentSnap = await getDocs(collection(db,"admissions"));
  const students = studentSnap.docs.filter(d=>d.data().class===cls);

  // Get timetable subjects for class and exam
  const ttSnap = await getDocs(collection(db,"timetable"));
  const timetable = ttSnap.docs
    .filter(d=>d.data().class===cls && d.data().examId===examId)
    .map(d=>d.data());

  // Get saved guideline
  const guideDoc = await getDoc(doc(db,"admit_guidelines","guideline"));
  guidelineText = guideDoc.exists() ? guideDoc.data().text : "";

  // Build admit cards
  let html = "";
  for(let i=0;i<students.length;i++){
    const s = students[i].data();
    html += `<div class="admit-card">
      <img src="${s.photo || ''}" alt="Photo">
      <h3>YOUR SCHOOL NAME</h3>
      <p><b>Name:</b> ${s.name}</p>
      <p><b>Father:</b> ${s.father}</p>
      <p><b>Roll:</b> ${s.roll}</p>
      <p><b>Class:</b> ${s.class}</p>
      <table>
        <tr><th>Subject</th><th>Date</th><th>Day</th><th>Time</th></tr>`;

    timetable.forEach(tt=>{
      html += `<tr>
        <td>${tt.subjectId}</td>
        <td>${tt.date}</td>
        <td>${tt.day}</td>
        <td>${tt.time}</td>
      </tr>`;
    });

    html += `</table>
      <div class="guideline">${guidelineText}</div>
    </div>`;

    // 2 per row
    if((i+1)%2===0) html += '<div style="clear:both"></div>';
  }

  document.getElementById("admitCardsContainer").innerHTML = html;
}
</script>
</body>
</html>
