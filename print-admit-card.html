<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Admit Cards</title>

<style>
body{font-family:Arial;background:#f2f4f8;margin:0;padding:0;}
header{background:#004aad;color:white;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.container{padding:20px;max-width:1200px;margin:auto;}
.card-controls{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:20px;}
.card-controls select, .card-controls input, .card-controls button{padding:10px;font-size:16px;border-radius:6px;border:1px solid #ccc;}
.card-controls button{background:#004aad;color:white;border:none;cursor:pointer;font-weight:bold;}
.admit-card{width:48%;border:2px solid #004aad;border-radius:10px;padding:15px;margin-bottom:20px;display:inline-block;vertical-align:top;background:white;box-sizing:border-box;}
.admit-header{text-align:center;margin-bottom:10px;}
.school-logo{width:80px;height:80px;object-fit:cover;border-radius:8px;}
.admit-info{margin-top:10px;}
.admit-info div{margin:5px 0;font-size:14px;}
.admit-photo{width:100px;height:100px;object-fit:cover;border:1px solid #ccc;border-radius:5px;float:right;margin-left:10px;}
.timetable{margin-top:10px;font-size:12px;width:100%;border-collapse:collapse;}
.timetable th,.timetable td{border:1px solid #ccc;padding:4px;text-align:center;}
.signatures{margin-top:15px;display:flex;justify-content:space-between;}
.signature-box{text-align:center;font-size:12px;}
.guidelines{margin-top:10px;font-size:12px;background:#f1f1f1;padding:8px;border-radius:5px;}
@media print{
    body{background:white;}
    .card-controls{display:none;}
    .admit-card{width:48%;page-break-inside:avoid;}
}
</style>
</head>
<body>

<header>Print Admit Cards</header>

<div class="container">

<div class="card-controls">
<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<select id="examSelect">
<option value="">Select Exam</option>
</select>

<input type="text" id="guidelinesInput" placeholder="Enter Guidelines to show on Admit Card">

<button onclick="loadAdmitCards()">Load Admit Cards</button>
<button onclick="window.print()">Print All</button>
</div>

<div id="admitCardsContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const schoolId = localStorage.getItem("schoolId")||"school_001";
const activeSession = localStorage.getItem("session")||"2025-26";

let exams=[];

// Load Exams for current school & session
async function loadExams(){
    const snap = await getDocs(query(collection(db,"exam_sessions"),where("schoolId","==",schoolId)));
    exams = snap.docs.map(d=>({id:d.id,...d.data()}));
    const examSelect = document.getElementById("examSelect");
    examSelect.innerHTML = '<option value="">Select Exam</option>' +
        exams.map(e=>`<option value="${e.id}">${e.examName}</option>`).join("");
}

await loadExams();

// Load Admit Cards
window.loadAdmitCards = async function(){
    const selectedClass = document.getElementById("classSelect").value;
    const selectedExamId = document.getElementById("examSelect").value;
    const guidelines = document.getElementById("guidelinesInput").value;

    if(!selectedClass || !selectedExamId){ alert("Select Class and Exam"); return; }

    const snap = await getDocs(query(collection(db,"admissions"), where("class","==",selectedClass)));
    const students = snap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.schoolId===schoolId && s.session===activeSession);

    const examDoc = await getDoc(doc(db,"exam_sessions",selectedExamId));
    const examName = examDoc.exists()? examDoc.data().examName : "";

    const container = document.getElementById("admitCardsContainer");
    container.innerHTML="";

    students.forEach(s=>{
        const card = document.createElement("div");
        card.className = "admit-card";
        card.innerHTML = `
        <div class="admit-header">
            ${s.schoolName || "School Name"}<br>
            <small>${examName}</small>
        </div>
        <img src="${s.photo||''}" class="admit-photo">
        <div class="admit-info">
            <div><strong>Student:</strong> ${s.name}</div>
            <div><strong>Father:</strong> ${s.father||''}</div>
            <div><strong>Roll No:</strong> ${s.roll||''}</div>
            <div><strong>Class:</strong> ${s.class}</div>
            <div><strong>Session:</strong> ${s.session}</div>
        </div>
        <table class="timetable">
            <tr><th>Exam</th><th>Time</th></tr>
            <tr><td>${examName}</td><td>${s.examTime||''}</td></tr>
        </table>
        <div class="guidelines">${guidelines}</div>
        <div class="signatures">
            <div class="signature-box">Principal Signature</div>
            <div class="signature-box">Director Signature</div>
        </div>
        `;
        container.appendChild(card);
    });
}

</script>

</body>
</html>
