<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Print Admit Card</title>
<style>
body{font-family:Arial,sans-serif; background:#f2f2f2; margin:0; padding:20px;}
.card-container{display:flex; flex-wrap:wrap; justify-content:space-between;}
.admit-card{width:48%; background:#004aad; color:white; padding:15px; margin-bottom:20px; border-radius:8px; border:2px solid #002f6c; box-sizing:border-box;}
.admit-card h2{margin:5px 0; font-size:20px; text-align:center; text-transform:uppercase;}
.admit-card .school-info{background:#003366; padding:8px; text-align:center; font-weight:bold; border-radius:5px;}
.admit-card .student-info{background:#ffd700; color:#000; padding:8px; margin-top:10px; border-radius:5px; font-weight:bold;}
.admit-card .student-info p{margin:4px 0; font-size:14px;}
.admit-card img.photo{width:80px; height:100px; object-fit:cover; border:2px solid #000; float:right; margin-left:10px; border-radius:4px;}
.admit-card table{width:100%; border-collapse:collapse; margin-top:10px; background:white; color:black; border-radius:5px; overflow:hidden;}
.admit-card table th, .admit-card table td{border:1px solid #000; padding:6px; text-align:center; font-size:12px;}
.admit-card .guidelines{margin-top:10px; background:#fffae6; color:#000; padding:6px; font-size:12px; border-radius:4px;}
.admit-card .principal{margin-top:15px; text-align:right; font-weight:bold; font-size:14px;}
@media print{
body{background:white; padding:0;}
.admit-card{page-break-inside:avoid;}
}
</style>
</head>
<body>

<div class="card-container" id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URL params: ?class=1&studentIds=id1,id2
const urlParams = new URLSearchParams(window.location.search);
const classFilter = urlParams.get("class");
const studentIdsParam = urlParams.get("studentIds");
const studentIds = studentIdsParam ? studentIdsParam.split(",") : [];

// Load Students & Exam Timetable
async function loadAdmitCards(){
  let studentQuery;
  if(studentIds.length>0){
    studentQuery = query(collection(db,"admissions"));
  }else if(classFilter){
    studentQuery = query(collection(db,"admissions"));
  }else{
    studentQuery = query(collection(db,"admissions"));
  }

  const snap = await getDocs(collection(db,"admissions"));
  const students = [];
  snap.forEach(d=>{
    const s = d.data(); s.id=d.id;
    if((studentIds.length==0 || studentIds.includes(s.id)) && (!classFilter || s.class==classFilter)){
      students.push(s);
    }
  });

  // Load exam timetable
  const examSnap = await getDocs(collection(db,"exam_subjects"));
  const exams = [];
  examSnap.forEach(d=>{
    exams.push(d.data());
  });

  const cardsDiv = document.getElementById("cards");
  cardsDiv.innerHTML = "";

  students.forEach(s=>{
    let totalPaid = s.paid||0;
    let totalFees = (s.fees||0)+(s.vehicleFees||0);
    let pending = totalFees-totalPaid;

    // Filter timetable for student's class
    const studentExams = exams.filter(e=>e.class==s.class);

    const card = document.createElement("div");
    card.className = "admit-card";

    card.innerHTML = `
      <div class="school-info">
        <h2>Your School Name</h2>
        Village Nag Guradiya, District Ujjain
      </div>
      <div class="student-info">
        <img src="${s.photo||''}" class="photo">
        <p><b>Name:</b> ${s.name}</p>
        <p><b>Father:</b> ${s.father}</p>
        <p><b>Mother:</b> ${s.mother||''}</p>
        <p><b>Village:</b> ${s.village}</p>
        <p><b>Mobile:</b> ${s.mobile}</p>
        <p><b>Roll:</b> ${s.roll}</p>
        <p><b>Total Fees:</b> ₹${totalFees} | <b>Paid:</b> ₹${totalPaid} | <b>Pending:</b> ₹${pending}</p>
      </div>
      <table>
        <thead>
          <tr>
            <th>Subject</th><th>Date</th><th>Day</th><th>Time</th>
          </tr>
        </thead>
        <tbody>
          ${studentExams.map(e=>`<tr>
            <td>${e.subject}</td>
            <td>${e.date}</td>
            <td>${e.day}</td>
            <td>${e.time}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="guidelines">
        <b>Guidelines:</b> Please carry your admit card and valid ID. Mobile phones are not allowed. Reach 15 mins early.
      </div>
      <div class="principal">Principal Sign</div>
    `;

    cardsDiv.appendChild(card);
  });
}

loadAdmitCards();
</script>

</body>
</html>
