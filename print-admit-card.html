<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admit Card Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{padding:20px;max-width:1200px;margin:auto;}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,input,textarea,button{
padding:10px;
margin:5px;
width:100%;
max-width:300px;
}

textarea{height:80px;}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.students{
border:1px solid #ccc;
padding:10px;
max-height:250px;
overflow:auto;
}

.admit-container{
display:grid;
gap:15px;
}

.two{grid-template-columns:1fr 1fr;}
.four{grid-template-columns:1fr 1fr;}
.six{grid-template-columns:1fr 1fr 1fr;}

.admit-card{
border:2px solid #004aad;
padding:10px;
border-radius:6px;
background:white;
position:relative;
overflow:hidden;
page-break-inside:avoid;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.08;
width:180px;
}

.school{
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #ccc;
padding-bottom:5px;
margin-bottom:5px;
}

.school img{
width:50px;
height:50px;
object-fit:cover;
}

.school-name{
font-weight:bold;
font-size:16px;
color:#004aad;
}

.school-address{
font-size:12px;
}

.exam-title{
text-align:center;
font-weight:bold;
font-size:16px;
margin-top:5px;
}

.title{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:5px;
}

.student{
display:flex;
justify-content:space-between;
}

.student img{
width:70px;
height:80px;
object-fit:cover;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:8px;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:4px;
text-align:center;
}

.guideline{
margin-top:10px;
font-size:11px;
}

.sign{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

</style>
</head>

<body>

<header>Admit Card Print</header>

<div class="container">

<div class="card">

<select id="layout">
<option value="two">2 Card Per Page</option>
<option value="four">4 Card Per Page</option>
<option value="six">6 Card Per Page</option>
</select>

<button onclick="printCards()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="admitArea" class="admit-container"></div>

</div>

<script>

function generateCards(){

const layout=document.getElementById("layout").value;

admitArea.className="admit-container "+layout;

let html="";

for(let i=1;i<=4;i++){

html+=`

<div class="admit-card">

<div class="school">

<img src="https://via.placeholder.com/50">

<div>
<div class="school-name">Sample School</div>
<div class="school-address">Sample Address</div>
</div>

</div>

<div class="exam-title">Annual Exam</div>

<div class="title">ADMIT CARD</div>

<div class="student">

<div>

Roll : 10${i}<br>
Name : Student ${i}<br>
Father : Parent ${i}<br>
Class : 5

</div>

<img src="https://via.placeholder.com/70">

</div>

<table>

<tr>
<th>Subject</th>
<th>Date</th>
<th>Day</th>
<th>Time</th>
<th>Duration</th>
</tr>

<tr>
<td>Math</td>
<td>10-03-2026</td>
<td>Monday</td>
<td>10 AM</td>
<td>3 Hours</td>
</tr>

</table>

<div class="guideline">
<b>Guidelines:</b><br>
Carry Admit Card to exam hall
</div>

<div class="sign">
<div>Principal Sign</div>
<div>Director Sign</div>
</div>

</div>

`;

}

admitArea.innerHTML=html;

}



window.printCards=async function(){

generateCards();

await new Promise(r=>setTimeout(r,800));

const layout=document.getElementById("layout").value;

const content=document.getElementById("admitArea").innerHTML;

const win=window.open("","","width=900,height=800");

win.document.write(`
<html>
<head>
<title>Print</title>

<style>

body{font-family:Arial}

.admit-container{display:grid;gap:15px}

.two{grid-template-columns:1fr 1fr}
.four{grid-template-columns:1fr 1fr}
.six{grid-template-columns:1fr 1fr 1fr}

.admit-card{
border:2px solid #004aad;
padding:10px;
border-radius:6px;
page-break-inside:avoid
}

</style>

</head>

<body>

<div class="admit-container ${layout}">
${content}
</div>

</body>
</html>
`);

win.document.close();

setTimeout(()=>win.print(),500);

};



window.downloadPDF=async function(){

generateCards();

await new Promise(r=>setTimeout(r,900));

const element=document.getElementById("admitArea");

html2pdf().set({
margin:5,
filename:"admit-cards.pdf",
html2canvas:{scale:2,useCORS:true},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
}).from(element).save();

};

</script>

</body>
</html>
