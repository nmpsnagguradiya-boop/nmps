<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Mahankal Public School</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    padding-bottom:60px;
}
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#004aad;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 15px;
    z-index:1000;
}
.menu-btn{
    font-size:24px;
    cursor:pointer;
}
.top-buttons{
    display:flex;
    gap:10px;
}
.top-buttons button{
    padding:8px 12px;
    font-size:14px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.school-name{
    text-align:center;
    font-weight:bold;
    margin-top:60px;
    font-size:20px;
}
.side-menu{
    position:fixed;
    top:0;
    right:-250px;
    width:220px;
    height:100%;
    background:#004aad;
    color:white;
    padding:20px;
    transition:0.3s;
    z-index:1001;
    overflow-y:auto;
}
.side-menu button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    background:white;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:999;
}
.container{
    padding:120px 15px 80px 15px;
}
.card{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.slider{
    width:100%;
    height:250px;
    overflow:hidden;
    position:relative;
    border-radius:10px;
}
.slider img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.photo-title{
    font-weight:bold;
    margin-top:8px;
    font-size:16px;
}
.actions{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
}
.actions button{
    padding:8px 12px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.comment-box{
    margin-top:10px;
}
.comment-box input{
    width:70%;
    padding:5px;
    margin-right:5px;
}
.comment-box button{
    padding:5px 10px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.comment-list div{
    background:#f0f0f0;
    padding:5px;
    margin-top:5px;
    border-radius:5px;
}
.notice-popup{
    position:fixed;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:#82caff;
    color:#004aad;
    padding:10px 20px;
    border-radius:8px;
    display:none;
    z-index:1002;
}
.bottom-buttons{
    padding:10px 0;
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}
.bottom-buttons button{
    flex:1;
    margin:5px;
    padding:10px;
    font-size:14px;
    border:none;
    border-radius:8px;
    background:#82caff;
    color:#004aad;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
<div class="top-buttons">
<button onclick="location.href='result.html'">Result</button>
<button onclick="location.href='admission.html'">Admission</button>
<button onclick="location.href='teacher.html'">Teacher</button>
<button onclick="location.href='fees.html'">Fees</button>
</div>
<span class="menu-btn" onclick="openMenu()">☰</span>
</header>

<div class="school-name">New Mahankal Public School</div>

<div class="side-menu" id="sideMenu">
<button onclick="location.href='admission.html'">Admission</button>
<button onclick="location.href='result.html'">Result</button>
<button onclick="location.href='complain.html'">Complaint</button>
<button onclick="location.href='teacher.html'">Teachers</button>
<button onclick="location.href='event.html'">Events</button>
<button onclick="location.href='social.html'">Social Media</button>
<button onclick="location.href='career.html'">Career</button>
<button onclick="location.href='privacy.html'">Privacy</button>
<button onclick="location.href='mission.html'">Mission</button>
<button onclick="closeMenu()" style="background:red;color:white;">Close Menu</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="notice-popup" id="noticePopup"></div>

<div class="container" id="dashboardContainer">
<!-- Photo Card -->
<div class="card" id="photoCard">
<div class="slider" id="photoSlider">
<img src="" id="currentSlide">
<div class="photo-title" id="photoTitle"></div>
<a href="" target="_blank" id="photoLink"></a>
</div>
<div class="actions">
<button id="likeBtn">Like ❤️ <span id="likeCount">0</span></button>
<button id="shareBtn">Share 🔗</button>
</div>
<div class="comment-box">
<input type="text" id="commentInput" placeholder="Add a comment">
<button onclick="addComment()">Post</button>
</div>
<div class="comment-list" id="commentList"></div>
</div>

<!-- Bottom buttons for dashboard -->
<div class="bottom-buttons" id="extraButtons">
<button onclick="location.href='admin_login.html'">Login</button>
<button onclick="location.href='event.html'">Event</button>
<button onclick="location.href='complain.html'">Complain</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let photos = [];
let currentIndex = 0;

const currentSlide = document.getElementById("currentSlide");
const photoTitle = document.getElementById("photoTitle");
const photoLink = document.getElementById("photoLink");
const likeBtn = document.getElementById("likeBtn");
const likeCountSpan = document.getElementById("likeCount");
const commentList = document.getElementById("commentList");
const noticePopup = document.getElementById("noticePopup");

// Load notices
async function loadNotices(){
    const snap = await getDocs(collection(db,"notice"));
    snap.forEach(doc=>{
        const d = doc.data();
        noticePopup.textContent = d.text;
        noticePopup.style.display="block";
        setTimeout(()=>{ noticePopup.style.display="none"; }, 5000);
    });
}
loadNotices();

// Load photos
async function loadPhotos(){
    const snap = await getDocs(collection(db,"gallery"));
    photos = [];
    snap.forEach(doc=>{
        const d = doc.data();
        if(d.type=="image"){
            photos.push({id:doc.id,url:d.url,title:d.title || '',link:d.link || ''});
        }
    });
    if(photos.length>0){
        showSlide(0);
        startSlider();
    }
}
loadPhotos();

function showSlide(index){
    currentIndex=index;
    const photo = photos[index];
    currentSlide.src = photo.url;
    photoTitle.textContent = photo.title || "No Title";
    if(photo.link){
        photoLink.href = photo.link;
        photoLink.textContent = "Click Link";
        photoLink.style.display="block";
    } else {
        photoLink.style.display="none";
    }
    loadComments(photo.id);
}

// Slider auto
function startSlider(){
    setInterval(()=>{
        if(photos.length==0) return;
        currentIndex++;
        if(currentIndex>=photos.length) currentIndex=0;
        showSlide(currentIndex);
    },3000);
}

// Menu functions
function openMenu(){
    document.getElementById("sideMenu").style.right="0";
    document.getElementById("overlay").style.display="block";
}
function closeMenu(){
    document.getElementById("sideMenu").style.right="-250px";
    document.getElementById("overlay").style.display="none";
}

// Like & Comment
likeBtn.addEventListener("click", async ()=>{
    const photoId = photos[currentIndex].id;
    await addDoc(collection(db,"likes"),{photoId,user:"Anonymous"});
    updateLikes(photoId);
});

async function updateLikes(photoId){
    const snap = await getDocs(query(collection(db,"likes"), where("photoId","==",photoId)));
    likeCountSpan.textContent = snap.size;
}

async function addComment(){
    const val=document.getElementById("commentInput").value;
    if(!val) return;
    const photoId = photos[currentIndex].id;
    await addDoc(collection(db,"comments"),{photoId,user:"Anonymous",comment:val});
    document.getElementById("commentInput").value="";
    loadComments(photoId);
}

async function loadComments(photoId){
    commentList.innerHTML="";
    const snap = await getDocs(query(collection(db,"comments"),where("photoId","==",photoId)));
    snap.forEach(doc=>{
        const data = doc.data();
        const div = document.createElement("div");
        div.textContent = `${data.user}: ${data.comment}`;
        commentList.appendChild(div);
    });
}

// Share
document.getElementById("shareBtn").addEventListener("click",()=>{
    if(photos.length==0) return;
    navigator.clipboard.writeText(photos[currentIndex].url);
    alert("Photo link copied!");
});
</script>

</body>
    </html>
