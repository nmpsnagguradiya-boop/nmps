<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School App</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.card{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
cursor:pointer;
font-size:18px;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:8px;
}

#noticePopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.noticeBox{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

.close{
background:red;
color:white;
padding:5px 10px;
border:none;
margin-top:10px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
New Mahankal Public School
</header>

<div class="container">

<div class="grid">

<div class="card" onclick="go('admission.html')">
Admission
</div>

<div class="card" onclick="go('result.html')">
Result
</div>

<div class="card" onclick="go('complain.html')">
Complain
</div>

<div class="card" onclick="go('study.html')">
Online Study
</div>

<div class="card" onclick="go('event.html')">
Events
</div>

</div>

<h3>School Gallery</h3>

<div class="gallery" id="gallery"></div>

</div>

<div id="noticePopup">
<div class="noticeBox">
<h3>Notice</h3>
<p id="noticeText"></p>
<button class="close" onclick="closeNotice()">Close</button>
</div>
</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">W</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

loadGallery();
loadNotice();

async function loadGallery(){

const snapshot=await getDocs(collection(db,"gallery"));

snapshot.forEach(doc=>{

const data=doc.data();

if(data.type=="image"){

const img=document.createElement("img");
img.src=data.url;

document.getElementById("gallery").appendChild(img);

}

});

}

async function loadNotice(){

const snapshot=await getDocs(collection(db,"notice"));

snapshot.forEach(doc=>{

const data=doc.data();

document.getElementById("noticeText").innerText=data.text;

document.getElementById("noticePopup").style.display="flex";

});

}

</script>

<script>

function go(page){

window.location.href=page;

}

function closeNotice(){

document.getElementById("noticePopup").style.display="none";

}

</script>

</body>
</html>
