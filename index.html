<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>School Website</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.slider{
width:100%;
height:200px;
overflow:hidden;
}

.slider img{
width:100%;
height:200px;
object-fit:cover;
}

.container{
padding:15px;
}

.menu{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;

}

.menu button{

padding:15px;
border:none;
background:white;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
font-size:14px;
cursor:pointer;

}

.sectionTitle{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:10px;

}

.gallery img{

width:100%;
border-radius:8px;

}

.whatsapp{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;

}

.popup{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;

}

.popupContent{

background:white;
padding:20px;
border-radius:10px;
max-width:300px;
text-align:center;

}

.closeBtn{

margin-top:10px;
background:red;
color:white;
border:none;
padding:8px;
border-radius:5px;

}

</style>

</head>

<body>

<header>School Management System</header>

<div class="slider">

<img id="slide" src="https://picsum.photos/800/200">

</div>

<div class="container">

<div class="menu">

<button onclick="location.href='admission.html'">Admission</button>
<button onclick="location.href='result.html'">Result</button>
<button onclick="location.href='complain.html'">Complaint</button>
<button onclick="location.href='study.html'">Online Study</button>
<button onclick="location.href='teacher.html'">Teachers</button>
<button onclick="location.href='event.html'">Events</button>
<button onclick="location.href='fees.html'">Fees</button>
<button onclick="location.href='carrier.html'">Career</button>
<button onclick="location.href='privacy.html'">Privacy</button>

</div>

<div class="sectionTitle">School Gallery</div>

<div class="gallery" id="gallery"></div>

</div>

<a class="whatsapp" href="https://wa.me/919999999999">W</a>

<div class="popup" id="popup">

<div class="popupContent">

<h3>Notice</h3>

<p id="noticeText"></p>

<button class="closeBtn" onclick="closePopup()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadGallery(){

const snap = await getDocs(collection(db,"gallery"));
let html="";

snap.forEach((doc)=>{
const d = doc.data();
html+=`<img src="${d.photo}">`;
});

document.getElementById("gallery").innerHTML=html;

}

loadGallery();

async function loadNotice(){

const snap = await getDocs(collection(db,"notices"));
snap.forEach((doc)=>{
const d=doc.data();
document.getElementById("noticeText").innerText=d.message;
document.getElementById("popup").style.display="flex";
});

}

loadNotice();

window.closePopup=function(){
document.getElementById("popup").style.display="none";
}

/* Image Slider */

const images=[
"https://picsum.photos/800/200?1",
"https://picsum.photos/800/200?2",
"https://picsum.photos/800/200?3"
];

let i=0;

setInterval(()=>{
i++;
if(i>=images.length) i=0;
document.getElementById("slide").src=images[i];
},3000);

</script>

</body>

  </html>
