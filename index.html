<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Mahankal Public School</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    padding-bottom:60px;
}
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#004aad;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 15px;
    z-index:1000;
}
.menu-btn{
    font-size:24px;
    cursor:pointer;
}
.top-buttons{
    display:flex;
    gap:10px;
}
.top-buttons button{
    padding:8px 12px;
    font-size:14px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.side-menu{
    position:fixed;
    top:0;
    left:-250px;
    width:220px;
    height:100%;
    background:#004aad;
    color:white;
    padding:20px;
    transition:0.3s;
    z-index:1001;
    overflow-y:auto;
}
.side-menu button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    background:white;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:999;
}
.container{
    padding:80px 15px 80px 15px;
}
.card{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.slider{
    width:100%;
    height:250px;
    overflow:hidden;
    position:relative;
    border-radius:10px;
}
.slider img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.actions{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
}
.actions button{
    padding:8px 12px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.comment-box{
    margin-top:10px;
}
.comment-box input{
    width:70%;
    padding:5px;
    margin-right:5px;
}
.comment-box button{
    padding:5px 10px;
    background:#82caff;
    color:#004aad;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.bottom-buttons{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    background:#004aad;
    z-index:1000;
}
.bottom-buttons button{
    flex:1;
    margin:0 5px;
    padding:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#82caff;
    color:#004aad;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
<span class="menu-btn" onclick="openMenu()">☰</span>
<div class="top-buttons">
<button onclick="location.href='result.html'">Result</button>
<button onclick="location.href='admission.html'">Admission</button>
<button onclick="location.href='teacher.html'">Teacher</button>
<button onclick="location.href='fees.html'">Fees</button>
</div>
</header>

<div class="side-menu" id="sideMenu">
<button onclick="location.href='admission.html'">Admission</button>
<button onclick="location.href='result.html'">Result</button>
<button onclick="location.href='complain.html'">Complaint</button>
<button onclick="location.href='teacher.html'">Teachers</button>
<button onclick="location.href='event.html'">Events</button>
<button onclick="closeMenu()" style="background:red;color:white;">Close Menu</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="container" id="dashboardContainer">
<!-- Slider Card -->
<div class="card" id="photoCard">
<div class="slider" id="photoSlider">
<img src="" id="currentSlide">
</div>
<div class="actions">
<button id="likeBtn">Like ❤️ <span id="likeCount">0</span></button>
<button id="shareBtn">Share 🔗</button>
</div>
<div class="comment-box">
<input type="text" id="commentInput" placeholder="Add a comment">
<button onclick="addComment()">Post</button>
</div>
<div id="commentList"></div>
</div>
</div>

<div class="bottom-buttons">
<button onclick="location.href='admin_login.html'">Login</button>
<button onclick="location.href='event.html'">Event</button>
<button onclick="location.href='complain.html'">Complain</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const photoSlider = document.getElementById("photoSlider");
const currentSlide = document.getElementById("currentSlide");

let photos = [];
let currentIndex = 0;
let likeCount = 0;

async function loadPhotos(){
    const snap = await getDocs(collection(db,"gallery"));
    photos = [];
    snap.forEach(doc=>{
        const d = doc.data();
        if(d.type=="image"){
            photos.push({url:d.url, title:d.title || '', link:d.link || ''});
        }
    });
    if(photos.length>0){
        currentSlide.src = photos[0].url;
        startSlider();
    }
}
loadPhotos();

function startSlider(){
    setInterval(()=>{
        if(photos.length==0) return;
        currentIndex++;
        if(currentIndex>=photos.length) currentIndex=0;
        currentSlide.src = photos[currentIndex].url;
    },3000);
}

// Menu functions
function openMenu(){
    document.getElementById("sideMenu").style.left="0";
    document.getElementById("overlay").style.display="block";
}
function closeMenu(){
    document.getElementById("sideMenu").style.left="-250px";
    document.getElementById("overlay").style.display="none";
}

// Like button
document.getElementById("likeBtn").addEventListener("click",()=>{
    likeCount++;
    document.getElementById("likeCount").innerText=likeCount;
});

// Comment system
function addComment(){
    const val = document.getElementById("commentInput").value;
    if(!val) return;
    const div = document.createElement("div");
    div.textContent = val;
    document.getElementById("commentList").appendChild(div);
    document.getElementById("commentInput").value="";
}

// Share button
document.getElementById("shareBtn").addEventListener("click",()=>{
    if(photos.length==0) return;
    const url = photos[currentIndex].url;
    navigator.clipboard.writeText(url);
    alert("Photo link copied to clipboard!");
});
</script>

</body>
</html>
