<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Mahankal Public School</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding-top: 70px;
    padding-bottom: 60px;
    overflow-x: hidden;
}

header {
    background: #004aad;
    color: white;
    padding: 15px;
    font-size: 24px;
    font-family: 'Cursive', Arial;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu-btn {
    position: absolute;
    left: 15px;
    top: 15px;
    font-size: 24px;
    cursor: pointer;
    z-index: 2100; /* above everything */
}

.side-menu {
    position: fixed;
    top: 0;
    left: -250px;
    width: 220px;
    height: 100%;
    background: #004aad;
    color: white;
    padding: 20px;
    transition: 0.3s;
    z-index: 2050; /* above overlay */
    overflow-y: auto;
}

.side-menu button {
    display: block;
    width: 100%;
    margin: 10px 0;
    background: white;
    color: #004aad;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

.side-menu .menu-close { background: red; color: white; }
.side-menu .logout { background: orange; color: white; }

.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 2000;
}

.top-buttons {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin: 0;
    padding: 0 10px;
    position: fixed;
    top: 70px;
    width: 100%;
    background: #f2f2f2;
    z-index: 1999; /* below menu-btn */
}

.top-buttons button {
    flex: 1 1 40%;
    margin: 5px;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #82caff;
    color: #004aad;
    cursor: pointer;
}

.slider {
    width: 100%;
    height: 200px;
    overflow: hidden;
    margin-top: 120px;
}

.slider img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.container { padding: 15px; }

.section-title { font-weight: bold; font-size: 18px; margin-top: 15px; }

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

.gallery img, .gallery video { width: 100%; border-radius: 8px; cursor: pointer; }

.whatsapp {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
    z-index: 1004;
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2200; /* above everything */
}

.popup-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 300px;
    text-align: center;
}

.close-btn {
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 5px;
}

.bottom-buttons {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #004aad;
    padding: 10px 0;
    z-index: 1005;
}

.bottom-buttons button {
    flex: 1 1 33%;
    margin: 0 5px;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #82caff;
    color: #004aad;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
<span class="menu-btn" onclick="openMenu()">☰</span>
New Mahankal Public School
</header>

<div class="side-menu" id="sideMenu">
    <button onclick="location.href='admission.html'">Admission</button>
    <button onclick="location.href='result.html'">Result</button>
    <button onclick="location.href='complain.html'">Complaint</button>
    <button onclick="location.href='study.html'">Online Study</button>
    <button onclick="location.href='teacher.html'">Teachers</button>
    <button onclick="location.href='event.html'">Events</button>
    <button onclick="location.href='fees.html'">Fees</button>
    <button onclick="location.href='carrier.html'">Career</button>
    <button onclick="location.href='privacy.html'">Privacy</button>
    <button class="menu-close" onclick="closeMenu()">Close Menu</button>
    <button class="logout" onclick="location.href='admin_login.html'">Logout</button>
    <button onclick="location.href='mission.html'">Our Mission</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="top-buttons">
    <button onclick="location.href='admission.html'">Admission</button>
    <button onclick="location.href='result.html'">Result</button>
    <button onclick="location.href='complain.html'">Complaint</button>
    <button onclick="location.href='teacher.html'">Teachers</button>
</div>

<div class="slider">
<img id="slide" src="https://picsum.photos/800/200">
</div>

<div class="container">
<div class="section-title">Gallery & Videos</div>
<div class="gallery" id="gallery"></div>
</div>

<div class="bottom-buttons">
    <button onclick="location.href='fees.html'">Fees</button>
    <button onclick="location.href='admin_login.html'">Login</button>
    <button onclick="location.href='event.html'">Events</button>
</div>

<a class="whatsapp" href="https://wa.me/919999999999">W</a>

<div class="popup" id="popup">
<div class="popup-content">
<h3>Notice</h3>
<p id="noticeText"></p>
<button class="close-btn" onclick="closePopup()">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Load Gallery
async function loadGallery(){
    const snap = await getDocs(collection(db,"gallery"));
    const container = document.getElementById("gallery");
    container.innerHTML = "";
    snap.forEach(doc => {
        const d = doc.data();
        if(d.type === "image"){
            const img = document.createElement("img");
            img.src = d.url;
            container.appendChild(img);
        } else if(d.type === "video"){
            const video = document.createElement("video");
            video.src = d.url;
            video.controls = true;
            container.appendChild(video);
        }
    });
}
loadGallery();

// Load Latest Notice
async function loadNotice(){
    const q = query(collection(db,"notices"), orderBy("created_at","desc"), limit(1));
    const snap = await getDocs(q);
    if(!snap.empty){
        const doc = snap.docs[0];
        const d = doc.data();
        document.getElementById("noticeText").innerText = d.message;
        document.getElementById("popup").style.display = "flex";
    }
}
loadNotice();

window.closePopup = function(){
    document.getElementById("popup").style.display = "none";
}

// Menu functions
function openMenu(){
    document.getElementById("sideMenu").style.left = "0";
    document.getElementById("overlay").style.display = "block";
}

function closeMenu(){
    document.getElementById("sideMenu").style.left = "-250px";
    document.getElementById("overlay").style.display = "none";
}

// Slider
const images = [
    "https://picsum.photos/800/200?1",
    "https://picsum.photos/800/200?2",
    "https://picsum.photos/800/200?3"
];
let i = 0;
setInterval(()=>{
    i++;
    if(i>=images.length) i=0;
    document.getElementById("slide").src = images[i];
},3000);
</script>

</body>
</html>
