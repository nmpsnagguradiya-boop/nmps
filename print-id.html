<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Student ID Cards</title>

<style>

body{
font-family:Verdana;
background:#f2f2f2;
padding:20px;
text-align:center;
}

.controls{
margin-bottom:20px;
}

select,button{
padding:8px 12px;
margin:5px;
font-weight:bold;
cursor:pointer;
}

/* STUDENT LIST */

.students{
background:white;
padding:10px;
max-height:200px;
overflow:auto;
border:2px solid #ccc;
margin-bottom:20px;
}

/* GRID FOR 8 ID CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
justify-items:center;
}

/* CARD DESIGN */

.card{
width:260px;
height:370px;
border:3px solid black;
border-radius:10px;
overflow:hidden;
background:white;
}

/* HEADER */

.header{
background:#004aad;
color:white;
padding:8px;
font-weight:bold;
font-style:italic;
font-size:16px;
}

/* PHOTO */

.photo{
margin-top:8px;
}

.photo img{
width:90px;
height:110px;
border:3px solid black;
border-radius:6px;
object-fit:cover;
}

/* NAME */

.name{
font-size:18px;
font-weight:bold;
font-style:italic;
margin-top:5px;
}

/* DETAILS */

.details{
font-size:13px;
font-weight:bold;
font-style:italic;
margin-top:5px;
line-height:18px;
}

/* FOOTER */

.footer{
background:#ffeb3b;
margin-top:6px;
padding:4px;
}

.qr canvas{
width:70px;
}

@media print{

button,select{
display:none;
}

.students{
display:none;
}

.cards{
grid-template-columns:repeat(4,1fr);
}

.card{
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="classFilter">

<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<button onclick="printSelected()">Print Selected IDs</button>

</div>

<div class="students" id="studentSelect"></div>

<div class="cards" id="cards"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const snap=await getDocs(collection(db,"admissions"));

students=[];

snap.forEach(doc=>{
let d=doc.data();
d.id=doc.id;
students.push(d);
});

renderStudentList();

}

function renderStudentList(){

let cls=document.getElementById("classFilter").value;

let html="";

students.forEach(s=>{

if(cls && s.class!=cls) return;

html+=`
<label>
<input type="checkbox" value="${s.id}">
${s.name} (Class ${s.class})
</label><br>
`;

});

document.getElementById("studentSelect").innerHTML=html;

}

window.printSelected=function(){

let checked=document.querySelectorAll("#studentSelect input:checked");

let html="";

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

html+=`

<div class="card">

<div class="header">
YOUR SCHOOL NAME
</div>

<div class="photo">
<img src="${s.photo||''}">
</div>

<div class="name">${s.name||''}</div>

<div class="details">

ID : ${sid}<br>
Class : ${s.class||''}<br>
Father : ${s.father||''}<br>
Mobile : ${s.mobile||''}

</div>

<div class="footer">

<div class="qr">
<canvas id="qr${s.id}"></canvas>
</div>

</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

QRCode.toCanvas(document.getElementById("qr"+s.id),sid);

});

/* PRINT DIRECT */

setTimeout(()=>{
window.print();
},500);

}

document.getElementById("classFilter").addEventListener("change",renderStudentList);

loadStudents();

</script>

</body>
  </html>
