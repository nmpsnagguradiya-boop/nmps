<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student ID Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

#idArea{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

/* PRINT COLOR FIX */

*{
-webkit-print-color-adjust: exact !important;
print-color-adjust: exact !important;
}

/* ID CARD BASE */

.id-card{
border-radius:12px;
border:3px solid #000;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:13px;
background:white;
}

/* PORTRAIT */

.portrait{
width:220px;
height:340px;
}

/* LANDSCAPE */

.landscape{
width:340px;
height:220px;
}

/* top design */

.top{
padding:10px;
color:white;
text-align:center;
}

.school-header{
display:flex;
align-items:center;
justify-content:space-between;
}

.school-header img{
width:30px;
}

.school-name{
flex:1;
font-weight:bold;
font-size:14px;
text-align:center;
}

.school-info{
font-size:10px;
}

.card-title{
font-size:16px;
font-weight:bold;
margin-top:3px;
}

/* student section */

.student-section{
display:flex;
padding:8px;
gap:8px;
}

.student-details{
flex:1;
font-size:12px;
line-height:1.4;
}

.student-photo{
width:70px;
height:90px;
object-fit:cover;
border:2px solid #000;
}

/* QR */

.qr{
text-align:center;
padding-bottom:6px;
}

.qr img{
width:55px;
}

/* 7 STYLES */

.style1 .top{background:#004aad;}
.style1{background:linear-gradient(#004aad 35%,#e6f0ff 35%);}

.style2 .top{background:#008000;}
.style2{background:linear-gradient(#008000 35%,#e8ffe8 35%);}

.style3 .top{background:#800080;}
.style3{background:linear-gradient(#800080 35%,#f3e6ff 35%);}

.style4 .top{background:#c40000;}
.style4{background:linear-gradient(#c40000 35%,#ffe6e6 35%);}

.style5 .top{background:#ff8c00;}
.style5{background:linear-gradient(#ff8c00 35%,#fff2e0 35%);}

.style6 .top{background:#0097a7;}
.style6{background:linear-gradient(#0097a7 35%,#e0f9fc 35%);}

.style7 .top{background:#333;}
.style7{background:linear-gradient(#333 35%,#eeeeee 35%);}

/* PRINT */

@media print{

body{
background:white;
}

.container{
display:none;
}

#idArea{
gap:0;
}

}

</style>
</head>

<body>

<div class="container">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>

<select id="styleSelect">
<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>
</select>

<!-- PORTRAIT / LANDSCAPE -->

<select id="layoutSelect">
<option value="portrait">Portrait ID Card</option>
<option value="landscape">Landscape ID Card</option>
</select>

<br>

<button onclick="generateCards()">Generate ID Card</button>
<button onclick="window.print()">Print</button>

<div id="idArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

schoolData=snap.data();

let sessions=schoolData.sessions||[];

let html='<option value="">Select Session</option>';

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`;
});

document.getElementById("sessionSelect").innerHTML=html;

}

}

loadSchool();

window.generateCards=async function(){

const session=document.getElementById("sessionSelect").value;

const cls=document.getElementById("classSelect").value;

const style=document.getElementById("styleSelect").value;

const layout=document.getElementById("layoutSelect").value;

if(!session||!cls){

alert("Select Session & Class");

return;

}

const snap=await getDocs(query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
));

const students=snap.docs.map(d=>({id:d.id,...d.data()}));

let html="";

students.forEach(st=>{

const qr=`https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${st.name}`;

html+=`

<div class="id-card ${style} ${layout}">

<div class="top">

<div class="school-header">

<img src="${schoolData.logo}">

<div class="school-name">${schoolData.name}</div>

<img src="${schoolData.logo}">

</div>

<div class="card-title">ID CARD</div>

<div class="school-info">

${schoolData.address}<br>

DISE: ${schoolData.dise}

</div>

</div>

<div class="student-section">

<div class="student-details">

<b>${st.name}</b><br>

Father: ${st.father}<br>

Mobile: ${st.mobile||""}<br>

Village/City: ${st.village||st.city||""}<br>

Class: ${st.class}<br>

Roll: ${st.roll}

</div>

<img class="student-photo" src="${st.photo||""}">

</div>

<div class="qr">

<img src="${qr}">

</div>

</div>

`;

});

document.getElementById("idArea").innerHTML=html;

}

</script>

</body>
                                                          </html>
