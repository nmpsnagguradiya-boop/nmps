<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Student ID Cards</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
text-align:center;
}

.controls{
margin-bottom:20px;
}

select,button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
width:320px;
height:500px;
border-radius:12px;
overflow:hidden;
color:white;
position:relative;
}

.header{
text-align:center;
padding:8px;
font-weight:bold;
font-size:15px;
}

.logo{
position:absolute;
left:10px;
top:10px;
}

.logo img{
width:40px;
}

.photo{
text-align:center;
margin-top:70px;
}

.photo img{
width:110px;
height:130px;
border-radius:6px;
border:3px solid white;
object-fit:cover;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:8px;
text-align:center;
}

.details{
padding:10px;
font-size:14px;
}

.qr{
text-align:center;
}

.signature{
position:absolute;
bottom:10px;
right:10px;
font-size:12px;
text-align:center;
}

.signature img{
width:70px;
}

/* 7 DESIGN WITH 2 COLORS */

.design1{
background:linear-gradient(#004aad,#ffeb3b);
}

.design2{
background:linear-gradient(#2e7d32,#a5d6a7);
}

.design3{
background:linear-gradient(#8e0038,#ffcdd2);
}

.design4{
background:linear-gradient(#ff9800,#ffe0b2);
}

.design5{
background:linear-gradient(#673ab7,#d1c4e9);
}

.design6{
background:linear-gradient(#0097a7,#b2ebf2);
}

.design7{
background:linear-gradient(#263238,#90a4ae);
}

/* PRINT COLOR FIX */

@media print{

body{
background:white;
}

button,select{
display:none;
}

.cards{
gap:10px;
}

.card{
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="designSelect">

<option value="design1">Blue + Yellow</option>
<option value="design2">Green</option>
<option value="design3">Maroon</option>
<option value="design4">Orange</option>
<option value="design5">Purple</option>
<option value="design6">Teal</option>
<option value="design7">Dark</option>

</select>

<button onclick="window.print()">Print Selected IDs</button>

</div>

<div class="cards" id="cards"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

students=[];

querySnapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
students.push(data);
});

renderCards();

}

function renderCards(){

let cls=document.getElementById("classFilter").value;
let design=document.getElementById("designSelect").value;

let html="";

students.forEach(s=>{

if(cls && s.class!=cls) return;

let sid="STU-"+s.id.substring(0,6).toUpperCase();

html+=`

<div class="card ${design}">

<div class="logo">
<img src="school-logo.png">
</div>

<div class="header">
YOUR SCHOOL NAME<br>
Student ID Card
</div>

<div class="photo">
<img src="${s.photo||''}">
</div>

<div class="name">${s.name||''}</div>

<div class="details">

ID : ${sid}<br>
Class : ${s.class||''}<br>
Roll : ${s.roll||''}<br>
Father : ${s.father||''}<br>
Mobile : ${s.mobile||''}

</div>

<div class="qr">
<canvas id="qr${s.id}"></canvas>
</div>

<div class="signature">
<img src="principal-sign.png"><br>
Principal
</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

students.forEach(s=>{
let canvas=document.getElementById("qr"+s.id);
if(canvas){
QRCode.toCanvas(canvas,"Student:"+s.name);
}
});

}

document.getElementById("classFilter").addEventListener("change",renderCards);
document.getElementById("designSelect").addEventListener("change",renderCards);

loadStudents();

</script>

</body>
</html>
