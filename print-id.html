<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student ID Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

#studentList{
margin-top:10px;
background:white;
padding:10px;
border-radius:6px;
max-height:200px;
overflow:auto;
}

#idArea{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

*{
-webkit-print-color-adjust:exact !important;
print-color-adjust:exact !important;
}

/* ID CARD */

.id-card{
border-radius:12px;
border:3px solid #000;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:13px;
background:white;
}

/* portrait */

.portrait{
width:220px;
height:340px;
}

/* landscape */

.landscape{
width:340px;
height:220px;
}

.top{
padding:10px;
color:white;
text-align:center;
}

.school-header{
display:flex;
align-items:center;
justify-content:space-between;
}

.school-header img{
width:30px;
}

.school-name{
flex:1;
font-weight:bold;
font-size:14px;
text-align:center;
}

.school-info{
font-size:10px;
}

.card-title{
font-size:15px;
font-weight:bold;
margin-top:3px;
}

.student-section{
display:flex;
padding:8px;
gap:8px;
}

.student-details{
flex:1;
font-size:12px;
line-height:1.4;
}

.student-photo{
width:70px;
height:90px;
object-fit:cover;
border:2px solid #000;
}

.qr{
text-align:center;
padding-bottom:6px;
}

.qr img{
width:55px;
}

/* styles */

.style1 .top{background:#004aad;}
.style1{background:linear-gradient(#004aad 35%,#e6f0ff 35%);}

.style2 .top{background:#008000;}
.style2{background:linear-gradient(#008000 35%,#e8ffe8 35%);}

.style3 .top{background:#800080;}
.style3{background:linear-gradient(#800080 35%,#f3e6ff 35%);}

.style4 .top{background:#c40000;}
.style4{background:linear-gradient(#c40000 35%,#ffe6e6 35%);}

.style5 .top{background:#ff8c00;}
.style5{background:linear-gradient(#ff8c00 35%,#fff2e0 35%);}

.style6 .top{background:#0097a7;}
.style6{background:linear-gradient(#0097a7 35%,#e0f9fc 35%);}

.style7 .top{background:#333;}
.style7{background:linear-gradient(#333 35%,#eeeeee 35%);}

/* PRINT */

@media print{

.container{
display:none;
}

body{
background:white;
}

#idArea{
gap:0;
}

}

</style>
</head>

<body>

<div class="container">

<select id="sessionSelect"></select>

<select id="classSelect"></select>

<select id="styleSelect">
<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>
</select>

<select id="layoutSelect">
<option value="portrait">Portrait</option>
<option value="landscape">Landscape</option>
</select>

<br>

<button onclick="loadStudents()">Load Students</button>

<div id="studentList"></div>

<br>

<button onclick="generateCards()">Generate ID Card</button>

<button onclick="printCards()">Print</button>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="idArea"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};
let students=[];

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

schoolData=snap.data();

let sessions=schoolData.sessions||[];

sessionSelect.innerHTML='<option>Select Session</option>'+
sessions.map(s=>`<option>${s}</option>`).join("");

}

}

loadSchool();

async function loadStudents(){

const session=sessionSelect.value;
const cls=classSelect.value;

const snap=await getDocs(query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
));

students=snap.docs.map(d=>({id:d.id,...d.data()}));

let html="";

students.forEach((s,i)=>{

html+=`
<label>
<input type="checkbox" class="studentCheck" value="${i}" checked>
${s.name} - Roll ${s.roll}
</label><br>
`;

});

studentList.innerHTML=html;

}

window.generateCards=function(){

const style=styleSelect.value;
const layout=layoutSelect.value;

let html="";

document.querySelectorAll(".studentCheck:checked").forEach(cb=>{

const st=students[cb.value];

const qr=`https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${st.name}`;

html+=`

<div class="id-card ${style} ${layout}">

<div class="top">

<div class="school-header">

<img src="${schoolData.logo}">
<div class="school-name">${schoolData.name}</div>
<img src="${schoolData.logo}">

</div>

<div class="school-info">

${schoolData.address}<br>
DISE: ${schoolData.dise}

</div>

<div class="card-title">ID CARD</div>

</div>

<div class="student-section">

<div class="student-details">

<b>${st.name}</b><br>
Father: ${st.father}<br>
Mobile: ${st.mobile||""}<br>
Village/City: ${st.village||st.city||""}<br>
Class: ${st.class}<br>
Roll: ${st.roll}

</div>

<img class="student-photo" src="${st.photo||""}">

</div>

<div class="qr">

<img src="${qr}">

</div>

</div>

`;

});

idArea.innerHTML=html;

}

window.printCards=function(){

window.print();

}

window.downloadPDF=function(){

const element=document.getElementById("idArea");

html2pdf().from(element).save("Student_ID_Cards.pdf");

}

</script>

</body>
</html>
