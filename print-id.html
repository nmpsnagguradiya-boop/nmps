<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Student ID Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f2f4f8;}
.container{max-width:1200px;margin:auto;padding:20px;}
select,button{padding:10px;margin:5px;}
button{background:#004aad;color:white;border:none;border-radius:5px;cursor:pointer;}
.id-page{width:210mm;min-height:297mm;margin:auto;padding:5mm;page-break-after:always;display:grid;gap:5mm;}
.id-card{border:2px solid #004aad;padding:10px;display:flex;flex-direction:column;font-size:12px;justify-content:space-between;}
.school-header{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #004aad;padding-bottom:5px;}
.school-header img{width:40px;height:40px;}
.school-name{flex:1;text-align:center;font-size:16px;font-weight:bold;color:#004aad;}
.school-info{text-align:center;font-size:10px;margin-top:2px;}
.student-info{margin-top:5px;display:flex;justify-content:space-between;align-items:center;}
.student-details{line-height:1.4;font-size:12px;}
.student-photo{width:70px;height:80px;border:1px solid #000;object-fit:cover;}
.qr-code{width:60px;height:60px;}
.style1{background:#e3f2fd;border-left:5px solid #0d47a1;border-top:5px solid #1976d2;border-bottom:5px solid #64b5f6;}
.style2{background:#e8f5e9;border-left:5px solid #1b5e20;border-top:5px solid #388e3c;border-bottom:5px solid #81c784;}
.style3{background:#f3e5f5;border-left:5px solid #4a148c;border-top:5px solid #7b1fa2;border-bottom:5px solid #ba68c8;}
.style4{background:#ffebee;border-left:5px solid #b71c1c;border-top:5px solid #c62828;border-bottom:5px solid #e57373;}
.style5{background:#fff3e0;border-left:5px solid #e65100;border-top:5px solid #ef6c00;border-bottom:5px solid #ffb74d;}
.style6{background:#e0f7fa;border-left:5px solid #006064;border-top:5px solid #00838f;border-bottom:5px solid #4dd0e1;}
.style7{background:#eceff1;border-left:5px solid #263238;border-top:5px solid #37474f;border-bottom:5px solid #90a4ae;}
</style>
</head>
<body>
<div class="container">
<h3>Print Student ID Cards</h3>

<select id="sessionSelect"></select>
<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>
<select id="cardsPerPage">
<option value="2">2 per Page</option>
<option value="4">4 per Page</option>
<option value="6">6 per Page</option>
</select>
<select id="styleSelect">
<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>
</select>
<br>
<button id="generateBtn">Generate ID Cards</button>
<button onclick="window.print()">Print</button>

<div id="idArea"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const schoolId=localStorage.getItem("schoolId")||"school_001";
let schoolData={};

async function loadSchool(){
  const snap=await getDoc(doc(db,"schools",schoolId));
  if(snap.exists()){
    schoolData=snap.data();
    const sess=schoolData.sessions||[];
    let html='<option value="">Select Session</option>';
    sess.forEach(s=>{html+=`<option value="${s}">${s}</option>`;});
    document.getElementById("sessionSelect").innerHTML=html;
  }
}
loadSchool();

document.getElementById("generateBtn").addEventListener("click", async()=>{
  const session=document.getElementById("sessionSelect").value;
  const cls=document.getElementById("classSelect").value;
  const perPage=parseInt(document.getElementById("cardsPerPage").value);
  const style=document.getElementById("styleSelect").value;
  if(!session || !cls){alert("Select session and class"); return;}

  const studentSnap=await getDocs(query(collection(db,"admissions"),
    where("schoolId","==",schoolId),
    where("session","==",session),
    where("class","==",cls)
  ));
  const students=studentSnap.docs.map(d=>({id:d.id,...d.data()}));
  if(students.length===0){alert("No students found!"); document.getElementById("idArea").innerHTML=""; return;}

  let html="";
  for(let i=0;i<students.length;i+=perPage){
    html+='<div class="id-page" style="grid-template-columns:repeat(2,1fr);">';
    const slice=students.slice(i,i+perPage);
    slice.forEach(student=>{
      const qrText=`${schoolData.name} | ${student.name} | ${student.roll}`;
      const qrURL=`https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=${encodeURIComponent(qrText)}`;
      html+=`
      <div class="id-card ${style}">
        <div class="school-header">
          <img src="${schoolData.logo}">
          <div class="school-name">${schoolData.name}</div>
          <img src="${schoolData.logo}">
        </div>
        <div class="school-info">${schoolData.address} | DISE: ${schoolData.dise} | Session: ${session}</div>
        <div class="student-info">
          <div class="student-details">
            Name: ${student.name}<br>
            Father: ${student.father}<br>
            Mobile: ${student.mobile||''}<br>
            Village/City: ${student.village||student.city||''}<br>
            Class: ${student.class}<br>
            Roll: ${student.roll}
          </div>
          <img class="student-photo" src="${student.photo||''}">
        </div>
        <div style="margin-top:5px;text-align:center;">
          <img class="qr-code" src="${qrURL}">
        </div>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById("idArea").innerHTML=html;
});
</script>
</body>
</html>
