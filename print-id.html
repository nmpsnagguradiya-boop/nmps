<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Student ID Cards</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
text-align:center;
}

.controls{
margin-bottom:20px;
}

select,button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.students{
background:white;
padding:10px;
max-height:200px;
overflow:auto;
border:1px solid #ccc;
margin-bottom:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
width:320px;
height:500px;
border-radius:10px;
overflow:hidden;
border:3px solid #000;
position:relative;
color:white;
}

/* TWO COLOR TOP BOTTOM */

.design1{
background:linear-gradient(to bottom,#004aad 50%,#ffeb3b 50%);
}

.design2{
background:linear-gradient(to bottom,#2e7d32 50%,#a5d6a7 50%);
}

.design3{
background:linear-gradient(to bottom,#8e0038 50%,#ffcdd2 50%);
}

.design4{
background:linear-gradient(to bottom,#ff9800 50%,#ffe0b2 50%);
}

.design5{
background:linear-gradient(to bottom,#673ab7 50%,#d1c4e9 50%);
}

.design6{
background:linear-gradient(to bottom,#0097a7 50%,#b2ebf2 50%);
}

.design7{
background:linear-gradient(to bottom,#263238 50%,#90a4ae 50%);
}

.logo{
position:absolute;
left:10px;
top:10px;
}

.logo img{
width:40px;
}

.header{
text-align:center;
padding-top:15px;
font-weight:bold;
}

.photo{
text-align:center;
margin-top:50px;
}

.photo img{
width:110px;
height:130px;
border-radius:6px;
border:3px solid white;
object-fit:cover;
}

.name{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:8px;
}

.details{
padding:10px;
font-size:14px;
}

.barcode{
text-align:center;
margin-top:5px;
}

.qr{
text-align:center;
}

.signature{
position:absolute;
bottom:10px;
right:10px;
font-size:12px;
text-align:center;
}

.signature img{
width:70px;
}

@media print{

button,select{
display:none;
}

.students{
display:none;
}

.card{
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="designSelect">

<option value="design1">Blue / Yellow</option>
<option value="design2">Green</option>
<option value="design3">Maroon</option>
<option value="design4">Orange</option>
<option value="design5">Purple</option>
<option value="design6">Teal</option>
<option value="design7">Dark</option>

</select>

<button onclick="printSelected()">Print Selected IDs</button>

</div>

<div class="students" id="studentSelect"></div>

<div class="cards" id="cards"></div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const snap=await getDocs(collection(db,"admissions"));

students=[];

snap.forEach(doc=>{
let d=doc.data();
d.id=doc.id;
students.push(d);
});

renderStudentList();

}

function renderStudentList(){

let cls=document.getElementById("classFilter").value;

let html="";

students.forEach(s=>{

if(cls && s.class!=cls) return;

html+=`
<label>
<input type="checkbox" value="${s.id}">
${s.name} (Class ${s.class})
</label><br>
`;

});

document.getElementById("studentSelect").innerHTML=html;

}

window.printSelected=function(){

let checked=document.querySelectorAll("#studentSelect input:checked");

let design=document.getElementById("designSelect").value;

let html="";

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

html+=`

<div class="card ${design}">

<div class="logo">
<img src="school-logo.png">
</div>

<div class="header">
YOUR SCHOOL NAME<br>
Student ID Card
</div>

<div class="photo">
<img src="${s.photo||''}">
</div>

<div class="name">${s.name||''}</div>

<div class="details">

ID : ${sid}<br>
Class : ${s.class||''}<br>
Roll : ${s.roll||''}<br>
Father : ${s.father||''}<br>
Mobile : ${s.mobile||''}

</div>

<div class="barcode">
<svg id="barcode${s.id}"></svg>
</div>

<div class="qr">
<canvas id="qr${s.id}"></canvas>
</div>

<div class="signature">
<img src="principal-sign.png"><br>
Principal
</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

JsBarcode("#barcode"+s.id,sid);

QRCode.toCanvas(document.getElementById("qr"+s.id),sid);

});

setTimeout(()=>window.print(),500);

}

document.getElementById("classFilter").addEventListener("change",renderStudentList);

loadStudents();

</script>

</body>
  </html>
