<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Student ID Cards</title>

<style>

body{
font-family:"Trebuchet MS",Verdana;
background:#f2f2f2;
padding:20px;
text-align:center;
}

.controls{
margin-bottom:20px;
}

select,button{
padding:8px 12px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

.students{
background:white;
padding:10px;
max-height:200px;
overflow:auto;
border:2px solid #ccc;
margin-bottom:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
width:320px;
height:500px;
border-radius:12px;
overflow:hidden;
border:4px double #000;
position:relative;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* PROFESSIONAL WAVE DESIGN */

.design1{
background:#004aad;
}

.design1::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#ffeb3b;
clip-path:polygon(
0 30%,
10% 25%,
20% 30%,
30% 35%,
40% 30%,
50% 25%,
60% 30%,
70% 35%,
80% 30%,
90% 25%,
100% 30%,
100% 100%,
0 100%
);
}

.design2{background:#1b5e20;}
.design2::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#a5d6a7;
clip-path:polygon(0 30%,15% 20%,30% 35%,50% 25%,70% 35%,85% 20%,100% 30%,100% 100%,0 100%);
}

.design3{background:#6a1b9a;}
.design3::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#e1bee7;
clip-path:polygon(0 35%,20% 25%,40% 35%,60% 25%,80% 35%,100% 25%,100% 100%,0 100%);
}

.design4{background:#e65100;}
.design4::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#ffe0b2;
clip-path:polygon(0 30%,25% 20%,50% 35%,75% 20%,100% 30%,100% 100%,0 100%);
}

.design5{background:#283593;}
.design5::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#c5cae9;
clip-path:polygon(0 25%,20% 35%,40% 25%,60% 35%,80% 25%,100% 35%,100% 100%,0 100%);
}

.design6{background:#00695c;}
.design6::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#b2dfdb;
clip-path:polygon(0 30%,15% 20%,35% 30%,55% 20%,75% 30%,90% 20%,100% 30%,100% 100%,0 100%);
}

.design7{background:#263238;}
.design7::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:55%;
background:#90a4ae;
clip-path:polygon(0 35%,25% 20%,50% 35%,75% 20%,100% 35%,100% 100%,0 100%);
}

.header{
text-align:center;
padding-top:18px;
font-weight:bold;
font-size:18px;
letter-spacing:1px;
font-style:italic;
position:relative;
z-index:2;
}

.photo{
text-align:center;
margin-top:40px;
position:relative;
z-index:2;
}

.photo img{
width:115px;
height:135px;
border-radius:8px;
border:4px solid white;
object-fit:cover;
box-shadow:0 3px 8px rgba(0,0,0,0.4);
}

.name{
font-size:22px;
font-weight:bold;
text-align:center;
margin-top:10px;
font-style:italic;
letter-spacing:1px;
position:relative;
z-index:2;
}

.details{
padding:12px;
font-size:15px;
font-weight:bold;
font-style:italic;
line-height:22px;
position:relative;
z-index:2;
}

.qr{
text-align:center;
position:relative;
z-index:2;
margin-top:5px;
}

@media print{

button,select{
display:none;
}

.students{
display:none;
}

.card{
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="designSelect">

<option value="design1">Blue / Yellow</option>
<option value="design2">Dark Green</option>
<option value="design3">Purple</option>
<option value="design4">Orange</option>
<option value="design5">Royal Blue</option>
<option value="design6">Teal</option>
<option value="design7">Dark Grey</option>

</select>

<button onclick="printSelected()">Print Selected IDs</button>

</div>

<div class="students" id="studentSelect"></div>

<div class="cards" id="cards"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const snap=await getDocs(collection(db,"admissions"));

students=[];

snap.forEach(doc=>{
let d=doc.data();
d.id=doc.id;
students.push(d);
});

renderStudentList();

}

function renderStudentList(){

let cls=document.getElementById("classFilter").value;

let html="";

students.forEach(s=>{

if(cls && s.class!=cls) return;

html+=`
<label>
<input type="checkbox" value="${s.id}">
${s.name} (Class ${s.class})
</label><br>
`;

});

document.getElementById("studentSelect").innerHTML=html;

}

window.printSelected=function(){

let checked=document.querySelectorAll("#studentSelect input:checked");

let design=document.getElementById("designSelect").value;

let html="";

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

html+=`

<div class="card ${design}">

<div class="header">
YOUR SCHOOL NAME<br>
Student ID Card
</div>

<div class="photo">
<img src="${s.photo||''}">
</div>

<div class="name">${s.name||''}</div>

<div class="details">

ID : ${sid}<br>
Class : ${s.class||''}<br>
Roll : ${s.roll||''}<br>
Father : ${s.father||''}<br>
Mobile : ${s.mobile||''}

</div>

<div class="qr">
<canvas id="qr${s.id}"></canvas>
</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

checked.forEach(c=>{

let s=students.find(x=>x.id==c.value);

let sid="STU-"+s.id.substring(0,6).toUpperCase();

QRCode.toCanvas(document.getElementById("qr"+s.id),sid);

});

setTimeout(()=>window.print(),500);

}

document.getElementById("classFilter").addEventListener("change",renderStudentList);

loadStudents();

</script>

</body>
</html>
