<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>School ERP</title>

<style>

*{box-sizing:border-box}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */

header{
background:#004aad;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

header img{
width:50px;
height:50px;
object-fit:cover;
border-radius:6px;
background:white;
}

.schoolText{
font-size:18px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FORM */

input,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

/* GRID */

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.permissions{
display:grid;
grid-template-columns:1fr 1fr;
gap:5px;
}

.menu a{
display:block;
padding:12px;
background:#eee;
margin-bottom:6px;
text-decoration:none;
color:black;
border-radius:6px;
}

/* MOBILE */

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.permissions{
grid-template-columns:1fr;
}

header{
flex-direction:column;
align-items:flex-start;
}

}

#adminPanel,#teacherPanel{
display:none;
}

</style>

</head>

<body>

<header>

<img id="schoolLogo">

<div class="schoolText">

<div id="schoolName">School ERP</div>
<div id="schoolAddress"></div>

</div>

</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="loginBox">

<h3>Login</h3>

<input id="emailInput" placeholder="Email">

<input id="passwordInput" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<div class="card">

<h3>School Profile</h3>

<div class="row">

<input id="schoolNameInput" placeholder="School Name">

<input id="schoolIdInput" placeholder="School ID">

</div>

<textarea id="schoolAddressInput" placeholder="School Address"></textarea>

<input type="file" id="logoFile">

<button onclick="uploadLogo()">Upload Logo</button>

<button onclick="saveSchool()">Save Profile</button>

</div>

<div class="card">

<h3>Create Teacher</h3>

<input id="tname" placeholder="Teacher Name">

<input id="temail" placeholder="Teacher Email">

<input id="tpass" placeholder="Password">

<h4>Page Permissions</h4>

<div class="permissions">

<label><input type="checkbox" value="admission.html"> Admission</label>
<label><input type="checkbox" value="students.html"> Students</label>
<label><input type="checkbox" value="subjects.html"> Subjects</label>
<label><input type="checkbox" value="exam.html"> Exams</label>
<label><input type="checkbox" value="marks-entry.html"> Marks Entry</label>
<label><input type="checkbox" value="result.html"> Result</label>
<label><input type="checkbox" value="marksheet.html"> Marksheet</label>

</div>

<button onclick="createTeacher()">Create Teacher</button>

</div>

</div>

<!-- TEACHER PANEL -->

<div id="teacherPanel" class="card">

<h3>Teacher Dashboard</h3>

<div id="teacherMenu" class="menu"></div>

</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import { 
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import { 
getFirestore,
doc,
setDoc,
getDoc
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"


const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId:"G-V4J8BP2LCN"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)

const imgbbKey="21000d5a5d14fcef4b6af4d13647da5a8"


/* LOAD SCHOOL */

async function loadSchool(){

const snap=await getDoc(doc(db,"school_profile","profile"))

if(snap.exists()){

const d=snap.data()

schoolName.innerText=d.schoolName
schoolAddress.innerText=d.schoolAddress
schoolLogo.src=d.logo

}

}

loadSchool()


/* LOGIN */

window.login=async function(){

const email=emailInput.value
const pass=passwordInput.value

try{

const user=await signInWithEmailAndPassword(auth,email,pass)

const admin=await getDoc(doc(db,"admins",user.user.uid))

if(admin.exists()){

loginBox.style.display="none"
adminPanel.style.display="block"
return

}

const teacher=await getDoc(doc(db,"teachers",user.user.uid))

if(teacher.exists()){

loginBox.style.display="none"
teacherPanel.style.display="block"

const pages=teacher.data().pages

pages.forEach(p=>{
teacherMenu.innerHTML+=`<a href="${p}">${p}</a>`
})

}

}catch(e){

alert(e.message)

}

}


/* LOGO UPLOAD */

window.uploadLogo=async function(){

const file=logoFile.files[0]

const fd=new FormData()
fd.append("image",file)

const res=await fetch(
`https://api.imgbb.com/1/upload?key=${imgbbKey}`,
{method:"POST",body:fd}
)

const data=await res.json()

schoolLogo.src=data.data.url

}


/* SAVE SCHOOL */

window.saveSchool=async function(){

await setDoc(doc(db,"school_profile","profile"),{

schoolName:schoolNameInput.value,
schoolAddress:schoolAddressInput.value,
schoolId:schoolIdInput.value,
logo:schoolLogo.src

})

alert("School Profile Saved")

loadSchool()

}


/* CREATE TEACHER */

window.createTeacher=async function(){

const name=tname.value
const email=temail.value
const pass=tpass.value

const checks=document.querySelectorAll(".permissions input:checked")

const pages=[...checks].map(c=>c.value)

const user=await createUserWithEmailAndPassword(auth,email,pass)

await setDoc(doc(db,"teachers",user.user.uid),{

name:name,
email:email,
pages:pages

})

alert("Teacher Created")

}

</script>

</body>
  </html>
