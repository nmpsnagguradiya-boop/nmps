<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Ultimate School ERP - Multi School</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* LOGIN */

#loginBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

.loginCard{
background:white;
padding:30px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
border-radius:10px;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:12px;
border:none;
background:#004aad;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#003080;
}

/* HEADER */

header{
background:#004aad;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

#schoolLogo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
background:white;
}

.centerHeader{
flex:1;
text-align:center;
}

#schoolName{
font-size:22px;
font-weight:bold;
}

#schoolAddress{
font-size:14px;
}

#activeSession{
font-size:13px;
}

#logoutBtn{
background:#f44336;
padding:8px 12px;
cursor:pointer;
}

/* DASHBOARD */

.container{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.count{
font-size:28px;
font-weight:bold;
color:#004aad;
}

/* BUTTON GRID */

.buttons{
margin-top:30px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.menuBtn{
background:#004aad;
border-radius:10px;
padding:20px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
transition:0.2s;
}

.menuBtn:hover{
transform:scale(1.05);
}

.menuBtn i{
font-size:40px;
color:white;
margin-bottom:10px;
display:block;
}

.menuBtn span{
font-size:14px;
font-weight:bold;
color:white;
}

/* MOBILE */

@media(max-width:768px){

.buttons{
grid-template-columns:repeat(2,1fr);
}

.menuBtn i{
font-size:45px;
}

}

</style>
</head>

<body>

<div id="loginBox">
<div class="loginCard">

<h3>Admin / Teacher Login</h3>

<input id="schoolId" placeholder="School ID">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">
<i class="fas fa-right-to-bracket"></i> Login
</button>

</div>
</div>

<header>

<img id="schoolLogo">

<div class="centerHeader">
<div id="schoolName">School Name</div>
<div id="schoolAddress">School Address</div>
<div id="activeSession">Session : 2025-26</div>
</div>

<button id="logoutBtn" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Logout
</button>

</header>

<div class="container">

<div class="grid">

<div class="card">
<div class="count" id="teachers">0</div>
Total Teachers
</div>

<div class="card">
<div class="count" id="admissions">0</div>
Total Admissions
</div>

<div class="card">
<div class="count" id="complaints">0</div>
Total Complaints
</div>

<div class="card">
<div class="count" id="totalFees">0</div>
Total Fees
</div>

<div class="card">
<div class="count" id="totalCollection">0</div>
Total Collection
</div>

<div class="card">
<div class="count" id="totalPending">0</div>
Total Pending
</div>

</div>

<!-- BUTTON MENU -->

<div class="buttons" id="buttonsArea">

<div class="menuBtn" data-page="Admission Management" onclick="location.href='admin_admissions.html'">
<i class="fas fa-user-graduate"></i>
<span>Admission</span>
</div>

<div class="menuBtn" data-page="Exam Management" onclick="location.href='academy.html'">
<i class="fas fa-book"></i>
<span>Exam</span>
</div>

<div class="menuBtn" data-page="Result Management" onclick="location.href='admin_results.html'">
<i class="fas fa-chart-line"></i>
<span>Results</span>
</div>

<div class="menuBtn" data-page="Fees Management" onclick="location.href='admin-fees.html'">
<i class="fas fa-money-bill"></i>
<span>Fees</span>
</div>

<div class="menuBtn" data-page="Complaint Management" onclick="location.href='admin_complaints.html'">
<i class="fas fa-comment-dots"></i>
<span>Complaints</span>
</div>

<div class="menuBtn" data-page="Study Material" onclick="location.href='admin_study.html'">
<i class="fas fa-folder-open"></i>
<span>Study Material</span>
</div>

<div class="menuBtn" data-page="Notice & Gallery" onclick="location.href='admin.html'">
<i class="fas fa-bullhorn"></i>
<span>Notice</span>
</div>

<div class="menuBtn" onclick="location.href='admin-event.html'">
<i class="fas fa-calendar-alt"></i>
<span>Events</span>
</div>

<div class="menuBtn" data-page="All Students" onclick="location.href='all-students.html'">
<i class="fas fa-users"></i>
<span>Students</span>
</div>

<div class="menuBtn" data-page="All Print" onclick="location.href='print.html'">
<i class="fas fa-print"></i>
<span>Print</span>
</div>

<div class="menuBtn" data-page="Create Teacher / Permission" onclick="location.href='admin-teacher.html'">
<i class="fas fa-chalkboard-teacher"></i>
<span>Teachers</span>
</div>

<div class="menuBtn" data-page="Add / Edit School Profile" onclick="location.href='school-profile.html'">
<i class="fas fa-school"></i>
<span>School Profile</span>
</div>

</div>

</div>
