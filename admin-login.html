<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

#schoolLogo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
background:white;
}

#schoolName{
font-size:22px;
font-weight:bold;
}

#schoolAddress{
font-size:14px;
}

.container{
padding:15px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);

}

.count{

font-size:28px;
font-weight:bold;
color:#004aad;

}

.label{

margin-top:5px;

}

.buttons{

margin-top:30px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:15px;

}

button{

padding:15px;

border:none;

background:#004aad;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

}

button:hover{
background:#003080;
}

/* popup */

#profileBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.profileForm{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

</style>

</head>

<body>

<header>

<img id="schoolLogo">

<div>
<div id="schoolName">School Name</div>
<div id="schoolAddress">School Address</div>
</div>

</header>

<div class="container">

<div class="grid">

<div class="card">
<div class="count" id="students">0</div>
<div class="label">Total Students</div>
</div>

<div class="card">
<div class="count" id="teachers">0</div>
<div class="label">Total Teachers</div>
</div>

<div class="card">
<div class="count" id="complaints">0</div>
<div class="label">Total Complaints</div>
</div>

<div class="card">
<div class="count" id="admissions">0</div>
<div class="label">Total Admissions</div>
</div>

<div class="card">
<div class="count" id="results">0</div>
<div class="label">Total Results</div>
</div>

</div>

<div class="buttons">

<button onclick="location.href='admin_admissions.html'">
Admission Management
</button>

<button onclick="location.href='admin_teachers.html'">
Teacher Management
</button>

<button onclick="location.href='admin_results.html'">
Result Management
</button>

<button onclick="location.href='admin_complaints.html'">
Complaint Management
</button>

<button onclick="location.href='admin_study.html'">
Study Material
</button>

<button onclick="location.href='admin.html'">
Notice & Gallery
</button>

<button onclick="location.href='all-students.html'">
All Students
</button>

<button onclick="location.href='admin-teacher.html'">
Create Teacher / Permission
</button>

<button onclick="openProfile()">
Add / Edit School Profile
</button>

</div>

</div>


<!-- School Profile Popup -->

<div id="profileBox">

<div class="profileForm">

<h3>School Profile</h3>

<input id="pname" placeholder="School Name">

<input id="paddress" placeholder="Address">

<input type="file" id="plogo">

<button onclick="saveProfile()">Save</button>

<button onclick="closeProfile()">Close</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,setDoc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* COUNT DATA */

async function countData(collectionName,id){

const snap = await getDocs(collection(db,collectionName));

document.getElementById(id).innerText = snap.size;

}

countData("students","students");
countData("teachers","teachers");
countData("complaints","complaints");
countData("admissions","admissions");
countData("results","results");


/* SCHOOL PROFILE */

async function loadProfile(){

const ref=doc(db,"school","profile");

const snap=await getDoc(ref);

if(snap.exists()){

const d=snap.data();

document.getElementById("schoolName").innerText=d.name;

document.getElementById("schoolAddress").innerText=d.address;

document.getElementById("schoolLogo").src=d.logo;

}

}

loadProfile();


window.openProfile=function(){

document.getElementById("profileBox").style.display="flex";

}

window.closeProfile=function(){

document.getElementById("profileBox").style.display="none";

}


/* IMAGE UPLOAD IMGBB */

async function uploadImg(file){

const key="21000d5a5d14fcef4b6af4d13647da5a8";

const fd=new FormData();

fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${key}`,{
method:"POST",
body:fd
});

const data=await res.json();

return data.data.url;

}


/* SAVE PROFILE */

window.saveProfile=async function(){

const name=document.getElementById("pname").value;

const address=document.getElementById("paddress").value;

const file=document.getElementById("plogo").files[0];

let logo="";

if(file){

logo=await uploadImg(file);

}

await setDoc(doc(db,"school","profile"),{

name,
address,
logo

});

alert("Profile Saved");

closeProfile();

loadProfile();

}

</script>

</body>
</html>
