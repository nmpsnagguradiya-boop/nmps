<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Super Result System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
width:100%;
max-width:260px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

#marksheet{
display:none;
background:white;
padding:30px;
border:4px solid #004aad;
}

.school{
text-align:center;
font-size:26px;
font-weight:bold;
color:#004aad;
}

.student{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.photo{
width:120px;
height:140px;
border:2px solid black;
object-fit:cover;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

.resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.sign{
margin-top:60px;
display:flex;
justify-content:space-between;
}

@media print{

header,.card,.printBtn{
display:none;
}

#marksheet{
display:block;
border:none;
}

}

</style>
</head>

<body>

<header>Super Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">
<option value="">Select Class</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect" multiple style="height:120px;"></select>

<select id="studentSelect"></select>

<br>

<button onclick="loadStudents()">Load Students</button>
<button onclick="generateResult()">Generate Result</button>

</div>


<div id="marksheet">

<div class="school">
NEW MODEL PUBLIC SCHOOL<br>
<span style="font-size:16px">Ujjain Madhya Pradesh</span>
</div>


<div class="student">

<div>

Name : <span id="name"></span><br>
Father : <span id="father"></span><br>
Class : <span id="class"></span><br>
Roll : <span id="roll"></span><br>
Village : <span id="village"></span><br>
Mobile : <span id="mobile"></span>

</div>

<img id="photo" class="photo">

</div>


<table>

<thead>
<tr>
<th>Exam</th>
<th>Subject</th>
<th>Marks</th>
<th>Max</th>
<th>Percent</th>
</tr>
</thead>

<tbody id="resultTable"></tbody>

</table>


<div class="resultBox">

Total : <span id="total"></span> / <span id="max"></span><br>

Percentage : <span id="percent"></span>%<br>

Grade : <span id="grade"></span><br>

Result : <span id="status"></span><br>

Class Rank : <span id="rank"></span><br>

Topper : <span id="topper"></span>

</div>


<div class="sign">

<div>Class Teacher Sign</div>
<div>Principal Sign</div>

</div>

</div>

<button class="printBtn" onclick="window.print()">Print Marksheet</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let subjects=[];

const examSnap=await getDocs(collection(db,"exam_sessions"));

document.getElementById("examSelect").innerHTML=
examSnap.docs.map(d=>`<option value="${d.id}">${d.data().examName}</option>`).join("");

const subSnap=await getDocs(collection(db,"subjects"));
subjects=subSnap.docs.map(d=>({id:d.id,...d.data()}));


window.loadStudents=async function(){

const cls=document.getElementById("classSelect").value;

const q=query(collection(db,"admissions"),where("class","==",cls));

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

document.getElementById("studentSelect").innerHTML=
students.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

}


function grade(p){

if(p>=90) return "A+";
if(p>=75) return "A";
if(p>=60) return "B";
if(p>=45) return "C";
if(p>=33) return "D";
return "F";

}


window.generateResult=async function(){

const studentId=document.getElementById("studentSelect").value;

const exams=[...document.getElementById("examSelect").selectedOptions].map(o=>o.value);

const student=students.find(s=>s.id==studentId);

document.getElementById("name").innerText=student.name;
document.getElementById("father").innerText=student.father;
document.getElementById("class").innerText=student.class;
document.getElementById("roll").innerText=student.roll;
document.getElementById("village").innerText=student.village;
document.getElementById("mobile").innerText=student.mobile;
document.getElementById("photo").src=student.photo;

let total=0;
let max=0;

const tbody=document.getElementById("resultTable");
tbody.innerHTML="";

for(const exam of exams){

for(const sub of subjects){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

const p=((m.marks/m.maxMarks)*100).toFixed(2);

tbody.innerHTML+=`
<tr>
<td>${exam}</td>
<td>${sub.name}</td>
<td>${m.marks}</td>
<td>${m.maxMarks}</td>
<td>${p}%</td>
</tr>
`;

total+=m.marks;
max+=m.maxMarks;

}

}

}

const percent=((total/max)*100).toFixed(2);

document.getElementById("total").innerText=total;
document.getElementById("max").innerText=max;
document.getElementById("percent").innerText=percent;
document.getElementById("grade").innerText=grade(percent);
document.getElementById("status").innerText=percent>=33?"PASS":"FAIL";

document.getElementById("marksheet").style.display="block";

}

</script>

</body>
</html>
