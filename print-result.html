<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>School Result System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

#marksheet{
display:none;
background:white;
padding:25px;
border:5px solid #004aad;
}

.school{
text-align:center;
font-size:26px;
font-weight:bold;
color:#004aad;
}

.student{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.photo{
width:120px;
height:140px;
border:2px solid black;
object-fit:cover;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#fbc02d;
}

.resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.sign{
margin-top:50px;
display:flex;
justify-content:space-between;
}

@media print{

header,.card,.printBtn{
display:none;
}

#marksheet{
display:block;
border:none;
}

}

</style>

</head>

<body>

<header>School Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="studentSelect"></select>

<select id="examSelect" multiple style="height:120px;"></select>

<br>

<button onclick="loadStudents()">Load Students</button>

<button onclick="generateResult()">Generate Result</button>

<button class="printBtn" onclick="printMarksheet()">Print Marksheet</button>

</div>


<div id="marksheet">

<div class="school">

NEW MODEL PUBLIC SCHOOL<br>

<span style="font-size:14px">

Ujjain Madhya Pradesh

</span>

</div>


<div class="student">

<div>

Name : <span id="name"></span><br>
Father : <span id="father"></span><br>
Class : <span id="class"></span><br>
Roll : <span id="roll"></span><br>
DOB : <span id="dob"></span><br>
Village : <span id="village"></span><br>
District : <span id="district"></span><br>
State : <span id="state"></span><br>

</div>

<img id="photo" class="photo">

</div>


<table>

<thead id="tableHead"></thead>

<tbody id="resultTable"></tbody>

</table>


<div class="resultBox">

Total : <span id="totalMarks"></span><br>

Percentage : <span id="percentage"></span>%<br>

Grade : <span id="grade"></span><br>

Result : <span id="result"></span>

</div>


<h3>Grade System</h3>

<table>

<tr>
<th>Marks</th>
<th>Grade</th>
</tr>

<tr><td>91-100</td><td>A1</td></tr>
<tr><td>81-90</td><td>A2</td></tr>
<tr><td>71-80</td><td>B1</td></tr>
<tr><td>61-70</td><td>B2</td></tr>
<tr><td>51-60</td><td>C1</td></tr>
<tr><td>41-50</td><td>C2</td></tr>
<tr><td>33-40</td><td>D</td></tr>
<tr><td>0-32</td><td>Fail</td></tr>

</table>


<div class="sign">

<div>Class Teacher</div>

<div>Principal</div>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let subjects=[];
let exams=[];


/* LOAD EXAMS */

const examSnap=await getDocs(collection(db,"exam_sessions"));

exams=examSnap.docs.map(d=>({
id:d.id,
name:d.data().examName
}));

examSelect.innerHTML=
exams.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");


/* LOAD SUBJECTS */

const subSnap=await getDocs(collection(db,"subjects"));

subjects=subSnap.docs.map(d=>({
id:d.id,
name:d.data().name
}));


/* LOAD STUDENTS */

window.loadStudents=async function(){

const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("class","==",cls)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({
id:d.id,
...d.data()
}));

studentSelect.innerHTML=
students.map(s=>`
<option value="${s.id}">
${s.name} (Roll ${s.roll})
</option>
`).join("");

}


/* GRADE */

function getGrade(p){

if(p>=90)return"A1";
if(p>=80)return"A2";
if(p>=70)return"B1";
if(p>=60)return"B2";
if(p>=50)return"C1";
if(p>=40)return"C2";
if(p>=33)return"D";
return"F";

}


/* RESULT */

window.generateResult=async function(){

const studentId=studentSelect.value;

const examsSelected=[...examSelect.selectedOptions].map(o=>o.value);

const student=students.find(s=>s.id==studentId);

name.innerText=student.name;
father.innerText=student.father;
class.innerText=student.class;
roll.innerText=student.roll;
dob.innerText=student.dob;
village.innerText=student.village;
district.innerText=student.district;
state.innerText=student.state;
photo.src=student.photo;

let total=0;
let max=0;

/* HEADER */

tableHead.innerHTML="<tr><th>Subject</th>";

examsSelected.forEach(e=>{
const ex=exams.find(x=>x.id==e).name;
tableHead.innerHTML+=`<th>${ex}</th>`;
});

tableHead.innerHTML+="</tr>";

resultTable.innerHTML="";


for(const sub of subjects){

let row=`<tr><td>${sub.name}</td>`;

for(const exam of examsSelected){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

row+=`<td>${m.marks}</td>`;

total+=m.marks;
max+=m.maxMarks;

}else{

row+="<td>-</td>";

}

}

row+="</tr>";

resultTable.innerHTML+=row;

}

const percent=((total/max)*100).toFixed(2);

totalMarks.innerText=total;

percentage.innerText=percent;

grade.innerText=getGrade(percent);

result.innerText=percent>=33?"PASS":"FAIL";

marksheet.style.display="block";

}


/* PRINT */

window.printMarksheet=function(){

marksheet.style.display="block";

setTimeout(()=>{
window.print();
},300);

}

</script>

</body>
</html>
