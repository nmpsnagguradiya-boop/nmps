<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* MARKSHEET */

.marksheet{
width:210mm;
min-height:297mm;
background:white;
padding:15px;
margin:auto;
border:4px solid #004aad;
display:flex;
flex-direction:column;
page-break-after:always;
}

/* SCHOOL HEADER */

.school-header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #004aad;
padding-bottom:8px;
}

.school-name{
flex:1;
text-align:center;
font-size:30px;
font-weight:bold;
color:#004aad;
}

.school-header img{
width:55px;
}

.school-info{
text-align:center;
font-size:13px;
margin:6px 0;
}

/* STUDENT */

.student{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.student-details{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px 15px;
font-size:13px;
}

.student img{
width:80px;
height:95px;
object-fit:cover;
border:1px solid #ccc;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:8px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

/* STYLE COLORS */

.style1 th{background:#004aad;color:white;}
.style2 th{background:#e63946;color:white;}
.style3 th{background:#2a9d8f;color:white;}
.style4 th{background:#ff9800;color:white;}

/* RESULT */

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

/* ACTIVITY */

.activity{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
font-size:13px;
}

/* SIGNATURE */

.signature-section{
margin-top:auto;
display:flex;
justify-content:space-between;
}

.signature-box{
text-align:center;
}

.signature-box .line{
border-top:1px solid #000;
width:150px;
margin:auto;
}

.export-loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
z-index:9999;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>

<br>

<button onclick="generateResults()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">Single PDF</button>
<button onclick="exportAllPDF()">Export All Students Result PDF</button>

</div>

<div id="resultArea"></div>

</div>

<div id="exportLoading" class="export-loading">
Generating PDF...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy",
authDomain:"project.firebaseapp.com",
projectId:"project"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

schoolData=snap.data();

const sessions=schoolData.sessions||[];

sessionSelect.innerHTML='<option value="">Select Session</option>'+
sessions.map(s=>`<option>${s}</option>`).join("");

}

}

loadSchool();

function grade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";

}

window.generateResults=async function(){

const session=sessionSelect.value;
const cls=classSelect.value;

if(!session || !cls){

alert("Select Session and Class");
return;

}

const studentSnap=await getDocs(query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
));

let html="";

for(const st of studentSnap.docs){

const student=st.data();

/* SUBJECT MARKS */

let subjects=["Hindi","English","Math","Science","Social"];

let rows="";
let total=0;

subjects.forEach(sub=>{

let marks=Math.floor(Math.random()*40)+60;

total+=marks;

rows+=`
<tr>
<td>${sub}</td>
<td>${marks}</td>
</tr>
`;

});

rows+=`
<tr style="font-weight:bold;background:#f1f1f1">
<td>Total</td>
<td>${total}</td>
</tr>
`;

let max=subjects.length*100;

let percent=((total/max)*100).toFixed(1);

let g=grade(percent);

let result=percent>=33?"PASS":"FAIL";

html+=`

<div class="marksheet style1">

<div class="school-header">

<img src="${schoolData.logo||''}">

<div class="school-name">

${schoolData.name||'School Name'}

</div>

<img src="${schoolData.logo||''}">

</div>

<div class="school-info">

Session : ${session} |
DISE : ${schoolData.dise||''}

</div>

<div class="student">

<div class="student-details">

<div><b>Name:</b> ${student.name}</div>
<div><b>Father:</b> ${student.father||''}</div>

<div><b>Class:</b> ${student.class}</div>
<div><b>Roll:</b> ${student.roll||''}</div>

</div>

<img src="${student.photo||''}">

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

${rows}

</table>

<div class="activity">

<div><b>Sports:</b> A</div>
<div><b>Activity:</b> A</div>
<div><b>Attendance:</b> 95%</div>

</div>

<div style="margin-top:8px;font-size:14px">

<b>Total :</b> ${total} / ${max} |
<b>Percentage :</b> ${percent}% |
<b>Grade :</b> ${g} |
<b class="${result=='PASS'?'pass':'fail'}">${result}</b>

</div>

<div class="signature-section">

<div class="signature-box">

Class Teacher
<div class="line"></div>

</div>

<div class="signature-box">

Principal
<div class="line"></div>

</div>

</div>

</div>

`;

}

resultArea.innerHTML=html;

}

window.downloadPDF=function(){

html2pdf(resultArea,{
margin:5,
filename:"result.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
});

}

window.exportAllPDF=async function(){

document.getElementById("exportLoading").style.display="flex";

await html2pdf().from(resultArea).set({

margin:5,
filename:'all-students-result.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}

}).save();

document.getElementById("exportLoading").style.display="none";

}

</script>

</body>
</html>
