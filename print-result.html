<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* MARKSHEET */

.marksheet{
width:210mm;
min-height:297mm;
background:white;
padding:15px;
margin:auto;
display:flex;
flex-direction:column;
page-break-after:always;
border:4px solid #004aad;
}

/* HEADER */

.school-header{
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:3px solid #004aad;
padding-bottom:8px;
}

.school-name{
flex:1;
text-align:center;
font-size:45px; /* 1.5x Bigger */
font-weight:bold;
color:#004aad;
}

.school-header img{
width:60px;
}

.school-info{
text-align:center;
font-size:13px;
margin-top:5px;
}

/* STUDENT */

.student{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.student-details{
display:grid;
grid-template-columns:1fr 1fr;
gap:5px 15px;
font-size:13px;
}

.student img{
width:80px;
height:95px;
object-fit:cover;
border:1px solid #ccc;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

th{
color:white;
}

/* STYLE COLORS */

.cbse th{background:#004aad;}
.icse th{background:#e63946;}
.state th{background:#2a9d8f;}
.pro1 th{background:#6a4c93;}
.pro2 th{background:#f77f00;}
.pro3 th{background:#0096c7;}
.pro4 th{background:#ff006e;}

/* RESULT */

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

/* ACTIVITY */

.activity-box{
margin-top:8px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
font-size:13px;
}

/* SIGNATURE */

.signature-section{
margin-top:auto;
display:flex;
justify-content:space-between;
}

.signature-box{
text-align:center;
}

.signature-box .line{
border-top:1px solid #000;
width:150px;
margin:auto;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option>
</select>

<select id="styleSelect">
<option value="cbse">CBSE</option>
<option value="icse">ICSE</option>
<option value="state">STATE</option>
<option value="pro1">PRO 1</option>
<option value="pro2">PRO 2</option>
<option value="pro3">PRO 3</option>
<option value="pro4">PRO 4</option>
</select>

<br>

<button onclick="generateResults()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="exportAllPDF()">Export All Students Result PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy",
authDomain:"project.firebaseapp.com",
projectId:"project"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

schoolData=snap.data();

const sessions=schoolData.sessions||[];

sessionSelect.innerHTML='<option value="">Select Session</option>'+sessions.map(s=>`<option>${s}</option>`).join("");

}

}

loadSchool();

function grade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";

}

window.generateResults=async function(){

const session=sessionSelect.value;
const cls=classSelect.value;
const style=styleSelect.value;

if(!session || !cls){
alert("Select Session and Class");
return;
}

const studentSnap=await getDocs(query(collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
));

let html="";

for(const st of studentSnap.docs){

const student=st.data();

let subjects=["Hindi","English","Math","Science","Social"];

let rows="";
let total=0;

subjects.forEach(sub=>{

let m=Math.floor(Math.random()*40)+60;
total+=m;

rows+=`<tr>
<td>${sub}</td>
<td>${m}</td>
</tr>`;

});

let percent=(total/500*100).toFixed(1);

rows+=`
<tr style="font-weight:bold;background:#f1f1f1">
<td>Total</td>
<td>${total}</td>
</tr>
`;

html+=`

<div class="marksheet ${style}">

<div class="school-header">

<img src="${schoolData.logo||''}">

<div class="school-name">
${schoolData.name||'School Name'}
</div>

<img src="${schoolData.logo||''}">

</div>

<div class="school-info">
Session : ${session} | DISE : ${schoolData.dise||''}
</div>

<div class="student">

<div class="student-details">

<div><b>Name:</b> ${student.name}</div>
<div><b>Father:</b> ${student.father||''}</div>

<div><b>Class:</b> ${student.class}</div>
<div><b>Roll:</b> ${student.roll||''}</div>

</div>

<img src="${student.photo||''}">

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

${rows}

</table>

<div class="activity-box">

<div><b>Sports :</b> A</div>
<div><b>Activity :</b> A</div>
<div><b>Attendance :</b> 95%</div>

</div>

<div style="margin-top:8px;font-size:14px">

<b>Total :</b> ${total} / 500 |
<b>Percentage :</b> ${percent}% |
<b>Grade :</b> ${grade(percent)}

</div>

<div class="signature-section">

<div class="signature-box">
Class Teacher
<div class="line"></div>
</div>

<div class="signature-box">
Principal
<div class="line"></div>
</div>

</div>

</div>

`;

}

resultArea.innerHTML=html;

}

window.downloadPDF=function(){

html2pdf(resultArea,{
margin:5,
filename:"result.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
});

}

window.exportAllPDF=function(){

html2pdf(resultArea,{
margin:5,
filename:"all-results.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
});

}

</script>

</body>
</html>
