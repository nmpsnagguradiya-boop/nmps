<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px
}

.container{padding:20px;max-width:1200px;margin:auto}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

select,button{
padding:10px;
margin:5px
}

button{
background:#004aad;
color:white;
border:none;
border-radius:6px;
cursor:pointer
}

.marksheet{
border:2px solid #004aad;
padding:20px;
margin-bottom:40px;
background:white;
position:relative
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.08;
width:200px
}

.school{
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid #ccc;
padding-bottom:10px;
margin-bottom:10px
}

.school img{
width:60px;
height:60px
}

.school-name{
font-size:20px;
font-weight:bold;
color:#004aad
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
border:1px solid #ccc;
padding:5px;
text-align:center;
font-size:13px
}

.pass{color:green;font-weight:bold}
.fail{color:red;font-weight:bold}

@media print{
header,.card{display:none}
body{background:white}
}

</style>
</head>

<body>

<header>Print Result</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="watermarkSelect">
<option value="off">Watermark OFF</option>
<option value="on">Watermark ON</option>
</select>

<button onclick="generateResult()">Generate Result</button>
<button onclick="printResult()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={}

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId))

if(snap.exists()) schoolData=snap.data()

loadSessions()

}

loadSchool()

async function loadSessions(){

const sessions=schoolData.sessions||[]

let html='<option value="">Select Session</option>'

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`
})

sessionSelect.innerHTML=html

}

async function generateResult(){

const session=sessionSelect.value
const cls=classSelect.value

if(!session||!cls){
alert("Select Session and Class")
return
}

const q=query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
)

const snap=await getDocs(q)

let html=""

for(const docSnap of snap.docs){

const student=docSnap.data()

const marksQuery=query(
collection(db,"marks"),
where("studentId","==",docSnap.id),
where("session","==",session)
)

const marksSnap=await getDocs(marksQuery)

let rows=""
let total=0
let maxTotal=0

marksSnap.forEach(m=>{

const d=m.data()

total+=Number(d.marks)
maxTotal+=Number(d.max)

rows+=`
<tr>
<td>${d.exam}</td>
<td>${d.subject}</td>
<td>${d.marks}</td>
<td>${d.max}</td>
<td>${grade(d.marks,d.max)}</td>
</tr>
`

})

let percent=0
if(maxTotal>0){
percent=((total/maxTotal)*100).toFixed(2)
}

const result=percent>=33?"PASS":"FAIL"

const watermark=watermarkSelect.value==="on"
? `<img class="watermark" src="${schoolData.logo||""}">`
: ""

html+=`

<div class="marksheet">

${watermark}

<div class="school">

<img src="${schoolData.logo||""}">

<div>

<div class="school-name">${schoolData.name||""}</div>
<div>${schoolData.address||""}</div>
<div>Session : ${session}</div>

</div>

</div>

<b>Name :</b> ${student.name}<br>
<b>Father :</b> ${student.father}<br>
<b>Class :</b> ${student.class}<br>
<b>Roll :</b> ${student.roll}

<table>

<tr>
<th>Exam</th>
<th>Subject</th>
<th>Marks</th>
<th>Max</th>
<th>Grade</th>
</tr>

${rows}

</table>

<h3>Total : ${total} / ${maxTotal}</h3>
<h3>Percentage : ${percent}%</h3>
<h3 class="${result==="PASS"?"pass":"fail"}">Result : ${result}</h3>

</div>

`

}

resultArea.innerHTML=html

}

function grade(m,max){

let p=(m/max)*100

if(p>=90)return"A+"
if(p>=75)return"A"
if(p>=60)return"B"
if(p>=45)return"C"
if(p>=33)return"D"

return"F"

}

window.printResult=function(){
window.print()
}

window.downloadPDF=function(){

const element=document.getElementById("resultArea")

html2pdf(element,{
margin:5,
filename:"result.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
})

}

</script>

</body>
  </html>
