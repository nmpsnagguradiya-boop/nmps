<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Ultra Pro Result System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:'Segoe UI',Arial;
margin:0;
background:#eef2f7;
}

/* header */

header{
background:#1a237e;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}

/* layout */

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

select,button{
padding:10px;
margin:5px;
width:100%;
max-width:250px;
}

button{
background:#1a237e;
color:white;
border:none;
cursor:pointer;
}

/* marksheet */

#marksheet{
display:none;
padding:30px;
border:6px solid #1a237e;
background:white;
}

/* 7 colour styles */

.style1{border-color:#1a237e;background:linear-gradient(#ffffff,#eef2ff);}
.style2{border-color:#00695c;background:linear-gradient(#ffffff,#e0f7fa);}
.style3{border-color:#ad1457;background:linear-gradient(#ffffff,#fce4ec);}
.style4{border-color:#ef6c00;background:linear-gradient(#ffffff,#fff3e0);}
.style5{border-color:#4a148c;background:linear-gradient(#ffffff,#f3e5f5);}
.style6{border-color:#2e7d32;background:linear-gradient(#ffffff,#e8f5e9);}
.style7{border-color:#1565c0;background:linear-gradient(#ffffff,#e3f2fd);}

/* school header */

.school{
text-align:center;
font-size:28px;
font-weight:bold;
color:#1a237e;
}

/* student section */

.student{
display:flex;
justify-content:space-between;
margin-top:20px;
border:2px solid #ddd;
padding:15px;
background:#fafafa;
}

.details{
line-height:1.7;
font-size:14px;
font-weight:500;
}

.photo{
width:120px;
height:140px;
border:3px solid #1a237e;
object-fit:cover;
}

/* professional table */

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
font-size:14px;
}

th{
background:#1a237e;
color:white;
padding:10px;
font-weight:bold;
font-style:italic;
}

td{
border:1px solid #ccc;
padding:8px;
font-weight:bold;
font-style:italic;
}

tr:nth-child(even){
background:#f5f5f5;
}

.resultBox{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#1a237e;
border-top:3px solid #1a237e;
padding-top:10px;
}

.sign{
margin-top:60px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

/* print */

@media print{

header,.card,.printBtn,.excelBtn,.batchBtn{
display:none;
}

#marksheet{
display:block;
border:none;
}

}

</style>
</head>

<body>

<header>Ultra Pro Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect" multiple style="height:120px;"></select>

<select id="studentSelect"></select>

<select id="styleSelect" onchange="changeStyle()">
<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>
</select>

<br>

<button onclick="loadStudents()">Load Students</button>
<button onclick="generateResult()">Generate Result</button>

<button class="excelBtn" onclick="exportExcel()">Export Excel</button>
<button class="batchBtn" onclick="printClass()">Batch Print</button>

</div>

<div id="marksheet" class="style1">

<div class="school">
NEW MODEL PUBLIC SCHOOL<br>
<span style="font-size:16px">Ujjain Madhya Pradesh</span>
</div>

<div class="student">

<div class="details">

Name : <span id="name"></span><br>
Father : <span id="father"></span><br>
Class : <span id="class"></span><br>
Roll : <span id="roll"></span><br>
DOB : <span id="dob"></span><br>

Village : <span id="village"></span><br>
Post : <span id="post"></span><br>
District : <span id="district"></span><br>
State : <span id="state"></span><br>

Category : <span id="category"></span><br>

Aadhar : <span id="adhar"></span><br>
APAR : <span id="apar"></span><br>
SSSM : <span id="sssm"></span><br>
Scholar : <span id="scholer"></span><br>
National : <span id="national"></span><br>

<canvas id="qr"></canvas>

</div>

<img id="photo" class="photo">

</div>

<table>

<thead id="tableHead"></thead>
<tbody id="resultTable"></tbody>

</table>

<div class="resultBox">

Total : <span id="total"></span> / <span id="max"></span><br>
Percentage : <span id="percent"></span>%<br>
Grade : <span id="grade"></span><br>
Result : <span id="status"></span>

</div>

<div class="sign">
<div>Class Teacher Sign</div>
<div>Principal Sign</div>
</div>

</div>

<button class="printBtn" onclick="window.print()">Print Marksheet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let subjects=[];
let exams=[];

const examSnap=await getDocs(collection(db,"exam_sessions"));
exams=examSnap.docs.map(d=>({id:d.id,name:d.data().examName}));

document.getElementById("examSelect").innerHTML=
exams.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");

const subSnap=await getDocs(collection(db,"subjects"));
subjects=subSnap.docs.map(d=>({id:d.id,...d.data()}));

window.loadStudents=async function(){

const cls=document.getElementById("classSelect").value;

const q=query(collection(db,"admissions"),where("class","==",cls));

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

document.getElementById("studentSelect").innerHTML=
students.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

}

function grade(p){

if(p>=90) return "A+";
if(p>=75) return "A";
if(p>=60) return "B";
if(p>=45) return "C";
if(p>=33) return "D";
return "F";

}

window.generateResult=async function(){

const studentId=document.getElementById("studentSelect").value;

const selectedExams=[...document.getElementById("examSelect").selectedOptions].map(o=>o.value);

const student=students.find(s=>s.id==studentId);

document.getElementById("name").innerText=student.name;
document.getElementById("father").innerText=student.father;
document.getElementById("class").innerText=student.class;
document.getElementById("roll").innerText=student.roll;
document.getElementById("dob").innerText=student.dob;

document.getElementById("village").innerText=student.village;
document.getElementById("post").innerText=student.post;
document.getElementById("district").innerText=student.district;
document.getElementById("state").innerText=student.state;

document.getElementById("category").innerText=student.category;

document.getElementById("adhar").innerText=student.adhar;
document.getElementById("apar").innerText=student.apar;
document.getElementById("sssm").innerText=student.sssm;
document.getElementById("scholer").innerText=student.scholer;
document.getElementById("national").innerText=student.national;

document.getElementById("photo").src=student.photo;

QRCode.toCanvas(document.getElementById("qr"),"Student:"+student.roll);

let total=0;
let max=0;

const head=document.getElementById("tableHead");
const body=document.getElementById("resultTable");

head.innerHTML="<tr><th>Subject</th>";

selectedExams.forEach(e=>{
const examName=exams.find(x=>x.id==e).name;
head.innerHTML+=`<th>${examName}</th>`;
});

head.innerHTML+="</tr>";

body.innerHTML="";

for(const sub of subjects){

let row=`<tr><td>${sub.name}</td>`;

for(const exam of selectedExams){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

row+=`<td>${m.marks} / ${m.maxMarks}</td>`;

total+=m.marks;
max+=m.maxMarks;

}else{

row+="<td>-</td>";

}

}

row+="</tr>";

body.innerHTML+=row;

}

const percent=((total/max)*100).toFixed(2);

document.getElementById("total").innerText=total;
document.getElementById("max").innerText=max;
document.getElementById("percent").innerText=percent;
document.getElementById("grade").innerText=grade(percent);
document.getElementById("status").innerText=percent>=33?"PASS":"FAIL";

document.getElementById("marksheet").style.display="block";

}

window.changeStyle=function(){

const s=document.getElementById("styleSelect").value;

document.getElementById("marksheet").className=s;

}

window.exportExcel=function(){

const table=document.querySelector("table");

const wb=XLSX.utils.table_to_book(table,{sheet:"Result"});

XLSX.writeFile(wb,"result.xlsx");

}

window.printClass=async function(){

for(const s of students){

document.getElementById("studentSelect").value=s.id;

await generateResult();

window.print();

}

}

</script>

</body>
</html>
