<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}
.container{max-width:1200px;margin:auto;padding:20px;}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.marksheet{
width:210mm;
min-height:297mm;
background:white;
padding:20px;
margin:auto;
border:2px solid #004aad;
page-break-after:always;
position:relative;
}

.school-header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #004aad;
padding-bottom:10px;
margin-bottom:10px;
}

.school-header img{width:50px;}

.school-name{
flex:1;
text-align:center;
font-size:28px;
font-weight:bold;
color:#004aad;
}

.school-info{
text-align:center;
font-size:14px;
margin-bottom:10px;
}

.student{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.student-details{line-height:1.4;}

.student img{
width:80px;
height:100px;
object-fit:cover;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

th{
background:#004aad;
color:white;
}

.signature-section{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.signature-box{text-align:center;}

.signature-box .line{
border-top:1px solid #000;
width:150px;
margin:auto;
}

.pass{color:green;font-weight:bold;}
.fail{color:red;font-weight:bold;}

.grade-system{
margin-top:15px;
}

.grade-system th,.grade-system td{
border:1px solid #004aad;
padding:5px;
font-size:12px;
}

@media print{
.card{display:none;}
table,th,td{border:1px solid #000 !important;}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<button onclick="generateResults()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};
let students=[];
let subjects=[];
let exams=[];
let marks=[];
let attendance=[];

function grade(p){

p=Number(p);

if(p>=90) return "A+";
if(p>=75) return "A";
if(p>=60) return "B";
if(p>=45) return "C";
if(p>=33) return "D";

return "F";

}

async function loadAllData(){

const schoolSnap=await getDoc(doc(db,"schools",schoolId));
if(schoolSnap.exists()) schoolData=schoolSnap.data();

const studentsSnap=await getDocs(collection(db,"admissions"));
students=[];
studentsSnap.forEach(d=>{
let data=d.data();
data.id=d.id;
if(data.schoolId==schoolId) students.push(data);
});

const subjectSnap=await getDocs(collection(db,"subjects"));
subjects=[];
subjectSnap.forEach(d=>{
let data=d.data();
data.id=d.id;
if(data.schoolId==schoolId) subjects.push(data);
});

const examSnap=await getDocs(collection(db,"exam_sessions"));
exams=[];
examSnap.forEach(d=>{
let data=d.data();
data.id=d.id;
if(data.schoolId==schoolId) exams.push(data);
});

const marksSnap=await getDocs(collection(db,"marks"));
marks=[];
marksSnap.forEach(d=>marks.push(d.data()));

const attSnap=await getDocs(collection(db,"attendance"));
attendance=[];
attSnap.forEach(d=>attendance.push(d.data()));

}

function getMarks(studentId,subjectId,examId){

let m=marks.find(x=>
x.studentId==studentId &&
x.subjectId==subjectId &&
x.examId==examId
);

return m ? m.marks : 0;

}

function getAttendance(studentId){

let a=attendance.find(x=>x.studentId==studentId);

return a || {
sports:"",
activity:"",
workingDays:"",
present:"",
absent:""
};

}

window.generateResults=async function(){

await loadAllData();

const session=sessionSelect.value;
const cls=classSelect.value;

let html="";

students.forEach(student=>{

if(student.class!=cls || student.session!=session) return;

let head="<tr><th>Subject</th>";

exams.forEach(e=>{head+=`<th>${e.examName}</th>`});

head+="<th>Total</th><th>%</th><th>Grade</th><th>Result</th></tr>";

let rows="";
let grandTotal=0;

subjects.forEach(sub=>{

let total=0;

let row=`<tr><td>${sub.name}</td>`;

exams.forEach(ex=>{

let m=getMarks(student.id,sub.id,ex.id);

row+=`<td>${m}</td>`;

total+=Number(m);

});

let percent=(total/exams.length).toFixed(1);
let g=grade(percent);

let pass=percent>=33;

row+=`<td>${total}</td>
<td>${percent}</td>
<td>${g}</td>
<td class="${pass?'pass':'fail'}">${pass?'PASS':'FAIL'}</td></tr>`;

rows+=row;

grandTotal+=total;

});

let att=getAttendance(student.id);

html+=`

<div class="marksheet">

<div class="school-header">
<img src="${schoolData.logo}">
<div class="school-name">${schoolData.name}</div>
<img src="${schoolData.logo}">
</div>

<div class="school-info">
${schoolData.address||""} |
DISE: ${schoolData.dise||""} |
Session: ${session}
</div>

<div class="student">

<div class="student-details">

Name: ${student.name}<br>
Father: ${student.father}<br>
Class: ${student.class}<br>
Roll: ${student.roll}<br>
Aadhar: ${student.adhar||""}<br>
Village/City: ${student.city||student.village||""}<br>
DOB: ${student.dob||""}

</div>

<img src="${student.photo||""}">

</div>

<table>${head}${rows}</table>

<table>

<tr>
<th>Sports</th>
<th>Activity</th>
<th>Working Days</th>
<th>Present</th>
<th>Absent</th>
</tr>

<tr>
<td>${att.sports}</td>
<td>${att.activity}</td>
<td>${att.workingDays}</td>
<td>${att.present}</td>
<td>${att.absent}</td>
</tr>

</table>

<table class="grade-system">

<tr><th>Percentage</th><th>Grade</th></tr>
<tr><td>90-100</td><td>A+</td></tr>
<tr><td>75-89</td><td>A</td></tr>
<tr><td>60-74</td><td>B</td></tr>
<tr><td>45-59</td><td>C</td></tr>
<tr><td>33-44</td><td>D</td></tr>
<tr><td>0-32</td><td>F</td></tr>

</table>

<div class="signature-section">

<div class="signature-box">
Class Teacher
<div class="line"></div>
</div>

<div class="signature-box">
Principal
<div class="line"></div>
</div>

</div>

</div>

`;

});

document.getElementById("resultArea").innerHTML=html;

}

window.downloadPDF=function(){

html2pdf(
document.getElementById("resultArea"),
{
margin:5,
filename:"result.pdf",
html2canvas:{scale:2,useCORS:true},
jsPDF:{unit:"mm",format:"a4"}
}
);

}

</script>

</body>
</html>
