<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Ultra Result System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1a237e;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* layout */

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

select,button{
padding:10px;
margin:5px;
width:100%;
max-width:250px;
}

button{
background:#1a237e;
color:white;
border:none;
cursor:pointer;
}

/* marksheet */

#marksheet{
display:none;
padding:30px;
background:white;
}

/* normal styles */

.style1{border:6px solid #1a237e;background:#eef2ff;}
.style2{border:6px solid #00695c;background:#e0f7fa;}
.style3{border:6px solid #ad1457;background:#fce4ec;}
.style4{border:6px solid #ef6c00;background:#fff3e0;}
.style5{border:6px solid #4a148c;background:#f3e5f5;}
.style6{border:6px solid #2e7d32;background:#e8f5e9;}
.style7{border:6px solid #1565c0;background:#e3f2fd;}

/* CBSE STYLE */

.cbse{

border:6px solid #c62828;
background:white;
font-family:Times New Roman;

}

.cbse .school{

font-size:30px;
color:#e91e63;

}

.cbse table th{

background:#fbc02d;
color:black;

}

.cbse table td{

background:#fffde7;

}

/* CERTIFICATE STYLE */

.certificate{

border:15px double #00838f;
background:#f1f8f9;
font-family:Georgia;

}

.certificate .school{

font-size:32px;
color:#0d47a1;

}

.certificate table th{

background:#0288d1;
color:white;

}

.certificate table td{

background:#e1f5fe;

}

/* school header */

.school{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

/* student details */

.student{
display:flex;
justify-content:space-between;
margin-top:20px;
border:2px solid #ccc;
padding:15px;
background:#fafafa;
}

.details{
line-height:1.7;
font-size:14px;
}

.photo{
width:120px;
height:140px;
border:2px solid black;
object-fit:cover;
}

/* table */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#1a237e;
color:white;
}

.resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.sign{
margin-top:60px;
display:flex;
justify-content:space-between;
}

@media print{

header,.card,.printBtn{
display:none;
}

#marksheet{
display:block;
}

}

</style>

</head>

<body>

<header>Ultra Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">
<option value="">Select Class</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect" multiple style="height:120px;"></select>

<select id="studentSelect"></select>

<select id="styleSelect" onchange="changeStyle()">

<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>

<option value="cbse">CBSE Report Card</option>
<option value="certificate">Certificate Style</option>

</select>

<br>

<button onclick="loadStudents()">Load Students</button>
<button onclick="generateResult()">Generate Result</button>

</div>

<div id="marksheet" class="style1">

<div class="school">

<div style="display:flex;justify-content:space-between;align-items:center">

<img src="logo.png" width="70">

<div>

NEW MODEL PUBLIC SCHOOL<br>

<span style="font-size:16px">
Ujjain Madhya Pradesh
</span>

</div>

<img src="logo.png" width="70">

</div>

<hr>

REPORT CARD

</div>

<div class="student">

<div class="details">

Name : <span id="name"></span><br>
Father : <span id="father"></span><br>
Class : <span id="class"></span><br>
Roll : <span id="roll"></span><br>
DOB : <span id="dob"></span><br>

Village : <span id="village"></span><br>
District : <span id="district"></span><br>
State : <span id="state"></span><br>

Aadhar : <span id="adhar"></span><br>

<canvas id="qr"></canvas>

</div>

<img id="photo" class="photo">

</div>

<table>

<thead id="tableHead"></thead>
<tbody id="resultTable"></tbody>

</table>

<div class="resultBox">

Total : <span id="total"></span> / <span id="max"></span><br>

Percentage : <span id="percent"></span>%<br>

Grade : <span id="grade"></span><br>

Result : <span id="status"></span>

</div>

<div class="sign">

<div>Class Teacher</div>
<div>Principal</div>

</div>

</div>

<button class="printBtn" onclick="window.print()">Print Marksheet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let subjects=[];
let exams=[];

const examSnap=await getDocs(collection(db,"exam_sessions"));
exams=examSnap.docs.map(d=>({id:d.id,name:d.data().examName}));

document.getElementById("examSelect").innerHTML=
exams.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");

const subSnap=await getDocs(collection(db,"subjects"));
subjects=subSnap.docs.map(d=>({id:d.id,...d.data()}));

window.loadStudents=async function(){

const cls=document.getElementById("classSelect").value;

const q=query(collection(db,"admissions"),where("class","==",cls));

const snap=await getDocs(q);

students=snap.docs.map(d=>({id:d.id,...d.data()}));

document.getElementById("studentSelect").innerHTML=
students.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

}

function grade(p){

if(p>=90) return "A+";
if(p>=75) return "A";
if(p>=60) return "B";
if(p>=45) return "C";
if(p>=33) return "D";
return "F";

}

window.generateResult=async function(){

const studentId=document.getElementById("studentSelect").value;

const examsSelected=[...document.getElementById("examSelect").selectedOptions].map(o=>o.value);

const student=students.find(s=>s.id==studentId);

document.getElementById("name").innerText=student.name;
document.getElementById("father").innerText=student.father;
document.getElementById("class").innerText=student.class;
document.getElementById("roll").innerText=student.roll;
document.getElementById("dob").innerText=student.dob;

document.getElementById("village").innerText=student.village;
document.getElementById("district").innerText=student.district;
document.getElementById("state").innerText=student.state;

document.getElementById("adhar").innerText=student.adhar;

document.getElementById("photo").src=student.photo;

QRCode.toCanvas(document.getElementById("qr"),"Roll:"+student.roll);

let total=0;
let max=0;

const head=document.getElementById("tableHead");
const body=document.getElementById("resultTable");

head.innerHTML="<tr><th>Subject</th>";

examsSelected.forEach(e=>{
const name=exams.find(x=>x.id==e).name;
head.innerHTML+=`<th>${name}</th>`;
});

head.innerHTML+="</tr>";

body.innerHTML="";

for(const sub of subjects){

let row=`<tr><td>${sub.name}</td>`;

for(const exam of examsSelected){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

row+=`<td>${m.marks} / ${m.maxMarks}</td>`;

total+=m.marks;
max+=m.maxMarks;

}else{

row+="<td>-</td>";

}

}

row+="</tr>";

body.innerHTML+=row;

}

const percent=((total/max)*100).toFixed(2);

document.getElementById("total").innerText=total;
document.getElementById("max").innerText=max;
document.getElementById("percent").innerText=percent;
document.getElementById("grade").innerText=grade(percent);
document.getElementById("status").innerText=percent>=33?"PASS":"FAIL";

document.getElementById("marksheet").style.display="block";

}

window.changeStyle=function(){

const s=document.getElementById("styleSelect").value;

document.getElementById("marksheet").className=s;

}

</script>

</body>
</html>
