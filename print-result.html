<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}

.container{max-width:1200px;margin:auto;padding:20px;}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* REPORT CARD */

.marksheet{
width:210mm;
height:297mm;
background:white;
padding:20px;
margin:auto;
border:2px solid #004aad;
box-sizing:border-box;
display:flex;
flex-direction:column;
position:relative;
}

.school-header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #004aad;
padding-bottom:10px;
margin-bottom:10px;
}

.school-header img{width:50px;}

.school-name{
flex:1;
text-align:center;
font-size:28px;
font-weight:bold;
color:#004aad;
}

.school-info{
text-align:center;
font-size:14px;
margin-bottom:10px;
}

.report-title{
text-align:center;
font-size:22px;
font-weight:bold;
margin:8px 0;
color:#000;
}

/* STUDENT AREA */

.student{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.student-details{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 30px;
font-size:14px;
line-height:1.4;
}

.student img{
width:80px;
height:100px;
object-fit:cover;
border:1px solid #ccc;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:12px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

th{
background:#004aad;
color:white;
}

/* WATERMARK */

.watermark-logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.05;
width:200px;
}

.watermark-text{
position:absolute;
top:40%;
left:20%;
font-size:60px;
opacity:0.05;
transform:rotate(-30deg);
}

/* SIGNATURE */

.signature-section{
margin-top:auto;
display:flex;
justify-content:space-between;
}

.signature-box{
text-align:center;
}

.signature-box .line{
border-top:1px solid #000;
width:150px;
margin:auto;
margin-top:30px;
}

/* GRADE TABLE */

.grade-system{
margin-top:12px;
}

.grade-system th,.grade-system td{
border:1px solid #004aad;
padding:5px;
font-size:12px;
}

/* PASS FAIL */

.pass{color:green;font-weight:bold;}
.fail{color:red;font-weight:bold;}

/* STYLE VARIANTS */

.cbse{border-color:#004aad;} .cbse th{background:#004aad;}
.icse{border-color:#ff5733;} .icse th{background:#ff5733;}
.state{border-color:#28a745;} .state th{background:#28a745;}
.pro1{border-color:#6f42c1;} .pro1 th{background:#6f42c1;}
.pro2{border-color:#fd7e14;} .pro2 th{background:#fd7e14;}
.pro3{border-color:#17a2b8;} .pro3 th{background:#17a2b8;}
.pro4{border-color:#e83e8c;} .pro4 th{background:#e83e8c;}

@page{
size:A4;
margin:5mm;
}

@media print{
.card{display:none;}
table,th,td{
border:1px solid #000 !important;
-webkit-print-color-adjust: exact;
print-color-adjust: exact;
}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>

<select id="styleSelect">
<option value="cbse">CBSE Pattern</option>
<option value="icse">ICSE Pattern</option>
<option value="state">State Board</option>
<option value="pro1">Professional 1</option>
<option value="pro2">Professional 2</option>
<option value="pro3">Professional 3</option>
<option value="pro4">Professional 4</option>
</select>

<select id="watermark">
<option value="off">Watermark OFF</option>
<option value="logo">Logo Watermark</option>
<option value="name">School Name Watermark</option>
</select>

<select id="resultType">
<option value="percent">Percentage System</option>
<option value="gradeOnly">Grade Only System</option>
</select>

<br>

<button onclick="generateResults()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){
const snap=await getDoc(doc(db,"schools",schoolId));
if(snap.exists()){
schoolData=snap.data();
const sessions=schoolData.sessions||[];
sessionSelect.innerHTML='<option value="">Select Session</option>'+sessions.map(s=>`<option>${s}</option>`).join("");
}
}

loadSchool();

function grade(p){
if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";
}

window.generateResults=async function(){

const session=sessionSelect.value;
const cls=classSelect.value;
const style=styleSelect.value;

if(!session||!cls){alert("Select Session and Class");return;}

const studentSnap=await getDocs(query(collection(db,"admissions"),where("schoolId","==",schoolId),where("session","==",session),where("class","==",cls)));

let html="";

for(const st of studentSnap.docs){

const student=st.data();

html+=`

<div class="marksheet ${style}">

<div class="school-header">
<img src="${schoolData.logo}">
<div class="school-name">${schoolData.name}</div>
<img src="${schoolData.logo}">
</div>

<div class="school-info">
Address: ${schoolData.address||""} | DISE Code: ${schoolData.dise||""} | Session: ${session}
</div>

<div class="report-title">REPORT CARD</div>

<div class="student">

<div class="student-details">
<div><b>Name:</b> ${student.name}</div>
<div><b>Class:</b> ${student.class}</div>
<div><b>Father:</b> ${student.father}</div>
<div><b>Mother:</b> ${student.mother||""}</div>
<div><b>Roll:</b> ${student.roll}</div>
<div><b>DOB:</b> ${student.dob||""}</div>
<div><b>Aadhaar:</b> ${student.aadhaar||""}</div>
<div><b>Village/City:</b> ${student.city||student.village||""}</div>
</div>

<img src="${student.photo||""}">

</div>

<!-- MARKS TABLE SAME AS YOUR CODE -->

<div class="signature-section">

<div class="signature-box">
Class Teacher
<div class="line"></div>
</div>

<div class="signature-box">
Principal
<div class="line"></div>
</div>

</div>

</div>
`;

}

document.getElementById("resultArea").innerHTML=html;

}

window.downloadPDF=function(){

html2pdf(document.getElementById("resultArea"),{
margin:5,
filename:"report-card.pdf",
html2canvas:{scale:2,useCORS:true},
jsPDF:{unit:"mm",format:"a4"}
});

}

</script>

</body>
  </html>
