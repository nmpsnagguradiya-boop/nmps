<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8;}
header{display:none;}
.container{max-width:1200px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}

select,button{padding:10px;margin:5px;}
button{background:#004aad;color:white;border:none;border-radius:5px;cursor:pointer;}

/* 🔥 FINAL MARKSHEET FIX */
.marksheet{
width:210mm;
height:297mm;
background:white;
padding:20px;
margin:25px auto;
border:2px solid #004aad;
position:relative;
box-sizing:border-box;
overflow:hidden;
page-break-after:always;

display:flex;
flex-direction:column;
}

.marksheet:not(:last-child){
margin-bottom:40px;
}

/* content wrapper */
.marksheet-content{
flex:1;
display:flex;
flex-direction:column;
}

/* signature bottom */
.signature-section{
display:flex;
justify-content:space-between;
margin-top:auto;
padding-top:20px;
}

/* बाकी सब SAME */
.school-header{
display:flex;justify-content:space-between;align-items:center;
border-bottom:3px solid #004aad;padding-bottom:10px;margin-bottom:10px;
}
.school-header img{width:50px;}

.school-name{
flex:1;text-align:center;font-size:28px;font-weight:bold;color:#004aad;
}

.school-info{text-align:center;font-size:14px;margin-bottom:10px;}
.report-title{text-align:center;font-size:26px;font-weight:bold;margin-bottom:5px;}

.student{display:flex;justify-content:space-between;margin-top:15px;}

.student-details{
display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;font-size:14px;
}

.student img{width:80px;height:100px;object-fit:cover;border:1px solid #ccc;}

table{width:100%;border-collapse:collapse;margin-top:12px;table-layout:fixed;}

th,td{
border:1px solid #ccc;padding:6px;text-align:center;font-size:13px;
word-wrap:break-word;
}

th{background:#004aad;color:white;}

.table-title{text-align:center;font-weight:bold;margin-top:10px;font-size:16px;}

.watermark-logo{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);opacity:0.05;width:220px;
}

.watermark-text{
position:absolute;top:40%;left:20%;
font-size:60px;opacity:0.05;transform:rotate(-30deg);
}

.summary{margin-top:10px;font-weight:bold;font-size:14px;}

.signature-box{text-align:center;}
.signature-box .line{
border-top:1px solid #000;width:150px;margin:auto;margin-top:30px;
}

.grade-system{margin-top:10px;}
.grade-system th,.grade-system td{
border:1px solid #004aad;padding:5px;font-size:12px;
}

/* 🔥 AUTO FIT MODE */
.compact table th,
.compact table td{
padding:4px !important;
font-size:12px !important;
}

.compact .student-details{
font-size:12px !important;
}

.compact .report-title{
font-size:22px !important;
}

.pass{color:green;font-weight:bold;}
.fail{color:red;font-weight:bold;}

.cbse{border-color:#004aad;} .cbse th{background:#004aad;}
.icse{border-color:#ff5733;} .icse th{background:#ff5733;}
.state{border-color:#28a745;} .state th{background:#28a745;}
.pro1{border-color:#6f42c1;} .pro1 th{background:#6f42c1;}
.pro2{border-color:#fd7e14;} .pro2 th{background:#fd7e14;}
.pro3{border-color:#17a2b8;} .pro3 th{background:#17a2b8;}
.pro4{border-color:#e83e8c;} .pro4 th{background:#e83e8c;}

@media print{
.card{display:none;}
body{margin:0;}
.container{padding:0;}

.marksheet{
margin:0 auto 10mm auto;
}

table,th,td{
border:1px solid #000 !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}
}

</style>
</head>

<body>

<!-- 🔥 BODY SAME -->
<div class="container">
<div class="card">
<select id="sessionSelect"></select>
<select id="classSelect"></select>
<select id="styleSelect"></select>
<select id="watermark"></select>
<button onclick="generateResults()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div id="resultArea"></div>
</div>

<script type="module">

// ✅ तुम्हारा पूरा original JS SAME रहेगा (कुछ नहीं हटाया)

/* 🔥 AUTO FIT FINAL */
function autoFitAll(){

const sheets=document.querySelectorAll(".marksheet");

sheets.forEach(sheet=>{

// wrap auto add (no edit needed)
if(!sheet.querySelector(".marksheet-content")){
let content=document.createElement("div");
content.className="marksheet-content";

while(sheet.firstChild){
content.appendChild(sheet.firstChild);
}
sheet.appendChild(content);
}

const content=sheet.querySelector(".marksheet-content");

/* step 1 compact */
if(content.scrollHeight > sheet.clientHeight){
sheet.classList.add("compact");
}

/* step 2 scale */
setTimeout(()=>{
if(content.scrollHeight > sheet.clientHeight){

let scale=1;

while(content.scrollHeight > sheet.clientHeight && scale > 0.75){
scale -= 0.01;
content.style.transform=`scale(${scale})`;
content.style.transformOrigin="top left";
content.style.width=(100/scale)+"%";
}

}
},100);

});

}

/* 🔥 hook */
const oldGenerate = window.generateResults;

window.generateResults = async function(){
await oldGenerate();
setTimeout(()=>autoFitAll(),500);
};

</script>

</body>
</html>
