<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Ultra Result System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
width:100%;
max-width:260px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

#marksheet{
display:none;
background:white;
padding:25px;
border:5px solid #004aad;
}

/* styles */

.style1{border-color:#004aad;background:#eef3ff;}
.style2{border-color:#4caf50;background:#e8f5e9;}
.style3{border-color:#e91e63;background:#fce4ec;}
.style4{border-color:#ff9800;background:#fff3e0;}
.style5{border-color:#9c27b0;background:#f3e5f5;}
.style6{border-color:#009688;background:#e0f2f1;}
.style7{border-color:#2196f3;background:#e3f2fd;}
.style8{border:6px solid #c62828;background:white;}
.style9{border:12px double #00838f;background:#f1f8f9;}

.school{
text-align:center;
font-size:26px;
font-weight:bold;
color:#004aad;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#fbc02d;
}

.resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.sign{
margin-top:40px;
display:flex;
justify-content:space-between;
}

@media print{

header,.card,.printBtn{
display:none;
}

#marksheet{
display:block;
border:none;
}

}

</style>
</head>

<body>

<header>Ultra Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="examSelect" multiple style="height:120px;"></select>

<select id="studentSelect"></select>

<select id="styleSelect" onchange="changeStyle()">
<option value="style1">Style 1</option>
<option value="style2">Style 2</option>
<option value="style3">Style 3</option>
<option value="style4">Style 4</option>
<option value="style5">Style 5</option>
<option value="style6">Style 6</option>
<option value="style7">Style 7</option>
<option value="style8">CBSE Style</option>
<option value="style9">Certificate Style</option>
</select>

<br>

<button onclick="loadStudents()">Load Students</button>
<button onclick="generateResult()">Generate Result</button>

</div>

<div id="marksheet" class="style1">

<div class="school">
NEW MODEL PUBLIC SCHOOL<br>
<span style="font-size:16px">Ujjain Madhya Pradesh</span>
</div>

<table>

<tr>
<th>Name</th>
<td id="name"></td>
<th>Roll</th>
<td id="roll"></td>
</tr>

<tr>
<th>Father</th>
<td id="father"></td>
<th>Class</th>
<td id="class"></td>
</tr>

<tr>
<th>DOB</th>
<td id="dob"></td>
<th>Village</th>
<td id="village"></td>
</tr>

<tr>
<th>District</th>
<td id="district"></td>
<th>State</th>
<td id="state"></td>
</tr>

</table>

<table>

<thead id="tableHead"></thead>
<tbody id="resultTable"></tbody>

</table>

<div class="resultBox">

Total : <span id="total"></span><br>
Percentage : <span id="percent"></span>%<br>
Grade : <span id="grade"></span><br>
Result : <span id="status"></span>

</div>

<div class="sign">
<div>Class Teacher</div>
<div>Principal</div>
</div>

</div>

<button class="printBtn" onclick="window.print()">Print Marksheet</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];
let subjects=[];
let exams=[];

/* EXAMS LOAD */

const examSnap=await getDocs(collection(db,"exam_sessions"));

exams=examSnap.docs.map(d=>({
id:d.id,
name:d.data().examName
}));

document.getElementById("examSelect").innerHTML=
exams.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");

/* SUBJECT LOAD */

const subSnap=await getDocs(collection(db,"subjects"));

subjects=subSnap.docs.map(d=>({
id:d.id,
name:d.data().name
}));

/* STUDENT LOAD */

window.loadStudents=async function(){

const cls=document.getElementById("classSelect").value;

const q=query(
collection(db,"admissions"),
where("class","==",cls)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({
id:d.id,
...d.data()
}));

document.getElementById("studentSelect").innerHTML=
students.map(s=>`<option value="${s.id}">
${s.name} (Roll ${s.roll})
</option>`).join("");

}

/* GRADE */

function grade(p){

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";
return"F";

}

/* RESULT */

window.generateResult=async function(){

const studentId=document.getElementById("studentSelect").value;

const examsSelected=[...document.getElementById("examSelect").selectedOptions]
.map(o=>o.value);

const student=students.find(s=>s.id==studentId);

document.getElementById("name").innerText=student.name;
document.getElementById("father").innerText=student.father;
document.getElementById("class").innerText=student.class;
document.getElementById("roll").innerText=student.roll;
document.getElementById("dob").innerText=student.dob;
document.getElementById("village").innerText=student.village;
document.getElementById("district").innerText=student.district;
document.getElementById("state").innerText=student.state;

let total=0;
let max=0;

const head=document.getElementById("tableHead");
const body=document.getElementById("resultTable");

head.innerHTML="<tr><th>Subject</th>";

examsSelected.forEach(e=>{
const name=exams.find(x=>x.id==e).name;
head.innerHTML+=`<th>${name}</th>`;
});

head.innerHTML+="</tr>";

body.innerHTML="";

for(const sub of subjects){

let row=`<tr><td>${sub.name}</td>`;

for(const exam of examsSelected){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

row+=`<td>${m.marks}</td>`;

total+=m.marks;
max+=m.maxMarks;

}else{

row+="<td>-</td>";

}

}

row+="</tr>";

body.innerHTML+=row;

}

const percent=((total/max)*100).toFixed(2);

document.getElementById("total").innerText=total;
document.getElementById("percent").innerText=percent;
document.getElementById("grade").innerText=grade(percent);
document.getElementById("status").innerText=percent>=33?"PASS":"FAIL";

document.getElementById("marksheet").style.display="block";

}

window.changeStyle=function(){

const s=document.getElementById("styleSelect").value;

document.getElementById("marksheet").className=s;

}

</script>

</body>
          </html>
