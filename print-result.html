<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Result System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

select,button{
padding:10px;
margin:5px;
}

#marksheet{
display:none;
background:white;
padding:20px;
border:4px solid #004aad;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

.photo{
width:120px;
height:140px;
object-fit:cover;
border:2px solid black;
}

</style>

</head>

<body>

<header>School Result System</header>

<div class="container">

<div class="card">

<select id="classSelect">

<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<button onclick="loadStudents()">Load Students</button>

<br>

<select id="studentSelect"></select>

<br>

<select id="examSelect" multiple style="height:120px;"></select>

<br>

<button onclick="generateResult()">Generate Result</button>

<button onclick="window.print()">Print</button>

</div>


<div id="marksheet">

<h2>Marksheet</h2>

Name : <span id="name"></span><br>
Father : <span id="father"></span><br>
Class : <span id="class"></span><br>
Roll : <span id="roll"></span><br>

<img id="photo" class="photo">

<table>

<thead id="tableHead"></thead>

<tbody id="resultTable"></tbody>

</table>

Total : <span id="total"></span><br>
Percentage : <span id="percent"></span><br>

</div>

</div>


<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
getDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let students=[];
let subjects=[];
let exams=[];


/* LOAD EXAMS */

async function loadExams(){

const snap=await getDocs(collection(db,"exam_sessions"));

exams=snap.docs.map(d=>({
id:d.id,
...d.data()
}));

const examSelect=document.getElementById("examSelect");

examSelect.innerHTML="";

exams.forEach(e=>{

const opt=document.createElement("option");

opt.value=e.id;

opt.text=e.examName;

examSelect.appendChild(opt);

});

}

loadExams();


/* LOAD SUBJECTS */

async function loadSubjects(){

const snap=await getDocs(collection(db,"subjects"));

subjects=snap.docs.map(d=>({
id:d.id,
...d.data()
}));

}

loadSubjects();


/* LOAD STUDENTS */

window.loadStudents=async function(){

const cls=document.getElementById("classSelect").value;

const q=query(
collection(db,"admissions"),
where("class","==",cls)
);

const snap=await getDocs(q);

students=snap.docs.map(d=>({
id:d.id,
...d.data()
}));

const studentSelect=document.getElementById("studentSelect");

studentSelect.innerHTML="";

students.forEach(s=>{

const opt=document.createElement("option");

opt.value=s.id;

opt.text=s.name;

studentSelect.appendChild(opt);

});

}


/* RESULT */

window.generateResult=async function(){

const studentId=document.getElementById("studentSelect").value;

const examsSelected=[...document.getElementById("examSelect").selectedOptions]
.map(o=>o.value);

const student=students.find(s=>s.id==studentId);

name.innerText=student.name;
father.innerText=student.father;
class.innerText=student.class;
roll.innerText=student.roll;
photo.src=student.photo;

let total=0;
let max=0;

const head=document.getElementById("tableHead");
const body=document.getElementById("resultTable");

head.innerHTML="<tr><th>Subject</th>";

examsSelected.forEach(e=>{
const ex=exams.find(x=>x.id==e);
head.innerHTML+=`<th>${ex.examName}</th>`;
});

head.innerHTML+="</tr>";

body.innerHTML="";

for(const sub of subjects){

let row=`<tr><td>${sub.name}</td>`;

for(const exam of examsSelected){

const id=`${studentId}_${exam}_${sub.id}`;

const markDoc=await getDoc(doc(db,"marks",id));

if(markDoc.exists()){

const m=markDoc.data();

row+=`<td>${m.marks}</td>`;

total+=m.marks;

max+=m.maxMarks;

}else{

row+="<td>-</td>";

}

}

row+="</tr>";

body.innerHTML+=row;

}

percent=((total/max)*100).toFixed(2);

document.getElementById("total").innerText=total;

document.getElementById("percent").innerText=percent;

document.getElementById("marksheet").style.display="block";

}

</script>

</body>

</html>
