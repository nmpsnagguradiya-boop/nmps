<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.marksheet{
background:white;
border:2px solid #004aad;
padding:20px;
position:relative;
}

.watermark-logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.07;
width:200px;
}

.watermark-text{
position:absolute;
top:40%;
left:10%;
font-size:40px;
opacity:0.05;
transform:rotate(-30deg);
white-space:nowrap;
}

.school{
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid #ccc;
padding-bottom:10px;
margin-bottom:10px;
}

.school img{
width:60px;
height:60px;
}

.school-name{
font-size:20px;
font-weight:bold;
color:#004aad;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

.result-pass{
color:green;
font-weight:bold;
}

.result-fail{
color:red;
font-weight:bold;
}

@media print{
header,.card{display:none;}
body{background:white;}
}

</style>
</head>

<body>

<header>Student Result / Marksheet</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>
<select id="classSelect"></select>
<select id="studentSelect"></select>

<select id="watermarkType">
<option value="off">Watermark OFF</option>
<option value="logo">School Logo Watermark</option>
<option value="text">School Name Watermark</option>
</select>

<button onclick="loadResult()">Generate Result</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId") || "school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){
schoolData=snap.data();
}

}

loadSchool();

async function loadSessions(){

const snap=await getDoc(doc(db,"schools",schoolId));

const sessions=snap.data().sessions || [];

let html="<option>Select Session</option>";

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`;
});

sessionSelect.innerHTML=html;

}

loadSessions();

async function loadResult(){

const session=sessionSelect.value;
const studentId=studentSelect.value;

const studentDoc=await getDoc(doc(db,"admissions",studentId));

const student=studentDoc.data();

const examQuery=query(
collection(db,"exams"),
where("schoolId","==",schoolId),
where("session","==",session)
);

const examSnap=await getDocs(examQuery);

let rows="";
let total=0;
let maxTotal=0;

for(const exam of examSnap.docs){

const examData=exam.data();

const markQuery=query(
collection(db,"marks"),
where("examId","==",exam.id),
where("studentId","==",studentId)
);

const markSnap=await getDocs(markQuery);

markSnap.forEach(m=>{

const data=m.data();

total+=Number(data.marks);
maxTotal+=Number(data.max);

rows+=`
<tr>
<td>${examData.examName}</td>
<td>${data.subject}</td>
<td>${data.marks}</td>
<td>${data.max}</td>
<td>${getGrade(data.marks,data.max)}</td>
</tr>
`;

});

}

const percent=((total/maxTotal)*100).toFixed(2);

const result=percent>=33?"PASS":"FAIL";

const attendanceQuery=query(
collection(db,"attendance"),
where("studentId","==",studentId),
where("session","==",session)
);

const attSnap=await getDocs(attendanceQuery);

let attendance=0;

attSnap.forEach(a=>{
attendance=a.data().percent || 0;
});

let watermarkHTML="";

if(watermarkType.value=="logo"){

watermarkHTML=`<img class="watermark-logo" src="${schoolData.logo}">`;

}

if(watermarkType.value=="text"){

let txt="";
for(let i=0;i<6;i++){
txt+=schoolData.name+" ";
}

watermarkHTML=`<div class="watermark-text">${txt}</div>`;

}

resultArea.innerHTML=`

<div class="marksheet">

${watermarkHTML}

<div class="school">

<img src="${schoolData.logo}">

<div>

<div class="school-name">${schoolData.name}</div>

<div>${schoolData.address}</div>

<div>DISE : ${schoolData.dise}</div>

<div>Session : ${session}</div>

</div>

</div>

<h3>Student Details</h3>

<b>Name :</b> ${student.name}<br>
<b>Father :</b> ${student.father}<br>
<b>Class :</b> ${student.class}<br>
<b>Roll :</b> ${student.roll}

<table>

<tr>
<th>Exam</th>
<th>Subject</th>
<th>Marks</th>
<th>Max</th>
<th>Grade</th>
</tr>

${rows}

</table>

<h3>Total : ${total} / ${maxTotal}</h3>

<h3>Percentage : ${percent}%</h3>

<h3 class="${result=="PASS"?"result-pass":"result-fail"}">
Result : ${result}
</h3>

<h3>Attendance : ${attendance}%</h3>

<h3>Sports Grade : A</h3>
<h3>Activity Grade : B</h3>

</div>

`;

}

function getGrade(marks,max){

const p=(marks/max)*100;

if(p>=90) return "A+";
if(p>=75) return "A";
if(p>=60) return "B";
if(p>=45) return "C";
if(p>=33) return "D";

return "F";

}

</script>

</body>
  </html>
