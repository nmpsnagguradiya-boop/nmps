<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f4f8}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px
}

.container{
max-width:1200px;
margin:auto;
padding:20px
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

select,button{
padding:10px;
margin:5px
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer
}

/* MARKSHEET */

.marksheet{
width:210mm;
min-height:297mm;
padding:20px;
margin:auto;
background:white;
border:2px solid #004aad;
position:relative;
page-break-after:always
}

.school{
display:flex;
align-items:center;
gap:10px;
border-bottom:2px solid #004aad;
padding-bottom:10px;
margin-bottom:10px
}

.school img{
width:45px;
height:45px;
}

.school-name{
font-size:20px;
font-weight:bold;
color:#004aad
}

.exam-title{
text-align:center;
font-size:18px;
font-weight:bold;
margin:10px 0
}

.student{
display:flex;
justify-content:space-between;
margin-top:10px
}

.student img{
width:80px;
height:100px;
border:1px solid #ccc;
object-fit:cover
}

.details{
font-size:14px
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center
}

.watermark-logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.06;
width:200px
}

.watermark-text{
position:absolute;
top:30%;
left:5%;
font-size:50px;
opacity:0.05;
transform:rotate(-30deg);
white-space:nowrap;
}

.result-pass{color:green;font-weight:bold}
.result-fail{color:red;font-weight:bold}

@media print{
header,.card{display:none}
body{background:white}
}

</style>
</head>

<body>

<header>Student Result</header>

<div class="container">

<div class="card">

<select id="sessionSelect"></select>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="watermarkType">
<option value="off">Watermark OFF</option>
<option value="logo">Logo Watermark</option>
<option value="text">School Name Watermark</option>
</select>

<button onclick="loadStudents()">Generate Result</button>
<button onclick="window.print()">Print</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<div id="resultArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,getDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";

let schoolData={};

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()) schoolData=snap.data();

loadSessions();

}

loadSchool();

function loadSessions(){

const sessions=schoolData.sessions||[];

let html='<option value="">Select Session</option>';

sessions.forEach(s=>{
html+=`<option value="${s}">${s}</option>`;
});

sessionSelect.innerHTML=html;

}

window.loadStudents=async function(){

const session=sessionSelect.value;
const cls=classSelect.value;

const q=query(
collection(db,"admissions"),
where("schoolId","==",schoolId),
where("session","==",session),
where("class","==",cls)
);

const snap=await getDocs(q);

let html="";

for(const d of snap.docs){

const s=d.data();

const markQuery=query(
collection(db,"marks"),
where("studentId","==",d.id),
where("session","==",session)
);

const markSnap=await getDocs(markQuery);

let rows="";
let total=0;
let maxTotal=0;

markSnap.forEach(m=>{

const data=m.data();

total+=Number(data.marks);
maxTotal+=Number(data.max);

rows+=`
<tr>
<td>${data.subject}</td>
<td>${data.marks}</td>
<td>${data.max}</td>
<td>${grade(data.marks,data.max)}</td>
</tr>
`;

});

let percent=((total/maxTotal)*100).toFixed(2);

const result=percent>=33?"PASS":"FAIL";

let watermarkHTML="";

if(watermarkType.value==="logo"){
watermarkHTML=`<img class="watermark-logo" src="${schoolData.logo}">`;
}

if(watermarkType.value==="text"){

let txt="";

for(let i=0;i<8;i++){
txt+=schoolData.name+" ";
}

watermarkHTML=`<div class="watermark-text">${txt}</div>`;
}

html+=`

<div class="marksheet">

${watermarkHTML}

<div class="school">

<img src="${schoolData.logo||""}">

<div>
<div class="school-name">${schoolData.name||""}</div>
<div>${schoolData.address||""}</div>
<div>Session : ${session}</div>
</div>

</div>

<div class="exam-title">ANNUAL EXAMINATION RESULT</div>

<div class="student">

<div class="details">

Name : ${s.name}<br>
Father : ${s.father}<br>
Class : ${s.class}<br>
Roll : ${s.roll}<br>
DOB : ${s.dob||""}<br>
Aadhaar : ${s.aadhaar||""}<br>
SSSM ID : ${s.sssm||""}<br>
Village : ${s.village||""}

</div>

<img src="${s.photo||""}">

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
<th>Max</th>
<th>Grade</th>
</tr>

${rows}

</table>

<h3>Total : ${total}/${maxTotal}</h3>
<h3>Percentage : ${percent}%</h3>

<h3 class="${result==="PASS"?"result-pass":"result-fail"}">
Result : ${result}
</h3>

</div>

`;

}

resultArea.innerHTML=html;

}

function grade(m,max){

let p=(m/max)*100;

if(p>=90)return"A+";
if(p>=75)return"A";
if(p>=60)return"B";
if(p>=45)return"C";
if(p>=33)return"D";

return"F";

}

window.downloadPDF=function(){

const element=document.getElementById("resultArea");

html2pdf(element,{
margin:5,
filename:"result.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
});

}

</script>

</body>
           </html>
