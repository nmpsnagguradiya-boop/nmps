<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:800px;margin:30px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input, select{width:100%;padding:10px;margin:8px 0;}
button{padding:12px;border:none;background:#004aad;color:white;font-size:16px;border-radius:8px;cursor:pointer;margin-top:5px;}
button:hover{background:#003080;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#004aad;color:white;}
img{width:50px;height:50px;border-radius:50%;object-fit:cover;}
</style>
</head>
<body>
<div class="container">
<h2>Teacher Management</h2>
<input id="tname" placeholder="Teacher Name">
<input id="tsubject" placeholder="Subject">
<input id="tdegree" placeholder="Degree">
<input id="temail" placeholder="Email">
<input id="tpassword" placeholder="Password" type="password">
<input type="file" id="tphoto">
<div>
<label><input type="checkbox" value="Admission Management" class="tpages"> Admission Management</label>
<label><input type="checkbox" value="Exam Management" class="tpages"> Exam Management</label>
<label><input type="checkbox" value="Result Management" class="tpages"> Result Management</label>
<label><input type="checkbox" value="Fees Management" class="tpages"> Fees Management</label>
</div>
<button onclick="addTeacher()"><i class="fa fa-plus"></i> Add Teacher</button>

<h3>Teacher List</h3>
<table>
<thead>
<tr><th>Photo</th><th>Name</th><th>Subject</th><th>Degree</th><th>Email</th><th>Pages</th><th>Action</th></tr>
</thead>
<tbody id="teacherTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, setDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function uploadImg(file){
    const key="21000d5a5d14fcef4b6af4d13647da5a8";
    const fd = new FormData();
    fd.append("image",file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${key}`,{method:"POST",body:fd});
    const data = await res.json();
    return data.data.url;
}

window.addTeacher = async function(){
    const name=document.getElementById("tname").value;
    const subject=document.getElementById("tsubject").value;
    const degree=document.getElementById("tdegree").value;
    const email=document.getElementById("temail").value;
    const password=document.getElementById("tpassword").value;
    const file=document.getElementById("tphoto").files[0];
    let photo="";
    if(file) photo=await uploadImg(file);
    const pages = Array.from(document.querySelectorAll(".tpages:checked")).map(c=>c.value);
    const id="t_"+Date.now();
    await setDoc(doc(db,"teachers",id),{name,subject,degree,email,password,photo,pages});
    alert("Teacher Added!");
    loadTeachers();
}

async function loadTeachers(){
    const snap = await getDocs(collection(db,"teachers"));
    const tbody=document.getElementById("teacherTable");
    tbody.innerHTML="";
    snap.forEach(docu=>{
        const d=docu.data();
        tbody.innerHTML+=`<tr>
            <td>${d.photo?`<img src="${d.photo}">`:""}</td>
            <td>${d.name}</td>
            <td>${d.subject}</td>
            <td>${d.degree}</td>
            <td>${d.email}</td>
            <td>${(d.pages||[]).join(", ")}</td>
            <td><button onclick="deleteTeacher('${docu.id}')"><i class="fa fa-trash"></i></button></td>
        </tr>`;
    });
}

window.deleteTeacher=async function(id){ if(confirm("Delete teacher?")){ await deleteDoc(doc(db,"teachers",id)); loadTeachers(); } }

loadTeachers();
</script>
</body>
    </html>
