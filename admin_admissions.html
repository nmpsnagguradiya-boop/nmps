<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Admissions Panel</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#004aad;color:white;padding:16px;text-align:center;font-size:22px;}
.container{padding:20px;max-width:1200px;margin:auto;}
.big-buttons{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
.big-btn{flex:1;min-width:180px;background:white;padding:20px;border-radius:10px;display:flex;align-items:center;gap:15px;font-size:18px;font-weight:bold;cursor:pointer;box-shadow:0 0 8px rgba(0,0,0,0.15);justify-content:center;}
.big-btn span{font-size:28px;}
.controls{margin-bottom:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.controls select, .controls button{padding:10px;margin:5px;font-weight:bold;border-radius:8px;cursor:pointer;border:none;}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}
.promote{background:#20c997;color:white;}
.export{background:#28a745;color:white;color:white;}
@media(max-width:768px){.big-buttons{flex-direction:column;}.big-btn{justify-content:flex-start;}}
</style>
</head>
<body>

<header>Admin Admissions Panel</header>

<div class="container">

<!-- Top Buttons -->
<div class="big-buttons">
<div class="big-btn" onclick="window.location.href='admission.html'"><span><i class="fa-solid fa-user-plus"></i></span> Add New Student</div>
<div class="big-btn" onclick="window.location.href='all-students.html'"><span><i class="fa-solid fa-users"></i></span> All Students</div>
<div class="big-btn" onclick="window.location.href='print-result.html'"><span><i class="fa-solid fa-file-lines"></i></span> Print Result</div>
<div class="big-btn" onclick="window.location.href='print-id.html'"><span><i class="fa-solid fa-id-card"></i></span> Print ID</div>
</div>

<!-- Controls -->
<div class="controls">
<select id="classFilter">
<option value="all">Select Class to Promote</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>
<button class="promote" onclick="promoteClass()"><i class="fa-solid fa-arrow-up"></i> Promote Selected Class</button>
</div>

<!-- Students Table -->
<table>
<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Mobile</th>
<th>Class</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId = localStorage.getItem("schoolId")||"school_001";
const activeSession = localStorage.getItem("activeSession")||"2025-26";

let admissions=[];

loadAdmissions();

async function loadAdmissions(){
admissions=[];
const snapshot = await getDocs(collection(db,"admissions"));
snapshot.forEach(docSnap=>{
const data = docSnap.data();
if(data.schoolId!==schoolId) return;
if(data.session!==activeSession) return;
data.id=docSnap.id;
admissions.push(data);
});
renderTable();
}

function renderTable(){
const table=document.getElementById("list");
table.innerHTML="";
admissions.forEach(data=>{
table.innerHTML+=`
<tr>
<td>${data.name}</td>
<td>${data.father}</td>
<td>${data.mobile}</td>
<td>${data.class}</td>
</tr>`;
});
}

/* Promote Class System */
window.promoteClass=async function(){
const classToPromote = document.getElementById("classFilter").value;
if(!classToPromote || classToPromote==="all"){ alert("Select a class first"); return; }
const nextSession = prompt("Enter next session (e.g., 2026-27):");
if(!nextSession) return;

for(let student of admissions){
if(student.class===classToPromote){
let nextClass;
if(student.class==="Nursery") nextClass="LKG";
else if(student.class==="LKG") nextClass="UKG";
else if(student.class==="UKG") nextClass="1";
else if(!isNaN(parseInt(student.class))) nextClass=(parseInt(student.class)+1).toString();
else nextClass=student.class;

await addDoc(collection(db,"admissions"),{...student,session:nextSession,class:nextClass});
}
}
alert(`Class ${classToPromote} promoted to next session ${nextSession}`);
}

</script>

</body>
  </html>
