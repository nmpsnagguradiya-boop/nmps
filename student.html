<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NMPS Admission</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

input,select{
padding:6px;
margin:4px;
}

button{
padding:6px 12px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
background:white;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

img{
width:40px;
height:40px;
border-radius:50%;
}

</style>
</head>

<body>

<h2>NMPS Admission Panel</h2>

<input type="file" id="photo">

<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">

<select id="class"></select>

<input id="mobile" placeholder="Mobile">

<input id="roll" placeholder="Roll No">
<input id="scholar" placeholder="Scholar No">

<br>

<button onclick="saveStudent()">Add Student</button>

<hr>

<input id="className" placeholder="Class Name">
<button onclick="addClass()">Add Class</button>
<button onclick="deleteClass()">Delete Class</button>

<select id="filterClass" onchange="loadStudents()">
<option value="">All Class</option>
</select>

<table>

<thead>
<tr>

<th>Photo</th>
<th>Name</th>
<th>Father</th>
<th>Class</th>
<th>Mobile</th>
<th>Action</th>

</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const imgbbAPI="21000d5a5d14fcef4b6af4d13647da5a8";

async function uploadImage(){

let file=document.getElementById("photo").files[0];

if(!file) return "";

let formData=new FormData();
formData.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key="+imgbbAPI,{
method:"POST",
body:formData
});

let data=await res.json();

return data.data.url;

}

async function saveStudent(){

let photo=await uploadImage();

await db.collection("students").add({

photo:photo,
name:name.value,
father:father.value,
mother:mother.value,
class:document.getElementById("class").value,
mobile:mobile.value,
roll:roll.value,
scholar:scholar.value

});

alert("Student Added");

loadStudents();

}

async function loadStudents(){

let filter=document.getElementById("filterClass").value;

let q=db.collection("students");

if(filter!="") q=q.where("class","==",filter);

let snapshot=await q.get();

let html="";

snapshot.forEach(doc=>{

let s=doc.data();

html+=`

<tr>

<td><img src="${s.photo}"></td>
<td>${s.name}</td>
<td>${s.father}</td>
<td>${s.class}</td>
<td>${s.mobile}</td>

<td>
<button onclick="deleteStudent('${doc.id}')">Delete</button>
</td>

</tr>

`;

});

document.getElementById("studentsTable").innerHTML=html;

}

async function deleteStudent(id){

await db.collection("students").doc(id).delete();

loadStudents();

}

async function addClass(){

let c=document.getElementById("className").value;

await db.collection("classes").add({
name:c
});

loadClasses();

}

async function deleteClass(){

let c=document.getElementById("class").value;

let q=await db.collection("classes").where("name","==",c).get();

q.forEach(doc=>{
doc.ref.delete();
});

loadClasses();

}

async function loadClasses(){

let snapshot=await db.collection("classes").get();

let html="";

snapshot.forEach(doc=>{

let c=doc.data().name;

html+=`<option>${c}</option>`;

});

document.getElementById("class").innerHTML=html;

document.getElementById("filterClass").innerHTML='<option value="">All</option>'+html;

}

loadClasses();
loadStudents();

</script>

</body>
</html>
