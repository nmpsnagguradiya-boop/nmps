<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NMPS School ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:100%;
padding:7px;
margin-top:4px;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:8px 12px;
margin-top:10px;
cursor:pointer;
border-radius:4px;
}

button.delete{
background:#dc3545;
}

button.promote{
background:#ffc107;
color:black;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

img{
border-radius:4px;
}

.idCard{
width:300px;
background:#0d6efd;
color:white;
padding:15px;
border-radius:10px;
}

.idCard h3{
background:#ffc107;
color:black;
padding:5px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h2>NMPS School ERP</h2>

Total Students : <span id="totalStudents">0</span>

</header>

<div class="container">

<div class="card">

<h3>Add Student</h3>

<form id="studentForm">

<div class="grid">

<div>
<label>Photo</label>
<input type="file" id="photo">
</div>

<div>
<label>Student Name</label>
<input id="name">
</div>

<div>
<label>Father Name</label>
<input id="father">
</div>

<div>
<label>Mother Name</label>
<input id="mother">
</div>

<div>
<label>Class</label>
<select id="class"></select>
</div>

<div>
<label>Mobile</label>
<input id="mobile">
</div>

<div>
<label>Date Of Birth</label>
<input type="date" id="dob">
</div>

<div>
<label>Date Of Admission</label>
<input type="date" id="doa">
</div>

<div>
<label>Village</label>
<input id="village">
</div>

<div>
<label>Post</label>
<input id="post">
</div>

<div>
<label>District</label>
<input id="district">
</div>

<div>
<label>State</label>
<input id="state">
</div>

<div>
<label>National</label>
<input id="national">
</div>

<div>
<label>SSSM ID</label>
<input id="sssm">
</div>

<div>
<label>Family ID</label>
<input id="family">
</div>

<div>
<label>APAR ID</label>
<input id="apar">
</div>

<div>
<label>Aadhar</label>
<input id="aadhar">
</div>

<div>
<label>Caste</label>
<input id="caste">
</div>

<div>
<label>Category</label>
<input id="category">
</div>

<div>
<label>Roll Number</label>
<input id="roll">
</div>

<div>
<label>Scholar Number</label>
<input id="scholar">
</div>

</div>

<button type="submit">Add Student</button>

</form>

</div>

<div class="card">

<h3>Students</h3>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Class</th>
<th>Roll</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

<div class="card">

<h3>ID Card</h3>

<div class="idCard">

<h3>NMPS SCHOOL</h3>

<img id="idPhoto" width="80">

<p id="idName"></p>

<p id="idClass"></p>

<p id="idRoll"></p>

</div>

<button onclick="window.print()">Print ID</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
setDoc,
doc,
deleteDoc,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let students=[];
let editId=null;

async function uploadImg(file){

if(!file)return "";

let form=new FormData();
form.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{method:"POST",body:form});

let data=await res.json();

return data.data.url;

}

studentForm.onsubmit=async e=>{

e.preventDefault();

let file=photo.files[0];
let photoURL=await uploadImg(file);

let student={
name:name.value,
father:father.value,
mother:mother.value,
class:document.getElementById("class").value,
roll:roll.value,
photo:photoURL
};

let id=editId || student.name+"_"+student.class;

await setDoc(doc(db,"students",id),student);

studentForm.reset();
editId=null;

};

onSnapshot(collection(db,"students"),snap=>{

students=[];
snap.forEach(d=>students.push(d.data()));

render();

});

function render(){

studentTable.innerHTML="";

students.sort((a,b)=>a.roll-b.roll);

students.forEach(s=>{

let id=s.name+"_"+s.class;

studentTable.innerHTML+=`

<tr>

<td>${s.photo?'<img src="'+s.photo+'" width=40>':''}</td>

<td>${s.name}</td>

<td>${s.class}</td>

<td>${s.roll}</td>

<td>

<button onclick="editStudent('${id}')">Edit</button>

<button class="delete" onclick="deleteStudent('${id}')">Delete</button>

<button class="promote" onclick="promote('${id}')">Promote</button>

<button onclick="showID('${id}')">ID</button>

</td>

</tr>

`;

});

totalStudents.innerText=students.length;

}

window.editStudent=function(id){

let s=students.find(x=>(x.name+"_"+x.class)==id);

editId=id;

name.value=s.name;
father.value=s.father;
roll.value=s.roll;

}

window.deleteStudent=async function(id){

if(confirm("Delete student?"))

await deleteDoc(doc(db,"students",id));

}

window.promote=async function(id){

let s=students.find(x=>(x.name+"_"+x.class)==id);

let num=parseInt(s.class.replace("Class ",""));

let newClass="Class "+(num+1);

s.class=newClass;

await setDoc(doc(db,"students",s.name+"_"+newClass),s);

await deleteDoc(doc(db,"students",id));

}

window.showID=function(id){

let s=students.find(x=>(x.name+"_"+x.class)==id);

idPhoto.src=s.photo;
idName.innerText="Name : "+s.name;
idClass.innerText="Class : "+s.class;
idRoll.innerText="Roll : "+s.roll;

}

</script>

</body>
  </html>
