<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NMPS Student Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{font-family:Arial;background:#f2f2f2;margin:0}

header{background:#4CAF50;color:white;padding:15px;text-align:center;font-size:20px}

.container{padding:15px}

input,select{width:100%;padding:8px;margin:5px 0}

button{padding:8px 15px;margin:5px;cursor:pointer}

table{width:100%;border-collapse:collapse;background:white;margin-top:20px}

th,td{border:1px solid #ccc;padding:8px;text-align:left}

img{width:40px;height:40px;object-fit:cover}

.count{font-size:18px;margin-top:10px}

</style>
</head>

<body>

<header>NMPS Student Management</header>

<div class="container">

<h3>Create Class</h3>

<input id="newClass" placeholder="Enter Class Name">
<button onclick="createClass()">Create Class</button>

<select id="deleteClassSelect"></select>
<button onclick="deleteClass()">Delete Class</button>

<hr>

<h3>Class Filter</h3>

<select id="filterClass">
<option value="">All Classes</option>
</select>

<hr>

<h3>Add Student</h3>

<input type="file" id="photo">

<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">

<select id="class"></select>

<input id="mobile" placeholder="Mobile Number">
<input id="dob" placeholder="Date of Birth">
<input id="admission" placeholder="Date of Admission">
<input id="village" placeholder="Village / City">
<input id="post" placeholder="Post">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="national" placeholder="National">
<input id="sssm" placeholder="SSSM ID">
<input id="family" placeholder="Family ID">
<input id="apar" placeholder="APAR ID">
<input id="adhar" placeholder="Adhar Card">
<input id="caste" placeholder="Caste">
<input id="category" placeholder="Category">
<input id="roll" placeholder="Roll Number">
<input id="scholar" placeholder="Scholar Number">

<button onclick="addStudent()">Save Student</button>

<br>

<button onclick="exportExcel()">Export Excel</button>
<input type="file" id="importFile">
<button onclick="importExcel()">Import Excel</button>

<div class="count">
Total Students : <span id="total">0</span>
</div>

<table>

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Roll</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId:"G-V4J8BP2LCN"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let editId=null;
let studentsCache=[];

function createClass(){

let cname=document.getElementById("newClass").value;

if(!cname) return alert("Enter Class");

db.collection("classes").add({name:cname});

document.getElementById("newClass").value="";

}

function deleteClass(){

let cname=document.getElementById("deleteClassSelect").value;

db.collection("classes").where("name","==",cname).get().then(s=>{

s.forEach(d=>db.collection("classes").doc(d.id).delete());

});

}

function loadClasses(){

db.collection("classes").onSnapshot(s=>{

let classOpt="";
let filter='<option value="">All Classes</option>';
let del="";

s.forEach(doc=>{

let c=doc.data().name;

classOpt+=`<option>${c}</option>`;
filter+=`<option>${c}</option>`;
del+=`<option>${c}</option>`;

});

document.getElementById("class").innerHTML=classOpt;
document.getElementById("filterClass").innerHTML=filter;
document.getElementById("deleteClassSelect").innerHTML=del;

});

}

loadClasses();

document.getElementById("filterClass").addEventListener("change",renderStudents);

async function uploadPhoto(){

const file=document.getElementById("photo").files[0];

if(!file) return "";

let form=new FormData();
form.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{method:"POST",body:form});

let data=await res.json();

return data.data.url;

}

async function addStudent(){

let photo=await uploadPhoto();

let student={

photo:photo,
name:name.value,
father:father.value,
mother:mother.value,
class:document.getElementById("class").value,
mobile:mobile.value,
dob:dob.value,
admission:admission.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholar:scholar.value

};

if(editId){

db.collection("students").doc(editId).update(student);
editId=null;

}else{

db.collection("students").add(student);

}

alert("Saved");

}

db.collection("students").onSnapshot(snapshot=>{

studentsCache=[];

snapshot.forEach(doc=>{

let data=doc.data();
data.id=doc.id;

studentsCache.push(data);

});

renderStudents();

});

function renderStudents(){

let fc=document.getElementById("filterClass").value;

let html="";
let count=0;

studentsCache.forEach(s=>{

if(fc && s.class!=fc) return;

count++;

html+=`

<tr onclick="showDetails('${s.id}')">

<td>${s.photo?`<img src="${s.photo}">`:""}</td>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.mobile}</td>
<td>${s.roll}</td>

<td>
<button onclick="event.stopPropagation();editStudent('${s.id}')">Edit</button>
<button onclick="event.stopPropagation();deleteStudent('${s.id}')">Delete</button>
</td>

</tr>

`;

});

tableBody.innerHTML=html;
total.innerText=count;

}

function deleteStudent(id){

if(confirm("Delete Student?")){
db.collection("students").doc(id).delete();
}

}

function editStudent(id){

let s=studentsCache.find(x=>x.id==id);

editId=id;

name.value=s.name;
father.value=s.father;
mother.value=s.mother;
class.value=s.class;
mobile.value=s.mobile;
dob.value=s.dob;
admission.value=s.admission;
village.value=s.village;
post.value=s.post;
district.value=s.district;
state.value=s.state;
national.value=s.national;
sssm.value=s.sssm;
family.value=s.family;
apar.value=s.apar;
adhar.value=s.adhar;
caste.value=s.caste;
category.value=s.category;
roll.value=s.roll;
scholar.value=s.scholar;

}

function showDetails(id){

let s=studentsCache.find(x=>x.id==id);

alert(

`Name: ${s.name}
Father: ${s.father}
Mother: ${s.mother}
Class: ${s.class}
Mobile: ${s.mobile}
DOB: ${s.dob}
Village: ${s.village}
Roll: ${s.roll}`

);

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(studentsCache);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}

function importExcel(){

let file=document.getElementById("importFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:'array'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet);

json.forEach(row=>db.collection("students").add(row));

alert("Imported");

};

reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
