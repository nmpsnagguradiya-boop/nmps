<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>School Admission System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:10px;
background:#004aad;
color:white;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.search{
margin-top:20px;
padding:10px;
width:100%;
}

</style>

</head>

<body>

<header>School Admission System</header>

<div class="container">

<form id="form">

<h3>Student Details</h3>

<input id="name" placeholder="Student Name" required>
<input id="father" placeholder="Father Name" required>
<input id="mother" placeholder="Mother Name">
<input id="mobile" placeholder="Mobile Number">

<select id="class">
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Date Of Birth</label>
<input type="date" id="dob">

<label>Admission Date</label>
<input type="date" id="admissionDate">

<h3>Address</h3>

<input id="village" placeholder="Village / City">
<input id="post" placeholder="Post">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="national" placeholder="Nationality">

<h3>Documents</h3>

<input id="sssm" placeholder="SSSM ID">
<input id="family" placeholder="Family ID">
<input id="apar" placeholder="APAR ID">
<input id="adhar" placeholder="Aadhar Card">

<input id="caste" placeholder="Caste">
<input id="category" placeholder="Category">

<input id="roll" placeholder="Roll Number">
<input id="scholer" placeholder="Scholar Number">

<label>Student Photo</label>
<input type="file" id="photo" required>

<label>Document Upload</label>
<input type="file" id="document">

<button type="submit">Submit Admission</button>

<div id="msg"></div>

</form>

<input class="search" id="searchStudent" placeholder="Search Student">

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const data={
name:name.value,
father:father.value,
mother:mother.value,
mobile:mobile.value,
class:document.getElementById("class").value,
dob:dob.value,
admissionDate:admissionDate.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholer:scholer.value
};

const photo=document.getElementById("photo").files[0];
const documentFile=document.getElementById("document").files[0];

data.photo=await uploadImgBB(photo);

if(documentFile){
data.document=await uploadImgBB(documentFile);
}

await addDoc(collection(db,"admissions"),data);

msg.innerText="Admission Submitted Successfully";

form.reset();

loadStudents();

});

async function loadStudents(){

const snap=await getDocs(collection(db,"admissions"));

let html="";
let count=0;

snap.forEach((d)=>{

let data=d.data();

count++;

html+=`
<tr>
<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo}" width="40"></td>

<td>
<button onclick="viewStudent('${d.id}')">View</button>
<button onclick="editStudent('${d.id}')">Edit</button>
<button onclick="deleteStudent('${d.id}')">Delete</button>
</td>
</tr>
`;

});

studentList.innerHTML=html;

total.innerText=count;

}

window.viewStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach((d)=>{

if(d.id==id){

let data=d.data();

let win=window.open("");

win.document.write(`

<h2>Admission Receipt</h2>

<img src="${data.photo}" width="120"><br>

Student Name : ${data.name}<br>
Father Name : ${data.father}<br>
Mother Name : ${data.mother}<br>
Class : ${data.class}<br>
Mobile : ${data.mobile}<br>

DOB : ${data.dob}<br>
Admission Date : ${data.admissionDate}<br>

Village : ${data.village}<br>
Post : ${data.post}<br>
District : ${data.district}<br>
State : ${data.state}<br>

SSSM : ${data.sssm}<br>
Family ID : ${data.family}<br>
APAR ID : ${data.apar}<br>
Aadhar : ${data.adhar}<br>

Roll : ${data.roll}<br>
Scholar : ${data.scholer}<br>

<br><button onclick="window.print()">Print</button>

`);

}

})

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"admissions",id));

loadStudents();

}

}

window.editStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

if(d.id==id){

let data=d.data();

let name=prompt("Name",data.name);
let father=prompt("Father",data.father);
let mobile=prompt("Mobile",data.mobile);
let cls=prompt("Class",data.class);

await updateDoc(doc(db,"admissions",id),{
name,
father,
mobile,
class:cls
});

loadStudents();

}

})

}

searchStudent.addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();

row.style.display=name.includes(filter)?"":"none";

});

});

loadStudents();

</script>

</body>
  </html>
