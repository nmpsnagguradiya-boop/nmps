<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#004aad;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.search{
margin-top:20px;
padding:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

.printbtn{
background:green;
}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name" required>
<input type="text" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="village" placeholder="Village" required>
<input type="text" id="city" placeholder="Village / City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">
<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">
<input type="date" id="admissionDate">

<select id="class">
<option>Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<input type="date" id="dob">

<textarea id="message" placeholder="Message"></textarea>

<label>Student Photo</label>
<input type="file" id="photo" required>

<img id="preview" width="80" style="margin-top:10px;">

<label>Document Upload</label>
<input type="file" id="document" required>

<button type="submit">Submit Admission</button>

<div class="success" id="msg"></div>

</form>

<input type="text" id="searchStudent" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<button onclick="printStudents()" class="printbtn">Print Student List</button>
<button onclick="exportExcel()">Export CSV</button>
<input type="file" id="importExcel">

<button onclick="promoteStudents()">Promote Class</button>

<h3>Class Wise Total Students</h3>
<div id="classStats"></div>

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

let data={
name:name.value,
father:father.value,
mobile:mobile.value,
village:village.value,
city:city.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholer:scholer.value,
admissionDate:admissionDate.value,
dob:dob.value,
class:document.getElementById("class").value,
message:message.value
};

let photoURL=await uploadImgBB(photo.files[0]);
let docURL=await uploadImgBB(document.files[0]);

data.photo=photoURL;
data.document=docURL;

await addDoc(collection(db,"admissions"),data);

msg.innerText="Admission Submitted Successfully";
form.reset();

loadStudents();

});

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
count++;

if(!classCount[data.class]) classCount[data.class]=0;
classCount[data.class]++;

html+=`
<tr onclick="viewStudent('${docSnap.id}')">
<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo}" width="50"></td>
<td>
<button onclick="event.stopPropagation();deleteStudent('${docSnap.id}')">Delete</button>
</td>
</tr>
`;

});

studentList.innerHTML=html;
total.innerText=count;

let stats="";
for(let c in classCount){
stats+=`Class ${c} : ${classCount[c]} Students <br>`;
}

classStats.innerHTML=stats;

}

window.viewStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach((d)=>{

if(d.id==id){

const data=d.data();

let win=window.open("");

win.document.write(`
<h2>Admission Form</h2>

<p>Name : ${data.name}</p>
<p>Father : ${data.father}</p>
<p>Mobile : ${data.mobile}</p>
<p>Village : ${data.village}</p>
<p>City : ${data.city}</p>
<p>District : ${data.district}</p>
<p>State : ${data.state}</p>
<p>Aadhar : ${data.adhar}</p>
<p>Class : ${data.class}</p>

<img src="${data.photo}" width="120">

<br><br>

<button onclick="window.print()">Print Admission Form</button>

`);

}

})

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

function exportExcel(){

let rows=document.querySelectorAll("#studentList tr");

let csv="Name,Class,Mobile\n";

rows.forEach(r=>{
csv+=`${r.children[0].innerText},${r.children[1].innerText},${r.children[2].innerText}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="students.csv";
a.click();

}

document.getElementById("importExcel").addEventListener("change",function(){

const file=this.files[0];
const reader=new FileReader();

reader.onload=async function(e){

let rows=e.target.result.split("\n");

for(let i=1;i<rows.length;i++){

let col=rows[i].split(",");

if(col.length>=3){

await addDoc(collection(db,"admissions"),{
name:col[0],
class:col[1],
mobile:col[2]
});

}

}

alert("Students Imported");
loadStudents();

};

reader.readAsText(file);

});

async function promoteStudents(){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

let data=d.data();

let cls=parseInt(data.class);

if(!isNaN(cls) && cls<10){

await updateDoc(doc(db,"admissions",d.id),{
class:String(cls+1)
});

}

});

alert("Students Promoted");

loadStudents();

}

function printStudents(){

let table=document.querySelector("table").outerHTML;

let win=window.open("");

win.document.write(`
<h2>Student List</h2>
${table}
`);

win.print();

}

loadStudents();

</script>

</body>
</html>
