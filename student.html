<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NMPS Student Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#3ea6ff;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
}

button{
background:#3ea6ff;
border:none;
color:white;
padding:10px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

img{
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h2>NMPS Student Management</h2>

Total Students : <span id="totalStudents">0</span>

</header>

<div class="container">

<div class="card">

<h3>Add / Edit Student</h3>

<form id="studentForm">

<input type="file" id="photo">

<img id="preview" width="80">

<input id="name" placeholder="Student Name">

<input id="father" placeholder="Father Name">

<input id="mother" placeholder="Mother Name">

<select id="class"></select>

<input id="mobile" placeholder="Mobile Number">

<label>Date Of Birth</label>
<input type="date" id="dob">

<label>Date Of Admission</label>
<input type="date" id="doa">

<input id="village" placeholder="Village / City">

<input id="post" placeholder="Post">

<input id="district" placeholder="District">

<input id="state" placeholder="State">

<input id="national" placeholder="National">

<input id="sssm" placeholder="SSSM ID">

<input id="family" placeholder="Family ID">

<input id="apar" placeholder="APAR ID">

<input id="aadhar" placeholder="Aadhar Card">

<input id="caste" placeholder="Caste">

<input id="category" placeholder="Category">

<input id="roll" placeholder="Roll Number">

<input id="scholar" placeholder="Scholar Number">

<button>Add Student</button>

</form>

</div>


<div class="card">

<h3>Class Management</h3>

<input id="newClass" placeholder="Class Name">

<button onclick="addClass()">Add Class</button>

<select id="classList"></select>

<button onclick="deleteClass()">Delete Class</button>

</div>


<div class="card">

<h3>Excel</h3>

<button onclick="exportExcel()">Download Excel</button>

<input type="file" id="excelFile">

<button onclick="importExcel()">Upload Excel</button>

</div>


<div class="card">

<h3>Students List</h3>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Father</th>
<th>Class</th>
<th>Roll</th>
<th>Mobile</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
setDoc,
doc,
deleteDoc,
onSnapshot,
getDocs
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",

authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",

projectId: "nmpsnagguradiya-b9b94",

storageBucket: "nmpsnagguradiya-b9b94.appspot.com",

messagingSenderId: "811957568318",

appId: "1:811957568318:web:7058de9ba52df9d6bae26f"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let students=[];

let classes=[];

let editId=null;


const classSelect=document.getElementById("class");

const classList=document.getElementById("classList");


function refreshClasses(){

classSelect.innerHTML="";

classList.innerHTML="";

classes.forEach(c=>{

classSelect.innerHTML+=`<option>${c}</option>`;

classList.innerHTML+=`<option>${c}</option>`;

});

}


window.addClass=async function(){

let c=document.getElementById("newClass").value;

if(!c)return;

classes.push(c);

await setDoc(doc(db,"classes",c),{name:c});

refreshClasses();

}


window.deleteClass=async function(){

let c=classList.value;

await deleteDoc(doc(db,"classes",c));

classes=classes.filter(x=>x!=c);

refreshClasses();

}


async function loadClasses(){

const snap=await getDocs(collection(db,"classes"));

snap.forEach(d=>classes.push(d.id));

refreshClasses();

}

loadClasses();


async function uploadImg(file){

if(!file)return "";

let form=new FormData();

form.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{method:"POST",body:form});

let data=await res.json();

return data.data.url;

}


photo.onchange=e=>{

preview.src=URL.createObjectURL(e.target.files[0]);

}


studentForm.onsubmit=async e=>{

e.preventDefault();

let file=photo.files[0];

let photoURL=await uploadImg(file);

let s={

name:name.value,

father:father.value,

mother:mother.value,

class:classSelect.value,

mobile:mobile.value,

dob:dob.value,

doa:doa.value,

village:village.value,

post:post.value,

district:district.value,

state:state.value,

national:national.value,

sssm:sssm.value,

family:family.value,

apar:apar.value,

aadhar:aadhar.value,

caste:caste.value,

category:category.value,

roll:roll.value,

scholar:scholar.value,

photo:photoURL

};

let id=editId || s.name+"_"+s.class;

await setDoc(doc(db,"students",id),s);

editId=null;

studentForm.reset();

};


onSnapshot(collection(db,"students"),snap=>{

students=[];

snap.forEach(d=>students.push(d.data()));

render();

});


function render(){

tableBody.innerHTML="";

students.sort((a,b)=>a.roll-b.roll);

students.forEach(s=>{

tableBody.innerHTML+=`

<tr>

<td>${s.photo?'<img src="'+s.photo+'" width=40>':''}</td>

<td>${s.name}</td>

<td>${s.father}</td>

<td>${s.class}</td>

<td>${s.roll}</td>

<td>${s.mobile}</td>

<td>

<button onclick="edit('${s.name}','${s.class}')">Edit</button>

<button onclick="del('${s.name}','${s.class}')">Delete</button>

</td>

</tr>

`;

});

totalStudents.innerText=students.length;

}


window.edit=function(name,cls){

let s=students.find(x=>x.name==name && x.class==cls);

editId=name+"_"+cls;

Object.keys(s).forEach(k=>{

if(document.getElementById(k))

document.getElementById(k).value=s[k];

});

preview.src=s.photo;

}


window.del=async function(name,cls){

if(confirm("Delete Student?"))

await deleteDoc(doc(db,"students",name+"_"+cls));

}


window.exportExcel=function(){

let data=[Object.keys(students[0]||{})];

students.forEach(s=>data.push(Object.values(s)));

let wb=XLSX.utils.book_new();

let ws=XLSX.utils.aoa_to_sheet(data);

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}


window.importExcel=function(){

let file=excelFile.files[0];

let reader=new FileReader();

reader.onload=e=>{

let wb=XLSX.read(e.target.result,{type:"binary"});

let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

rows.forEach(async s=>{

await setDoc(doc(db,"students",s.name+"_"+s.class),s);

});

};

reader.readAsBinaryString(file);

}

</script>

</body>
  </html>
