<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Admission Management</title>
<meta name="viewport" content="width=device-width,initial-scale=1"><style>

body{font-family:Arial;margin:0;background:#f2f2f2}

header{background:#004aad;color:white;padding:15px;text-align:center;font-size:22px}

.container{padding:15px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:8px
}

input,select,button{
padding:10px;
border-radius:6px;
border:1px solid #ccc
}

button{
background:#004aad;
color:white;
cursor:pointer
}

.student{
background:white;
margin-top:10px;
padding:10px;
border-radius:8px;
box-shadow:0 0 6px rgba(0,0,0,0.2)
}

img{width:60px;border-radius:50%}

</style></head><body><header>Admission Management</header><div class="container"><h3>Add Student</h3><div class="grid"><input type="file" id="photo"><input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name"><input id="class" placeholder="Class">
<input id="mobile" placeholder="Mobile Number"><input type="date" id="dob">
<input type="date" id="admissionDate"><input id="village" placeholder="Village / City">
<input id="post" placeholder="Post">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="national" placeholder="Nationality"><input id="sssm" placeholder="SSSM ID">
<input id="family" placeholder="Family ID">
<input id="apar" placeholder="APAR ID">
<input id="adhar" placeholder="Aadhar Card"><input id="caste" placeholder="Caste">
<input id="category" placeholder="Category"><input id="roll" placeholder="Roll Number">
<input id="scholar" placeholder="Scholar Number"></div><button onclick="saveStudent()">Save Student</button>

<hr><h3>Filter</h3><input id="search" placeholder="Search Student" onkeyup="searchStudent()"><select id="classFilter" onchange="filterClass()">
<option value="">All Classes</option>
</select><hr><h3>Import / Export</h3><button onclick="exportCSV()">Export Excel</button>

<input type="file" id="importFile">
<button onclick="importCSV()">Import Excel</button><hr><div id="studentList"></div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const imgbbKey="21000d5a5d14fcef4b6af4d13647da5a8";

let students=[];

async function uploadImage(file){

let form=new FormData();
form.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key="+imgbbKey,{
method:"POST",
body:form
});

let data=await res.json();

return data.data.url;

}

window.saveStudent=async function(){

let file=document.getElementById("photo").files[0];
let photoUrl="";

if(file) photoUrl=await uploadImage(file);

let data={

photo:photoUrl,
name:name.value,
father:father.value,
mother:mother.value,
class:class.value,
mobile:mobile.value,
dob:dob.value,
admissionDate:admissionDate.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholar:scholar.value

};

await addDoc(collection(db,"students"),data);

loadStudents();

}

async function loadStudents(){

const snap=await getDocs(collection(db,"students"));

students=[];

snap.forEach(d=>{
students.push({id:d.id,...d.data()})
});

render(students);

}

function render(list){

let html="";

list.forEach(s=>{

html+=`

<div class="student">

<img src="${s.photo||''}">

<b>${s.name}</b><br>

Class: ${s.class}<br>

Father: ${s.father}<br>

Mobile: ${s.mobile}

<br><br>

<button onclick="editStudent('${s.id}')">Edit</button>

<button onclick="deleteStudent('${s.id}')">Delete</button>

</div>

`;

});

studentList.innerHTML=html;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"students",id));

loadStudents();

}

}

window.editStudent=async function(id){

let newName=prompt("Enter new name");

await updateDoc(doc(db,"students",id),{

name:newName

});

loadStudents();

}

window.searchStudent=function(){

let text=search.value.toLowerCase();

let filtered=students.filter(s=>s.name.toLowerCase().includes(text));

render(filtered);

}

window.filterClass=function(){

let c=classFilter.value;

if(c===""){render(students);return}

let filtered=students.filter(s=>s.class===c);

render(filtered);

}

window.exportCSV=function(){

let csv="Name,Father,Class,Mobile\n";

students.forEach(s=>{
csv+=`${s.name},${s.father},${s.class},${s.mobile}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="students.csv";

a.click();

}

window.importCSV=function(){

let file=importFile.files[0];

let reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.split("\n");

rows.slice(1).forEach(async r=>{

let col=r.split(",");

if(col.length>3){

await addDoc(collection(db,"students"),{

name:col[0],
father:col[1],
class:col[2],
mobile:col[3]

});

}

});

loadStudents();

}

reader.readAsText(file);

}

loadStudents();

</script></body>
</html>
