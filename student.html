<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#004aad;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.search{
margin-top:20px;
padding:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

.printbtn{
background:green;
}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name" required>
<input type="text" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="village" placeholder="Village" required>

<select id="class">
<option>Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Student Photo</label>
<input type="file" id="photo" required>

<img id="preview" width="80">

<label>Document Upload</label>
<input type="file" id="document" required>

<button type="submit">Submit Admission</button>

<div class="success" id="msg"></div>

</form>

<input type="text" id="searchStudent" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<button onclick="printStudents()" class="printbtn">Print Student List</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportClassExcel()">Class Wise Excel</button>

<input type="file" id="importExcel">

<button onclick="promoteStudents()">Promote Class</button>

<h3>Class Wise Total Students</h3>
<div id="classStats"></div>

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("photo").addEventListener("change",function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("preview").src=e.target.result;
}

reader.readAsDataURL(file);

});

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const father=document.getElementById("father").value;
const mobile=document.getElementById("mobile").value;
const village=document.getElementById("village").value;
const className=document.getElementById("class").value;

const photo=document.getElementById("photo").files[0];
const documentFile=document.getElementById("document").files[0];

let photoURL=await uploadImgBB(photo);
let docURL=await uploadImgBB(documentFile);

await addDoc(collection(db,"admissions"),{
name,
father,
mobile,
village,
class:className,
photo:photoURL,
document:docURL,
date:new Date()
});

document.getElementById("msg").innerText="Admission Submitted Successfully";

document.getElementById("form").reset();

loadStudents();

});

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`
<tr onclick="viewStudent('${docSnap.id}')">
<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo}" width="50"></td>
<td>
<button onclick="event.stopPropagation();editStudent('${docSnap.id}')">Edit</button>
<button onclick="event.stopPropagation();deleteStudent('${docSnap.id}')">Delete</button>
</td>
</tr>
`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

window.editStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

if(d.id==id){

const data=d.data();

let name=prompt("Student Name",data.name);
let father=prompt("Father Name",data.father);
let mobile=prompt("Mobile",data.mobile);
let village=prompt("Village",data.village);
let cls=prompt("Class",data.class);

await updateDoc(doc(db,"admissions",id),{
name,
father,
mobile,
village,
class:cls
});

loadStudents();

}

})

}

function exportExcel(){

let table=document.querySelector("table").outerHTML;

let url='data:application/vnd.ms-excel,'+escape(table);

let link=document.createElement("a");

link.href=url;
link.download="students.xls";

link.click();

}

function exportClassExcel(){

let cls=prompt("Enter Class");

let rows=document.querySelectorAll("#studentList tr");

let html="<table border='1'><tr><th>Name</th><th>Class</th><th>Mobile</th></tr>";

rows.forEach(row=>{

let name=row.children[0].innerText;
let className=row.children[1].innerText;
let mob=row.children[2].innerText;

if(className==cls){

html+=`<tr><td>${name}</td><td>${className}</td><td>${mob}</td></tr>`;

}

});

html+="</table>";

let url='data:application/vnd.ms-excel,'+escape(html);

let link=document.createElement("a");

link.href=url;
link.download="class_students.xls";

link.click();

}

async function promoteStudents(){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

let data=d.data();

let cls=parseInt(data.class);

if(!isNaN(cls) && cls<10){

await updateDoc(doc(db,"admissions",d.id),{
class:String(cls+1)
});

}

});

alert("Students Promoted");

loadStudents();

}

document.getElementById("searchStudent").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();
let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();

row.style.display=name.includes(filter)?"":"none";

});

});

document.getElementById("classFilter").addEventListener("change",function(){

let filter=this.value;

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let cls=row.children[1].innerText;

row.style.display=(filter=="" || cls==filter)?"":"none";

});

});

function printStudents(){

let table=document.querySelector("table").outerHTML;

let win=window.open("");

win.document.write(`<h2>Student List</h2>${table}`);

win.print();

}

loadStudents();

</script>

</body>
  </html>
