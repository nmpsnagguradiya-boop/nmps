<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",

measurementId: "G-V4J8BP2LCN"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("photo").addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("preview").src=e.target.result;
}

reader.readAsDataURL(file);

}

});

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const father=document.getElementById("father").value;
const mobile=document.getElementById("mobile").value;
const village=document.getElementById("village").value;
const city=document.getElementById("city").value;
const post=document.getElementById("post").value;
const district=document.getElementById("district").value;
const state=document.getElementById("state").value;
const national=document.getElementById("national").value;
const sssm=document.getElementById("sssm").value;
const family=document.getElementById("family").value;
const apar=document.getElementById("apar").value;
const adhar=document.getElementById("adhar").value;
const caste=document.getElementById("caste").value;
const category=document.getElementById("category").value;
const roll=document.getElementById("roll").value;
const scholer=document.getElementById("scholer").value;
const admissionDate=document.getElementById("admissionDate").value;
const dob=document.getElementById("dob").value;
const message=document.getElementById("message").value;
const className=document.getElementById("class").value;

const photo=document.getElementById("photo").files[0];
const documentFile=document.getElementById("document").files[0];

let photoURL="";
let docURL="";

photoURL=await uploadImgBB(photo);
docURL=await uploadImgBB(documentFile);

await addDoc(collection(db,"admissions"),{
name,father,mobile,village,city,post,district,state,national,
sssm,family,apar,adhar,caste,category,roll,scholer,
admissionDate,dob,message,
class:className,
photo:photoURL,
document:docURL,
date:new Date()
});

document.getElementById("msg").innerText="Admission Submitted Successfully";
document.getElementById("form").reset();

loadStudents();

});

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`

<tr onclick="viewStudent('${docSnap.id}')">
<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo}" width="50"></td>
<td>
<button onclick="event.stopPropagation();editStudent('${docSnap.id}')">Edit</button>
<button onclick="event.stopPropagation();deleteStudent('${docSnap.id}')">Delete</button>
</td>
</tr>
`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.viewStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach((d)=>{

if(d.id==id){

const data=d.data();

let win=window.open("");

win.document.write(`

<h2>Admission Form</h2>

<p>Name : ${data.name}</p>
<p>Father : ${data.father}</p>
<p>Mobile : ${data.mobile}</p>
<p>Village : ${data.village}</p>
<p>City : ${data.city}</p>
<p>Post : ${data.post}</p>
<p>District : ${data.district}</p>
<p>State : ${data.state}</p>
<p>Nationality : ${data.national}</p>
<p>SSSM ID : ${data.sssm}</p>
<p>Family ID : ${data.family}</p>
<p>APAR ID : ${data.apar}</p>
<p>Aadhar : ${data.adhar}</p>
<p>Caste : ${data.caste}</p>
<p>Category : ${data.category}</p>
<p>Roll Number : ${data.roll}</p>
<p>Scholar Number : ${data.scholer}</p>
<p>Admission Date : ${data.admissionDate}</p>
<p>DOB : ${data.dob}</p>
<p>Class : ${data.class}</p>

<img src="${data.photo}" width="120">

<br><br>

<button onclick="window.print()">Print Admission Form</button>

`);

}

})

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

window.editStudent=async function(id){

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

if(d.id==id){

const data=d.data();

let name=prompt("Student Name",data.name);
let father=prompt("Father Name",data.father);
let mobile=prompt("Mobile",data.mobile);
let village=prompt("Village",data.village);
let cls=prompt("Class",data.class);

await updateDoc(doc(db,"admissions",id),{
name,father,mobile,village,class:cls
});

loadStudents();

}

})

}

document.getElementById("classFilter").addEventListener("change",function(){

let filter=this.value;

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let cls=row.children[1].innerText;

row.style.display=(filter=="" || cls==filter)?"":"none";

});

});

function exportExcel(){

let selectedClass=document.getElementById("classFilter").value;

let rows=document.querySelectorAll("#studentList tr");

let table="<table border='1'><tr><th>Name</th><th>Class</th><th>Mobile</th></tr>";

rows.forEach(row=>{

let cls=row.children[1].innerText;

if(selectedClass=="" || cls==selectedClass){

table+=`<tr>
<td>${row.children[0].innerText}</td>
<td>${cls}</td>
<td>${row.children[2].innerText}</td>
</tr>`;

}

});

table+="</table>";

let url='data:application/vnd.ms-excel,'+escape(table);

let link=document.createElement("a");

link.href=url;
link.download="students.xls";

link.click();

}

document.getElementById("importExcel").addEventListener("change",function(){

const file=this.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.split("\n");

rows.forEach(async(row)=>{

let cols=row.split(",");

if(cols.length>=3){

await addDoc(collection(db,"admissions"),{
name:cols[0],
class:cols[1],
mobile:cols[2],
date:new Date()
});

}

});

alert("Students Imported");

loadStudents();

};

reader.readAsText(file);

});

async function promoteStudents(){

let selectedClass=document.getElementById("classFilter").value;

if(selectedClass==""){
alert("Select Class First");
return;
}

const snap=await getDocs(collection(db,"admissions"));

snap.forEach(async(d)=>{

let data=d.data();

if(data.class==selectedClass){

let cls=parseInt(data.class);

if(!isNaN(cls) && cls<10){

await updateDoc(doc(db,"admissions",d.id),{
class:String(cls+1)
});

}

}

});

alert("Selected Class Promoted");

loadStudents();

}

document.getElementById("searchStudent").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();
let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();

row.style.display=name.includes(filter)?"":"none";

});

});

function printStudents(){

let table=document.querySelector("table").outerHTML;

let win=window.open("");

win.document.write(`
<h2>Student List</h2>
${table}
`);

win.print();

}

loadStudents();

  </script>
