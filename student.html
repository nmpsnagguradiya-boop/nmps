<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NMPS Admin Admission Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#1565c0;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
padding:20px;
}

.form{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

input,select{
padding:7px;
margin:5px;
width:170px;
}

button{
padding:7px 12px;
background:#1565c0;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:7px;
text-align:center;
font-size:13px;
}

th{
background:#1565c0;
color:white;
}

img{
width:40px;
height:40px;
border-radius:50%;
}

</style>

</head>

<body>

<div class="header">
NMPS School Admission Admin
</div>

<div class="container">

<div class="form">

<input type="file" id="photo">

<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">

<select id="class"></select>

<input id="mobile" placeholder="Mobile">

<input id="roll" placeholder="Roll Number">
<input id="scholar" placeholder="Scholar Number">

<button onclick="saveStudent()">Save Student</button>

</div>

<div>

<input id="className" placeholder="Add Class">
<button onclick="addClass()">Add Class</button>
<button onclick="deleteClass()">Delete Class</button>

<input id="search" placeholder="Search Student" onkeyup="searchStudent()">

<select id="filterClass" onchange="loadStudents()">
<option value="">All Class</option>
</select>

<button onclick="exportExcel()">Export Excel</button>

<input type="file" id="excelFile">
<button onclick="importExcel()">Import Excel</button>

</div>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Father</th>
<th>Class</th>
<th>Mobile</th>
<th>Roll</th>
<th>Scholar</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const imgbbAPI="21000d5a5d14fcef4b6af4d13647da5a8";

async function uploadImage(){

let file=document.getElementById("photo").files[0];

if(!file) return "";

let formData=new FormData();

formData.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key="+imgbbAPI,{
method:"POST",
body:formData
});

let data=await res.json();

return data.data.url;

}

async function saveStudent(){

let photo=await uploadImage();

let student={

photo:photo,
name:name.value,
father:father.value,
mother:mother.value,
class:document.getElementById("class").value,
mobile:mobile.value,
roll:roll.value,
scholar:scholar.value

};

await db.collection("students").add(student);

alert("Student Added");

loadStudents();

}

async function loadStudents(){

let filter=document.getElementById("filterClass").value;

let q=db.collection("students");

if(filter!="") q=q.where("class","==",filter);

let snapshot=await q.get();

let html="";

snapshot.forEach(doc=>{

let s=doc.data();

html+=`

<tr>

<td><img src="${s.photo}"></td>
<td>${s.name}</td>
<td>${s.father}</td>
<td>${s.class}</td>
<td>${s.mobile}</td>
<td>${s.roll}</td>
<td>${s.scholar}</td>

<td>

<button onclick="deleteStudent('${doc.id}')">Delete</button>

</td>

</tr>

`;

});

document.getElementById("studentsTable").innerHTML=html;

}

async function deleteStudent(id){

await db.collection("students").doc(id).delete();

loadStudents();

}

async function addClass(){

let c=document.getElementById("className").value;

await db.collection("classes").add({name:c});

loadClasses();

}

async function deleteClass(){

let c=document.getElementById("class").value;

let q=await db.collection("classes").where("name","==",c).get();

q.forEach(doc=>doc.ref.delete());

loadClasses();

}

async function loadClasses(){

let snapshot=await db.collection("classes").get();

let html="";

snapshot.forEach(doc=>{

let c=doc.data().name;

html+=`<option>${c}</option>`;

});

document.getElementById("class").innerHTML=html;

document.getElementById("filterClass").innerHTML='<option value="">All Class</option>'+html;

}

function searchStudent(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#studentsTable tr");

rows.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";

});

}

async function exportExcel(){

let snapshot=await db.collection("students").get();

let arr=[];

snapshot.forEach(doc=>arr.push(doc.data()));

let ws=XLSX.utils.json_to_sheet(arr);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}

function importExcel(){

let file=document.getElementById("excelFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:"array"});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet);

json.forEach(s=>db.collection("students").add(s));

alert("Excel Imported");

loadStudents();

};

reader.readAsArrayBuffer(file);

}

loadClasses();
loadStudents();

</script>

</body>
</html>
