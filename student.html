<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#004aad;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name" required>
<input type="text" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="village" placeholder="Village" required>
<input type="text" id="city" placeholder="Village / City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">
<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">
<input type="date" id="admissionDate">

<select id="class">
<option>Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<input type="date" id="dob">

<textarea id="message" placeholder="Message"></textarea>

<label>Student Photo</label>
<input type="file" id="photo" required>

<img id="preview" width="80" style="margin-top:10px;">

<label>Document Upload</label>
<input type="file" id="document" required>

<button type="submit">Submit Admission</button>

<div class="success" id="msg"></div>

</form>

<br>

<button onclick="exportExcel()">Export Excel</button>
<input type="file" id="importExcel">

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("photo").addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("preview").src=e.target.result;
}

reader.readAsDataURL(file);

}

});

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const father=document.getElementById("father").value;
const mobile=document.getElementById("mobile").value;
const village=document.getElementById("village").value;
const className=document.getElementById("class").value;

const photo=document.getElementById("photo").files[0];
const documentFile=document.getElementById("document").files[0];

let photoURL="";
let docURL="";

photoURL=await uploadImgBB(photo);
docURL=await uploadImgBB(documentFile);

await addDoc(collection(db,"admissions"),{
name,
father,
mobile,
village,
class:className,
photo:photoURL,
document:docURL,
date:new Date()
});

document.getElementById("msg").innerText="Admission Submitted Successfully";
document.getElementById("form").reset();

});

async function exportExcel(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let table="<table border='1'><tr><th>Name</th><th>Father</th><th>Mobile</th><th>Village</th><th>Class</th></tr>";

querySnapshot.forEach((doc)=>{

let d=doc.data();

table+=`<tr>
<td>${d.name}</td>
<td>${d.father}</td>
<td>${d.mobile}</td>
<td>${d.village}</td>
<td>${d.class}</td>
</tr>`;

});

table+="</table>";

let url='data:application/vnd.ms-excel,'+escape(table);

let link=document.createElement("a");

link.href=url;
link.download="students.xls";

link.click();

}

document.getElementById("importExcel").addEventListener("change",function(){

alert("Excel Import Enabled");

});

</script>

</body>
  </html>
