<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NMPS Student Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

input,select{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

table th,table td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

table th{
background:#004aad;
color:white;
}

img{
width:40px;
}

</style>
</head>

<body>

<header>
NMPS Student Management
</header>

<div class="container">

<h3>Add Student</h3>

<input type="file" id="photo">

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mother" placeholder="Mother Name">

<select id="class"></select>

<input type="text" id="mobile" placeholder="Mobile">

<input type="date" id="dob">
<input type="date" id="admission">

<input type="text" id="village" placeholder="Village/City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">

<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">

<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">

<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">

<br>

<button onclick="addStudent()">Add Student</button>

<hr>

<h3>Class Management</h3>

<input type="text" id="newClass" placeholder="Add Class">
<button onclick="addClass()">Add Class</button>

<hr>

<h3>Filter</h3>

<select id="filterClass" onchange="loadStudents()"></select>

<input type="text" id="filterRoll" placeholder="Roll Number">
<button onclick="loadStudents()">Search</button>

<hr>

<button onclick="exportExcel()">Export Excel</button>
<input type="file" id="importExcel">

<table id="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Class</th>
<th>Roll</th>
<th>Mobile</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const imgbbKey = "21000d5a5d14fcef4b6af4d13647da5a8";

async function uploadImage(){

const file = document.getElementById("photo").files[0];

const formData = new FormData();
formData.append("image",file);

let res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`,{
method:"POST",
body:formData
});

let data = await res.json();

return data.data.url;

}

async function addStudent(){

let photo = await uploadImage();

let student = {

photo:photo,
name:name.value,
father:father.value,
mother:mother.value,
class:document.getElementById("class").value,
mobile:mobile.value,
dob:dob.value,
admission:admission.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholer:scholer.value

};

db.collection("students").add(student);

loadStudents();

}

async function loadStudents(){

let tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

let cls=filterClass.value;
let roll=filterRoll.value;

let snap=await db.collection("students").get();

snap.forEach(doc=>{

let s=doc.data();

if(cls && s.class!=cls)return;
if(roll && s.roll!=roll)return;

let tr=document.createElement("tr");

tr.innerHTML=`

<td><img src="${s.photo}"></td>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.roll}</td>
<td>${s.mobile}</td>

<td>
<button onclick="deleteStudent('${doc.id}')">Delete</button>
</td>

`;

tbody.appendChild(tr);

});

}

function deleteStudent(id){

db.collection("students").doc(id).delete();

loadStudents();

}

function addClass(){

let c=newClass.value;

db.collection("classes").add({name:c});

loadClasses();

}

async function loadClasses(){

let cls=document.getElementById("class");
let filter=document.getElementById("filterClass");

cls.innerHTML="";
filter.innerHTML="<option value=''>All</option>";

let snap=await db.collection("classes").get();

snap.forEach(doc=>{

let c=doc.data().name;

cls.innerHTML+=`<option>${c}</option>`;

filter.innerHTML+=`<option>${c}</option>`;

});

}

function exportExcel(){

let table=document.getElementById("table");

let wb=XLSX.utils.table_to_book(table);

XLSX.writeFile(wb,"students.xlsx");

}

document.getElementById("importExcel").addEventListener("change",function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:'array'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet);

json.forEach(s=>{

db.collection("students").add(s);

});

loadStudents();

};

reader.readAsArrayBuffer(file);

});

loadStudents();
loadClasses();

</script>

</body>
</html>
