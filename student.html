<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMPS Student Management</title>
<style>
body, html { margin:0; padding:0; font-family: Arial, sans-serif; background:#f2f2f2; }
header { background:#82caff; color:white; padding:15px; text-align:center; }
.container { max-width:1200px; margin:20px auto; padding:20px; }
.card { background:white; padding:20px; margin:20px 0; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
input, select { width:100%; padding:8px; margin:5px 0; }
button { background:#82caff; border:none; color:white; padding:10px 15px; margin:5px 0; cursor:pointer; border-radius:5px; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
table, th, td { border:1px solid #ddd; }
th, td { padding:8px; text-align:left; }
#photoPreview { display:block; margin:5px 0; width:100px; height:100px; object-fit:cover; border:1px solid #ddd; border-radius:5px; }
label { font-weight:bold; display:block; margin-top:10px; }
</style>
</head>
<body>

<header>
  <h2>NMPS Student Management</h2>
  <p>Total Students: <span id="totalStudents">0</span></p>
</header>

<div class="container">
  <div class="card">
    <h3>Add Student</h3>
    <form id="studentForm">
      <label>Photo</label>
      <input type="file" id="photo" accept="image/*">
      <img id="photoPreview" src="" alt="Photo Preview">
      <label>Name</label>
      <input type="text" placeholder="Name" id="name" required>
      <label>Father's Name</label><input type="text" placeholder="Father's Name" id="fatherName">
      <label>Mother's Name</label><input type="text" placeholder="Mother's Name" id="motherName">
      <label>Address</label><input type="text" placeholder="Address" id="address">
      <label>SSSM ID</label><input type="text" placeholder="SSSM ID" id="sssmId">
      <label>Family ID</label><input type="text" placeholder="Family ID" id="familyId">
      <label>Aadhaar Card Number</label><input type="text" placeholder="Aadhaar Card Number" id="aadhaar">
      <label>Roll Number</label><input type="text" placeholder="Roll Number" id="rollNo">
      <label>Date of Birth</label><input type="date" placeholder="Date of Birth" id="dob">
      <label>APAR ID</label><input type="text" placeholder="APAR ID" id="aparId">
      <label>Caste</label><input type="text" placeholder="Caste" id="caste">
      <label>Category</label><input type="text" placeholder="Category" id="category">
      <label>Mobile Number</label><input type="text" placeholder="Mobile Number" id="mobile">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <label>Post</label><input type="text" placeholder="Post" id="post">
      <label>District</label><input type="text" placeholder="District" id="district">
      <label>State</label><input type="text" placeholder="State" id="state">
      <label>Postal Code</label><input type="text" placeholder="Postal Code" id="postalCode">
      <label>Admission Date</label><input type="date" placeholder="Admission Date" id="admissionDate">
      <label>Scholar Number</label><input type="text" placeholder="Scholar Number" id="scholarNo">
      <label>Email ID</label><input type="email" placeholder="Email ID" id="email">
      <label>Class</label>
      <select id="studentClass">
        <option value="">Select Class</option>
        <option value="Class 1">Class 1</option>
        <option value="Class 2">Class 2</option>
        <option value="Class 3">Class 3</option>
        <option value="Class 4">Class 4</option>
        <option value="Class 5">Class 5</option>
      </select>
      <button type="submit">Add Student</button>
    </form>
  </div>

  <div class="card">
    <h3>Class & Category Filter</h3>
    <select id="filterClass">
      <option value="">All Classes</option>
      <option value="Class 1">Class 1</option>
      <option value="Class 2">Class 2</option>
      <option value="Class 3">Class 3</option>
      <option value="Class 4">Class 4</option>
      <option value="Class 5">Class 5</option>
    </select>
    <input type="text" id="filterCategory" placeholder="Category Filter">
    <button onclick="applyFilter()">Apply Filter</button>
    <button onclick="promoteSelected()">Promote Selected to Next Class</button>
  </div>

  <div class="card">
    <h3>Students List</h3>
    <table id="studentTable">
      <thead>
        <tr>
          <th>Select</th>
          <th>Photo</th>
          <th>Name</th>
          <th>Father's Name</th>
          <th>Mother's Name</th>
          <th>Address</th>
          <th>Category</th>
          <th>Class</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, setDoc, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94",
  storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
  messagingSenderId: "811957568318",
  appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let students = [];

document.getElementById('photo').addEventListener('change', function(){
  const file = this.files[0];
  document.getElementById('photoPreview').src = file ? URL.createObjectURL(file) : '';
});

// Upload photo to ImgBB
async function uploadToImgBB(file){
  const apiKey = '21000d5a5d14fcef4b6af4d13647da5a8';
  const formData = new FormData();
  formData.append('image', file);
  const res = await fetch('https://api.imgbb.com/1/upload?key='+apiKey,{method:'POST',body:formData});
  const data = await res.json();
  return data.success ? data.data.url : '';
}

// Add student
document.getElementById('studentForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const photoFile = document.getElementById('photo').files[0];
  let photoURL = '';
  if(photoFile){ photoURL = await uploadToImgBB(photoFile); }

  const student = {
    photo: photoURL,
    name: document.getElementById('name').value,
    fatherName: document.getElementById('fatherName').value,
    motherName: document.getElementById('motherName').value,
    address: document.getElementById('address').value,
    category: document.getElementById('category').value,
    studentClass: document.getElementById('studentClass').value
  };

  const studentId = student.name+'_'+student.studentClass;
  await setDoc(doc(db,'students',studentId), student);
  this.reset();
  document.getElementById('photoPreview').src = '';
});

onSnapshot(collection(db,'students'), snapshot=>{
  students = [];
  snapshot.forEach(docSnap => { students.push(docSnap.data()); });
  updateStudentTable();
});

function updateStudentTable(filterClass='', filterCategory=''){
  const tbody = document.querySelector('#studentTable tbody');
  tbody.innerHTML='';
  students.forEach((s,i)=>{
    if(filterClass && s.studentClass !== filterClass) return;
    if(filterCategory && s.category.toLowerCase() !== filterCategory.toLowerCase()) return;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" class="selectStudent" data-index="${i}"></td>
      <td>${s.photo ? '<img src="'+s.photo+'" width="50"/>' : ''}</td>
      <td>${s.name}</td>
      <td>${s.fatherName}</td>
      <td>${s.motherName}</td>
      <td>${s.address}</td>
      <td>${s.category}</td>
      <td>${s.studentClass}</td>
      <td><button onclick="deleteStudent('${s.name}','${s.studentClass}')">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('totalStudents').innerText = students.length;
}

async function deleteStudent(name, cls){
  if(confirm('Are you sure?')) await deleteDoc(doc(db,'students',name+'_'+cls));
}

function promoteSelected(){
  const checkboxes = document.querySelectorAll('.selectStudent:checked');
  checkboxes.forEach(async cb=>{
    const index = cb.getAttribute('data-index');
    const s = students[index];
    if(s.studentClass){
      const num = parseInt(s.studentClass.split(' ')[1]);
      s.studentClass = 'Class ' + (num+1);
      await setDoc(doc(db,'students',s.name+'_'+s.studentClass), s);
      await deleteDoc(doc(db,'students',s.name+'_'+num));
    }
  });
}

function applyFilter(){
  const fClass = document.getElementById('filterClass').value;
  const fCat = document.getElementById('filterCategory').value;
  updateStudentTable(fClass,fCat);
}
</script>
</body>
  </html>
