<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#004aad;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

table th,table td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.search{
margin-top:20px;
padding:10px;
width:100%;
}

</style>

</head>

<body>

<header>Student Admission Form</header>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="text" id="village" placeholder="Village">
<input type="text" id="city" placeholder="City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">
<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">

<label>Admission Date</label>
<input type="date" id="admissionDate">

<select id="class">
<option>Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Date Of Birth</label>
<input type="date" id="dob">

<textarea id="message" placeholder="Message"></textarea>

<label>Student Photo</label>
<input type="file" id="photo">

<label>Document Upload</label>
<input type="file" id="document">

<button type="submit">Submit Admission</button>

</form>

<input type="text" id="searchStudent" class="search" placeholder="Search Student">

<button onclick="exportExcel()">Export Excel</button>
<input type="file" id="importExcel">

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>


<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function uploadImgBB(file){

const formData=new FormData();
formData.append("image",file);

const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

const data=await res.json();
return data.data.url;

}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

let data={

name:name.value,
father:father.value,
mobile:mobile.value,
village:village.value,
city:city.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
roll:roll.value,
scholer:scholer.value,
admissionDate:admissionDate.value,
class:document.getElementById("class").value,
dob:dob.value,
message:message.value

};

const photo=document.getElementById("photo").files[0];
const documentFile=document.getElementById("document").files[0];

if(photo){
data.photo=await uploadImgBB(photo);
}

if(documentFile){
data.document=await uploadImgBB(documentFile);
}

await addDoc(collection(db,"admissions"),data);

alert("Student Added");

form.reset();

loadStudents();

});

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

count++;

html+=`
<tr>
<td>${data.name||""}</td>
<td>${data.class||""}</td>
<td>${data.mobile||""}</td>
<td><img src="${data.photo||""}" width="50"></td>
<td>
<button onclick="editStudent('${docSnap.id}')">Edit</button>
<button onclick="deleteStudent('${docSnap.id}')">Delete</button>
</td>
</tr>
`;

});

studentList.innerHTML=html;
total.innerText=count;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"admissions",id));

loadStudents();

}

}

window.editStudent=async function(id){

let name=prompt("New Name");

await updateDoc(doc(db,"admissions",id),{

name:name

});

loadStudents();

}

document.getElementById("searchStudent").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();

row.style.display=name.includes(filter)?"":"none";

});

});

function exportExcel(){

let table=document.querySelector("table");

let wb=XLSX.utils.table_to_book(table);

XLSX.writeFile(wb,"students.xlsx");

}

document.getElementById("importExcel").addEventListener("change",function(e){

const file=e.target.files[0];

const reader=new FileReader();

reader.onload=function(event){

const data=new Uint8Array(event.target.result);

const workbook=XLSX.read(data,{type:"array"});

const sheet=workbook.Sheets[workbook.SheetNames[0]];

const students=XLSX.utils.sheet_to_json(sheet);

students.forEach(async(student)=>{

await addDoc(collection(db,"admissions"),student);

});

alert("Students Imported");

loadStudents();

};

reader.readAsArrayBuffer(file);

});

loadStudents();

</script>

</body>
  </html>
