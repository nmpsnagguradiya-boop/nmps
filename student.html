<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Management</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{
background:#2c7be5;
color:white;
padding:10px;
}

input,select{
padding:8px;
margin:4px;
width:220px;
}

button{
padding:8px 12px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

.success{
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Student Management</h2>

<div id="msg" class="success"></div>

<h3>Add Student</h3>

<input type="file" id="photo">

<br>

<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">

<br>

<input id="class" placeholder="Class">
<input id="mobile" placeholder="Mobile">

<br>

<label>DOB</label>
<input type="date" id="dob">

<label>Admission</label>
<input type="date" id="admission">

<br>

<input id="village" placeholder="Village/City">
<input id="post" placeholder="Post">

<br>

<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="national" placeholder="National">

<br>

<input id="sssm" placeholder="SSSM ID">
<input id="family" placeholder="Family ID">
<input id="apar" placeholder="APAR ID">

<br>

<input id="adhar" placeholder="Adhar Card">
<input id="caste" placeholder="Caste">
<input id="category" placeholder="Category">

<br>

<input id="scholar" placeholder="Scholar Number">

<br><br>

<button onclick="addStudent()">Add Student</button>

<hr>

<h3>Filter Class</h3>

<input id="filterClass">
<button onclick="filterClass()">Filter</button>

<h3>Total Students: <span id="total">0</span></h3>

<table id="table">
<thead>

<tr>
<th>Photo</th>
<th>Name</th>
<th>Class</th>
<th>Roll</th>
<th>Mobile</th>
<th>Action</th>
</tr>

</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f",
measurementId: "G-V4J8BP2LCN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let roll = 1;

async function uploadImage(){

let file=document.getElementById("photo").files[0];

if(!file) return "";

let formData=new FormData();
formData.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{
method:"POST",
body:formData
});

let data=await res.json();
return data.data.url;

}

window.addStudent=async function(){

let img=await uploadImage();

let student={
name:name.value,
father:father.value,
mother:mother.value,
class:class.value,
mobile:mobile.value,
dob:dob.value,
admission:admission.value,
village:village.value,
post:post.value,
district:district.value,
state:state.value,
national:national.value,
sssm:sssm.value,
family:family.value,
apar:apar.value,
adhar:adhar.value,
caste:caste.value,
category:category.value,
scholar:scholar.value,
roll:roll++,
photo:img
};

await addDoc(collection(db,"students"),student);

msg.innerHTML="Successful";

loadStudents();

}

async function loadStudents(){

let snap=await getDocs(collection(db,"students"));

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let count=0;

snap.forEach(d=>{

let s=d.data();
count++;

tbody.innerHTML+=`
<tr>
<td><img src="${s.photo}" width="40"></td>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.roll}</td>
<td>${s.mobile}</td>
<td>
<button onclick="view('${d.id}')">View</button>
<button onclick="del('${d.id}')">Delete</button>
</td>
</tr>
`;

});

total.innerText=count;

}

window.del=async function(id){

await deleteDoc(doc(db,"students",id));

loadStudents();

}

window.filterClass=async function(){

let c=filterClass.value;

let snap=await getDocs(collection(db,"students"));

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

snap.forEach(d=>{

let s=d.data();

if(s.class==c){

tbody.innerHTML+=`
<tr>
<td><img src="${s.photo}" width="40"></td>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.roll}</td>
<td>${s.mobile}</td>
<td>
<button onclick="view('${d.id}')">View</button>
<button onclick="del('${d.id}')">Delete</button>
</td>
</tr>
`;

}

});

}

window.view=async function(id){

let snap=await getDocs(collection(db,"students"));

snap.forEach(d=>{

if(d.id==id){

let s=d.data();

alert(
"Name: "+s.name+
"\nFather: "+s.father+
"\nMother: "+s.mother+
"\nClass: "+s.class+
"\nRoll: "+s.roll+
"\nMobile: "+s.mobile+
"\nDOB: "+s.dob+
"\nVillage: "+s.village+
"\nDistrict: "+s.district+
"\nState: "+s.state+
"\nAadhar: "+s.adhar
);

}

});

}

loadStudents();

</script>

</body>
</html>
