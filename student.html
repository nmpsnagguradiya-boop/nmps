<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>NMPS Ultra School ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#2f8cff;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
}

button{
background:#2f8cff;
color:white;
border:none;
padding:8px 12px;
margin-top:10px;
cursor:pointer;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

img{
border-radius:4px;
}

.flex{
display:flex;
gap:10px;
flex-wrap:wrap;
}

</style>

</head>

<body>

<header>

<h2>NMPS Ultra School ERP</h2>

Total Students : <span id="totalStudents">0</span>

</header>

<div class="container">

<div class="card">

<h3>Add / Edit Student</h3>

<form id="studentForm">

<input type="file" id="photo">

<img id="preview" width="80">

<input id="name" placeholder="Student Name">

<input id="father" placeholder="Father Name">

<input id="mother" placeholder="Mother Name">

<select id="class"></select>

<input id="mobile" placeholder="Mobile">

<input type="date" id="dob">

<input type="date" id="doa">

<input id="village" placeholder="Village">

<input id="post" placeholder="Post">

<input id="district" placeholder="District">

<input id="state" placeholder="State">

<input id="national" placeholder="National">

<input id="sssm" placeholder="SSSM ID">

<input id="family" placeholder="Family ID">

<input id="apar" placeholder="APAR ID">

<input id="aadhar" placeholder="Aadhar">

<input id="caste" placeholder="Caste">

<input id="category" placeholder="Category">

<input id="roll" placeholder="Roll Number">

<input id="scholar" placeholder="Scholar Number">

<button>Add Student</button>

</form>

</div>


<div class="card">

<h3>Class Management</h3>

<div class="flex">

<input id="newClass" placeholder="Class Name">

<button onclick="addClass()">Add Class</button>

<select id="classList"></select>

<button onclick="deleteClass()">Delete Class</button>

</div>

</div>


<div class="card">

<h3>Search</h3>

<div class="flex">

<input id="searchName" placeholder="Student Name">

<select id="filterClass"></select>

<button onclick="applyFilter()">Search</button>

<button onclick="exportExcel()">Download Excel</button>

</div>

</div>


<div class="card">

<h3>Students List</h3>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Father</th>
<th>Class</th>
<th>Roll</th>
<th>Mobile</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<div class="card">

<h3>Student ID Card</h3>

<div id="idCard" style="border:1px solid #ccc;padding:15px;width:300px">

<h3>NMPS School</h3>

<img id="idPhoto" width="80">

<p id="idName"></p>

<p id="idClass"></p>

<p id="idRoll"></p>

</div>

<button onclick="printID()">Print ID Card</button>

</div>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getFirestore,

collection,

setDoc,

doc,

deleteDoc,

onSnapshot,

getDocs

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",

authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",

projectId:"nmpsnagguradiya-b9b94",

storageBucket:"nmpsnagguradiya-b9b94.appspot.com",

messagingSenderId:"811957568318",

appId:"1:811957568318:web:7058de9ba52df9d6bae26f"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);


let students=[];

let classes=[];

let editId=null;


const classSelect=document.getElementById("class");

const filterClass=document.getElementById("filterClass");

const classList=document.getElementById("classList");


function refreshClasses(){

classSelect.innerHTML="";

filterClass.innerHTML="<option value=''>All</option>";

classList.innerHTML="";

classes.forEach(c=>{

classSelect.innerHTML+=`<option>${c}</option>`;

filterClass.innerHTML+=`<option>${c}</option>`;

classList.innerHTML+=`<option>${c}</option>`;

});

}


window.addClass=async function(){

let c=newClass.value;

if(!c)return;

classes.push(c);

await setDoc(doc(db,"classes",c),{name:c});

refreshClasses();

}


window.deleteClass=async function(){

let c=classList.value;

await deleteDoc(doc(db,"classes",c));

classes=classes.filter(x=>x!=c);

refreshClasses();

}


async function loadClasses(){

const snap=await getDocs(collection(db,"classes"));

snap.forEach(d=>classes.push(d.id));

refreshClasses();

}

loadClasses();


async function uploadImg(file){

if(!file)return "";

let form=new FormData();

form.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a8",{method:"POST",body:form});

let data=await res.json();

return data.data.url;

}


photo.onchange=e=>{

preview.src=URL.createObjectURL(e.target.files[0]);

}


studentForm.onsubmit=async e=>{

e.preventDefault();

let file=photo.files[0];

let photoURL=await uploadImg(file);

let s={

name:name.value,

father:father.value,

class:classSelect.value,

roll:roll.value,

mobile:mobile.value,

photo:photoURL

};

let id=editId || s.name+"_"+s.class;

await setDoc(doc(db,"students",id),s);

studentForm.reset();

}


onSnapshot(collection(db,"students"),snap=>{

students=[];

snap.forEach(d=>students.push(d.data()));

render();

});


function render(){

tableBody.innerHTML="";

students.sort((a,b)=>a.roll-b.roll);

students.forEach(s=>{

let id=s.name+"_"+s.class;

tableBody.innerHTML+=`

<tr>

<td>${s.photo?'<img src="'+s.photo+'" width=40>':''}</td>

<td>${s.name}</td>

<td>${s.father}</td>

<td>${s.class}</td>

<td>${s.roll}</td>

<td>${s.mobile}</td>

<td>

<button onclick="editStudent('${id}')">Edit</button>

<button onclick="deleteStudent('${id}')">Delete</button>

<button onclick="showID('${id}')">ID Card</button>

</td>

</tr>

`;

});

totalStudents.innerText=students.length;

}


window.editStudent=function(id){

let s=students.find(x=>(x.name+"_"+x.class)==id);

editId=id;

name.value=s.name;

father.value=s.father;

classSelect.value=s.class;

roll.value=s.roll;

mobile.value=s.mobile;

preview.src=s.photo;

}


window.deleteStudent=async function(id){

if(confirm("Delete Student?"))

await deleteDoc(doc(db,"students",id));

}


window.showID=function(id){

let s=students.find(x=>(x.name+"_"+x.class)==id);

idPhoto.src=s.photo;

idName.innerText="Name : "+s.name;

idClass.innerText="Class : "+s.class;

idRoll.innerText="Roll : "+s.roll;

}


window.printID=function(){

window.print();

}


window.applyFilter=function(){

let name=searchName.value.toLowerCase();

let cls=filterClass.value;

let filtered=students.filter(s=>

(!name || s.name.toLowerCase().includes(name)) &&
(!cls || s.class==cls)

);

tableBody.innerHTML="";

filtered.forEach(s=>{

let id=s.name+"_"+s.class;

tableBody.innerHTML+=`

<tr>

<td>${s.photo?'<img src="'+s.photo+'" width=40>':''}</td>

<td>${s.name}</td>

<td>${s.father}</td>

<td>${s.class}</td>

<td>${s.roll}</td>

<td>${s.mobile}</td>

<td>

<button onclick="editStudent('${id}')">Edit</button>

<button onclick="deleteStudent('${id}')">Delete</button>

<button onclick="showID('${id}')">ID Card</button>

</td>

</tr>

`;

});

}


window.exportExcel=function(){

let data=[Object.keys(students[0]||{})];

students.forEach(s=>data.push(Object.values(s)));

let wb=XLSX.utils.book_new();

let ws=XLSX.utils.aoa_to_sheet(data);

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}

</script>

</body>

</html>
