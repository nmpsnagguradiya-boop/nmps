<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Student Admission Form</title>

<style>

body{
font-family:Arial;
background:#eee;
padding:15px;
}

.controls{
text-align:center;
margin-bottom:15px;
}

button,select{
padding:8px;
margin:4px;
cursor:pointer;
}

.form{
width:200mm;
height:285mm;
background:white;
margin:auto;
padding:15px;
border:2px solid #004aad;
position:relative;
box-sizing:border-box;
font-size:18px;
}

.header{
text-align:center;
border-bottom:2px solid #000;
padding-bottom:8px;
margin-bottom:10px;
}

.school{
font-size:26px;
font-weight:bold;
}

.logo{
position:absolute;
left:20px;
top:20px;
}

.logo img{
width:70px;
}

.photo{
position:absolute;
right:30px;
top:120px;
}

.photo img{
width:100px;
height:120px;
object-fit:cover;
border:2px solid #000;
}

.qr{
position:absolute;
right:30px;
bottom:100px;
}

.qr canvas{
width:80px !important;
height:80px !important;
}

table{
width:100%;
border-collapse:collapse;
}

table td{
border:1px solid #000;
padding:6px;
font-size:18px;
}

.label{
width:30%;
font-weight:bold;
}

.design1{border-color:#004aad;}
.design1 .header{color:#004aad;}

.design2{border-color:#2e7d32;}
.design2 .header{color:#2e7d32;}

.design3{border-color:#8e0038;}
.design3 .header{color:#8e0038;}

.signature{
position:absolute;
bottom:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
}

@media print{

.controls{
display:none;
}

body{
background:white;
padding:0;
}

.form{
margin:0;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="designSelect">
<option value="design1">Blue Design</option>
<option value="design2">Green Design</option>
<option value="design3">Maroon Design</option>
</select>

<button onclick="window.print()">Print</button>

</div>

<div class="form design1" id="form">

<div class="logo">
<img id="schoolLogo">
</div>

<div class="header">

<div class="school" id="schoolName"></div>

<div id="schoolAddress"></div>
DISE Code : <span id="schoolDise"></span><br>
Session : <span id="schoolSession"></span>

<h2>Student Admission Form</h2>

Student ID : <span id="studentID"></span>

</div>

<div class="photo">
<img id="photo">
</div>

<div class="qr">
<canvas id="qr"></canvas>
</div>

<table>

<tr>
<td class="label">Student Name</td>
<td id="name"></td>
</tr>

<tr>
<td class="label">Father Name</td>
<td id="father"></td>
</tr>

<tr>
<td class="label">Mother Name</td>
<td id="mother"></td>
</tr>

<tr>
<td class="label">Mobile</td>
<td id="mobile"></td>
</tr>

<tr>
<td class="label">Class</td>
<td id="class"></td>
</tr>

<tr>
<td class="label">Date of Birth</td>
<td id="dob"></td>
</tr>

<tr>
<td class="label">Admission Date</td>
<td id="admissionDate"></td>
</tr>

<tr>
<td class="label">Village</td>
<td id="village"></td>
</tr>

<tr>
<td class="label">City</td>
<td id="city"></td>
</tr>

<tr>
<td class="label">Post</td>
<td id="post"></td>
</tr>

<tr>
<td class="label">District</td>
<td id="district"></td>
</tr>

<tr>
<td class="label">State</td>
<td id="state"></td>
</tr>

<tr>
<td class="label">Aadhar</td>
<td id="adhar"></td>
</tr>

<tr>
<td class="label">APAR ID</td>
<td id="apar"></td>
</tr>

<tr>
<td class="label">SSSM ID</td>
<td id="sssm"></td>
</tr>

<tr>
<td class="label">Family ID</td>
<td id="family"></td>
</tr>

<tr>
<td class="label">Roll Number</td>
<td id="roll"></td>
</tr>

<tr>
<td class="label">Scholar Number</td>
<td id="scholer"></td>
</tr>

<tr>
<td class="label">Caste</td>
<td id="caste"></td>
</tr>

<tr>
<td class="label">Category</td>
<td id="category"></td>
</tr>

</table>

<div class="signature">

<div>
Parent Signature
</div>

<div>
Principal Signature
</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const session=localStorage.getItem("activeSession")||"2025-26";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

let s=snap.data();

schoolName.innerText=s.name||"";
schoolAddress.innerText="Address : "+(s.address||"");
schoolDise.innerText=s.dise||"";
schoolSession.innerText=session;

schoolLogo.src=s.logo||"";

}

}

async function loadStudent(){

const ref=doc(db,"admissions",id);
const snap=await getDoc(ref);

if(snap.exists()){

let s=snap.data();

studentID.innerText="STU-"+id.substring(0,6).toUpperCase();

name.innerText=s.name||"";
father.innerText=s.father||"";
mother.innerText=s.mother||"";
mobile.innerText=s.mobile||"";
class.innerText=s.class||"";
dob.innerText=s.dob||"";
admissionDate.innerText=s.admissionDate||"";
village.innerText=s.village||"";
city.innerText=s.city||"";
post.innerText=s.post||"";
district.innerText=s.district||"";
state.innerText=s.state||"";
adhar.innerText=s.adhar||"";
apar.innerText=s.apar||"";
sssm.innerText=s.sssm||"";
family.innerText=s.family||"";
roll.innerText=s.roll||"";
scholer.innerText=s.scholer||"";
caste.innerText=s.caste||"";
category.innerText=s.category||"";

photo.src=s.photo||"";

QRCode.toCanvas(document.getElementById("qr"),window.location.href);

}

}

designSelect.addEventListener("change",function(){

form.classList.remove("design1","design2","design3");
form.classList.add(this.value);

});

loadSchool();
loadStudent();

</script>

</body>
</html>
