<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMPS Student Fees Portal</title>
<style>
body, html {margin:0; padding:0; font-family: Arial,sans-serif; background:#f2f2f2;}
header {background:#82caff; color:white; padding:15px; text-align:center;}
.container {max-width:600px; margin:20px auto; padding:20px;}
.card {background:white; padding:20px; margin:20px 0; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, button {width:100%; padding:10px; margin:5px 0;}
button {background:#82caff; color:white; border:none; cursor:pointer; border-radius:5px;}
table {width:100%; border-collapse: collapse; margin-top:10px;}
table, th, td {border:1px solid #ddd;}
th, td {padding:8px; text-align:left;}
img.qr-preview {width:80px; height:80px; margin-top:5px;}
</style>
</head>
<body>

<header>
  <h2>NMPS Student Fees Portal</h2>
</header>

<div class="container">
  <div class="card">
    <h3>Login to View Fees</h3>
    <input type="text" id="mobileOrSSSM" placeholder="Enter Mobile Number or SSSM ID">
    <button id="loginBtn">View Fees</button>
  </div>

  <div id="feesCard" class="card" style="display:none;">
    <h3>Fees Details</h3>
    <p><b>Student Name:</b> <span id="studentName"></span></p>
    <p><b>Class:</b> <span id="className"></span></p>
    <p><b>Account Number:</b> <span id="accountNumber"></span></p>
    <p><b>Vehicle Fees:</b> ₹<span id="vehicleFees"></span></p>
    <p><b>Old Fees:</b> ₹<span id="oldFees"></span></p>
    <p><b>Total Fees:</b> ₹<span id="totalFees"></span></p>
    <p><b>Installment:</b> ₹<span id="installment"></span></p>
    <p><b>Pending Fees:</b> ₹<span id="totalUpdate"></span></p>
    <p><b>QR Code for Payment:</b></p>
    <img id="qrCode" src="" class="qr-preview" alt="">
  </div>

  <div id="errorCard" class="card" style="display:none; color:red;">
    <p>No record found. Please check your Mobile Number or SSSM ID.</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94",
  storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
  messagingSenderId: "811957568318",
  appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const value = document.getElementById('mobileOrSSSM').value.trim();
  if(!value) return alert('Enter Mobile Number or SSSM ID');

  const feesRef = collection(db,'fees');
  const snapshot = await getDocs(feesRef);
  let found = null;
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    if(data.mobileNumber == value || data.sssmId == value){
      found = data;
    }
  });

  if(found){
    document.getElementById('feesCard').style.display='block';
    document.getElementById('errorCard').style.display='none';
    document.getElementById('studentName').innerText = found.studentName;
    document.getElementById('className').innerText = found.className;
    document.getElementById('accountNumber').innerText = found.accountNumber;
    document.getElementById('vehicleFees').innerText = found.vehicleFees || 0;
    document.getElementById('oldFees').innerText = found.oldFees || 0;
    document.getElementById('totalFees').innerText = found.totalFees || 0;
    document.getElementById('installment').innerText = found.installment || 0;
    document.getElementById('totalUpdate').innerText = found.totalUpdate || 0;
    document.getElementById('qrCode').src = found.qrURL || '';
  }else{
    document.getElementById('feesCard').style.display='none';
    document.getElementById('errorCard').style.display='block';
  }
});
</script>

</body>
</html>
