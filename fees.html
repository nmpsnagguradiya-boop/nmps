<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Student Fees Portal</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:6px;
margin-top:20px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

.actions button{
width:32%;
margin-right:1%;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

</style>

</head>

<body>

<header>Student Fees Portal</header>

<div class="container">

<div class="card">

<h3>Enter Student Details</h3>

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="text" id="sssm" placeholder="SSSM ID">

<button onclick="checkFees()">Check Fees</button>

</div>

<div class="card" id="result" style="display:none">

<h3>Student Fees Details</h3>

<p><b>Name :</b> <span id="name"></span></p>
<p><b>Father :</b> <span id="father"></span></p>
<p><b>Mother :</b> <span id="mother"></span></p>
<p><b>Village :</b> <span id="village"></span></p>
<p><b>Mobile :</b> <span id="mobile2"></span></p>
<p><b>Roll Number :</b> <span id="roll"></span></p>

<p><b>Total Fees :</b> ₹ <span id="total"></span></p>
<p><b>Paid :</b> ₹ <span id="paid"></span></p>
<p><b>Pending :</b> ₹ <span id="pending"></span></p>

<div class="actions">

<button onclick="downloadReceipt()">Receipt PDF</button>
<button onclick="sendWhatsApp()">WhatsApp</button>
<button onclick="downloadExamCard()">Exam Card</button>

</div>

<h3>Fees History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let studentData=null;
let studentId=null;
let history=[];

window.checkFees=async function(){

let mobile=document.getElementById("mobile").value;
let sssm=document.getElementById("sssm").value;

const q=query(
collection(db,"admissions"),
where("mobile","==",mobile),
where("sssm","==",sssm)
);

const snap=await getDocs(q);

if(snap.empty){
alert("Student Not Found");
return;
}

let docSnap=snap.docs[0];
studentData=docSnap.data();
studentId=docSnap.id;

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;
let pending=total-paid;

document.getElementById("result").style.display="block";

document.getElementById("name").innerText=studentData.name;
document.getElementById("father").innerText=studentData.father;
document.getElementById("mother").innerText=studentData.mother||"";
document.getElementById("village").innerText=studentData.village;
document.getElementById("mobile2").innerText=studentData.mobile;
document.getElementById("roll").innerText=studentData.roll;

document.getElementById("total").innerText=total;
document.getElementById("paid").innerText=paid;
document.getElementById("pending").innerText=pending;

/* HISTORY */

const hq=query(
collection(db,"fees_history"),
where("studentId","==",studentId)
);

const hsnap=await getDocs(hq);

let html="";
history=[];

hsnap.forEach(d=>{

let h=d.data();
history.push(h);

html+=`
<tr>
<td>${h.date}</td>
<td>₹ ${h.amount}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

}

/* RECEIPT */

window.downloadReceipt=function(){

const { jsPDF }=window.jspdf;

let pdf=new jsPDF();

pdf.text("School Fees Receipt",20,20);

pdf.text("Name : "+studentData.name,20,40);
pdf.text("Father : "+studentData.father,20,50);
pdf.text("Mother : "+(studentData.mother||""),20,60);
pdf.text("Village : "+studentData.village,20,70);
pdf.text("Mobile : "+studentData.mobile,20,80);
pdf.text("Roll : "+studentData.roll,20,90);

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;
let pending=total-paid;

pdf.text("Total Fees : "+total,20,110);
pdf.text("Paid : "+paid,20,120);
pdf.text("Pending : "+pending,20,130);

let y=150;

history.forEach(h=>{
pdf.text(h.date+" - "+h.amount,20,y);
y+=10;
});

pdf.save("fees_receipt.pdf");

}

/* WHATSAPP */

window.sendWhatsApp=function(){

let phone=studentData.mobile.replace(/\D/g,'');

let msg=
"Fees Receipt%0A"+
"Student : "+studentData.name+"%0A"+
"Roll : "+studentData.roll+"%0A"+
"Paid : ₹"+(studentData.paid||0);

window.open("https://wa.me/91"+phone+"?text="+msg);

}

/* EXAM CARD */

window.downloadExamCard=function(){

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;

if(paid < total*0.5){

alert("आपकी 50% से कम फीस जमा है\nExam Card Download नहीं कर सकते");

return;

}

const { jsPDF }=window.jspdf;

let pdf=new jsPDF();

pdf.text("EXAM CARD",80,20);

pdf.text("School Name",20,40);
pdf.text("Village Nag Guradiya",20,50);

pdf.text("Name : "+studentData.name,20,80);
pdf.text("Roll No : "+studentData.roll,20,90);
pdf.text("Father : "+studentData.father,20,100);
pdf.text("Village : "+studentData.village,20,110);
pdf.text("Mobile : "+studentData.mobile,20,120);

pdf.save("exam_card.pdf");

}

</script>

</body>

</html>
