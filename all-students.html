<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.topbtn{
background:#28a745;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
}

.edit{background:#ffc107;}
.delete{background:red;color:white;}
.view{background:#004aad;color:white;}
.print{background:#17a2b8;color:white;}
.promote{background:#6f42c1;color:white;}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:none;
max-height:80vh;
overflow:auto;
width:95%;
max-width:500px;
}

.popup input, .popup select{
width:100%;
padding:8px;
margin-top:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<button class="topbtn" onclick="addStudent()">+ Add Student</button>

<select id="classSelect">
<option value="">Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<button class="topbtn" onclick="exportClass()">Export Class</button>

<input type="file" id="importExcel">

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<div class="popup" id="popup"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc,addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;

students=[];

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

if(data.schoolId!==schoolId) return;

data.id=docSnap.id;

students.push(data);

count++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ''}" width="40"></td>

<td>

<button class="view" onclick="viewStudent('${data.id}')">Form</button>
<button class="edit" onclick="editStudent('${data.id}')">Edit</button>
<button class="promote" onclick="promoteStudent('${data.id}')">Promote</button>
<button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>
<button class="print" onclick="openPrintForm('${data.id}')">Print</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

}

window.addStudent=function(){
window.location.href="admission.html";
}

window.viewStudent=function(id){

let s=students.find(x=>x.id==id);

alert(
"Name : "+s.name+
"\nFather : "+s.father+
"\nMobile : "+s.mobile+
"\nClass : "+s.class+
"\nAadhar : "+(s.adhar||"")
);

}

window.editStudent=function(id){

let s=students.find(x=>x.id==id);

document.getElementById("popup").style.display="block";

document.getElementById("popup").innerHTML=`

<h3>Edit Student</h3>

<input id="name" value="${s.name}">
<input id="father" value="${s.father}">
<input id="mobile" value="${s.mobile}">
<input id="adhar" value="${s.adhar||""}">
<input id="village" value="${s.village||""}">
<input id="city" value="${s.city||""}">
<input id="district" value="${s.district||""}">
<input id="state" value="${s.state||""}">
<input id="roll" value="${s.roll||""}">
<input id="scholer" value="${s.scholer||""}">

<select id="class">
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<br><br>

<button onclick="saveEdit('${id}')">Update</button>
<button onclick="closePopup()">Cancel</button>

`;

}

window.saveEdit=async function(id){

await updateDoc(doc(db,"admissions",id),{

name:document.getElementById("name").value,
father:document.getElementById("father").value,
mobile:document.getElementById("mobile").value,
adhar:document.getElementById("adhar").value,
village:document.getElementById("village").value,
city:document.getElementById("city").value,
district:document.getElementById("district").value,
state:document.getElementById("state").value,
roll:document.getElementById("roll").value,
scholer:document.getElementById("scholer").value,
class:document.getElementById("class").value

});

closePopup();
loadStudents();

}

window.promoteStudent=function(id){

document.getElementById("popup").style.display="block";

document.getElementById("popup").innerHTML=`

<h3>Select Class</h3>

<select id="newClass">

<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<br><br>

<button onclick="savePromote('${id}')">Promote</button>
<button onclick="closePopup()">Cancel</button>

`;

}

window.savePromote=async function(id){

await updateDoc(doc(db,"admissions",id),{

class:document.getElementById("newClass").value

});

closePopup();
loadStudents();

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"admissions",id));

loadStudents();

}

}

window.openPrintForm=function(id){

window.location.href="print-form.html?id="+id;

}

window.exportClass=function(){

let selected=document.getElementById("classSelect").value;

let data=[];

students.forEach(s=>{

if(selected=="" || s.class==selected){
data.push(s);
}

});

const ws=XLSX.utils.json_to_sheet(data);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}

document.getElementById("importExcel").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=async function(evt){

const data=new Uint8Array(evt.target.result);

const workbook=XLSX.read(data,{type:'array'});

const sheet=workbook.Sheets[workbook.SheetNames[0]];

const json=XLSX.utils.sheet_to_json(sheet);

for(let s of json){

s.schoolId=schoolId;

await addDoc(collection(db,"admissions"),s);

}

loadStudents();

}

reader.readAsArrayBuffer(e.target.files[0]);

});

window.closePopup=function(){
document.getElementById("popup").style.display="none";
}

loadStudents();

</script>

</body>
</html>
