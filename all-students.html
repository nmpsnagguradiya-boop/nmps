<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.search{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

select{
padding:10px;
margin-top:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.edit{
background:#ffcc00;
}

.delete{
background:red;
color:white;
}

.view{
background:#004aad;
color:white;
}

.id{
background:green;
color:white;
}

.stats{
margin-top:20px;
background:white;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<div class="stats">
<h3>Total Students : <span id="total">0</span></h3>
<div id="classStats"></div>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

students=[];

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
data.id=docSnap.id;
students.push(data);

count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`
<tr>
<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo}" width="40"></td>
<td>
<button class="view" onclick="viewStudent('${docSnap.id}')">View</button>
<button class="edit" onclick="editStudent('${docSnap.id}')">Edit</button>
<button class="delete" onclick="deleteStudent('${docSnap.id}')">Delete</button>
<button class="id" onclick="generateID('${docSnap.id}')">ID Card</button>
<button class="view" onclick="downloadPDF('${docSnap.id}')">PDF</button>
</td>
</tr>
`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

window.editStudent=async function(id){

const s=students.find(x=>x.id==id);

let name=prompt("Name",s.name);
let father=prompt("Father",s.father);
let mobile=prompt("Mobile",s.mobile);
let village=prompt("Village",s.village);
let cls=prompt("Class",s.class);

await updateDoc(doc(db,"admissions",id),{
name,
father,
mobile,
village,
class:cls
});

let photoUpdate=confirm("Update Photo?");

if(photoUpdate){

let input=document.createElement("input");
input.type="file";

input.onchange=async function(){

let file=input.files[0];

let formData=new FormData();
formData.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

let data=await res.json();

await updateDoc(doc(db,"admissions",id),{
photo:data.data.url
});

loadStudents();

};

input.click();

}else{

loadStudents();

}

}

window.viewStudent=function(id){

const s=students.find(x=>x.id==id);

let win=window.open("");

win.document.write(`

<style>

body{font-family:Arial;padding:20px;}

.card{padding:20px;}

@media print{

body{background:#ffeb3b;}

.card{
background:#004aad;
color:white;
padding:20px;
}

}

</style>

<div class="card">

<h2>Student Admission Form</h2>

<p>Name : ${s.name}</p>
<p>Father : ${s.father}</p>
<p>Mobile : ${s.mobile}</p>
<p>Village : ${s.village}</p>
<p>Class : ${s.class}</p>

<img src="${s.photo}" width="120">

<br><br>

<button onclick="window.print()">Print</button>

</div>

`);

}

window.generateID=function(id){

const s=students.find(x=>x.id==id);

let win=window.open("");

win.document.write(`

<style>

body{font-family:Arial;text-align:center;}

.card{
width:300px;
border:3px solid #004aad;
padding:20px;
border-radius:10px;
}

h3{
background:#004aad;
color:white;
padding:5px;
}

</style>

<div class="card">

<h3>Student ID Card</h3>

<img src="${s.photo}" width="100">

<p>${s.name}</p>
<p>Class : ${s.class}</p>
<p>Mobile : ${s.mobile}</p>

<button onclick="window.print()">Print</button>

</div>

`);

}

window.downloadPDF=function(id){

const s=students.find(x=>x.id==id);

const { jsPDF } = window.jspdf;

const docPDF=new jsPDF();

docPDF.text("Student Admission Form",20,20);
docPDF.text("Name : "+s.name,20,40);
docPDF.text("Father : "+s.father,20,50);
docPDF.text("Mobile : "+s.mobile,20,60);
docPDF.text("Village : "+s.village,20,70);
docPDF.text("Class : "+s.class,20,80);

docPDF.save(s.name+"_admission_form.pdf");

}

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let name=row.children[0].innerText.toLowerCase();

row.style.display=name.includes(filter)?"":"none";

});

});

document.getElementById("classFilter").addEventListener("change",function(){

let filter=this.value;

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{

let cls=row.children[1].innerText;

row.style.display=(filter=="" || cls==filter)?"":"none";

});

});

loadStudents();

</script>

</body>
</html>
