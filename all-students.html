<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Admission</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#004aad;color:white;padding:15px;text-align:center;font-size:22px;}
.container{padding:20px;max-width:1200px;margin:auto;}
input,select,textarea,button{padding:8px;margin:5px;border-radius:5px;border:1px solid #ccc;}
button{cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
img{width:40px;border-radius:5px;}
.popup{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;width:95%;max-width:500px;max-height:80vh;overflow:auto;
box-shadow:0 0 10px rgba(0,0,0,0.3);display:none;z-index:1000;
}
.success{color:green;text-align:center;margin-top:10px;}
.export{background:#28a745;color:white;border:none;padding:8px;}
</style>
</head>
<body>

<header>Student Admission Panel</header>
<div class="container">

<h3>Admission Form</h3>
<form id="form">
<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name" required>
<input type="text" id="mobile" placeholder="Mobile Number" required>
<input type="text" id="village" placeholder="Village">
<input type="text" id="city" placeholder="City">
<input type="text" id="post" placeholder="Post">
<input type="text" id="district" placeholder="District">
<input type="text" id="state" placeholder="State">
<input type="text" id="national" placeholder="Nationality">
<input type="text" id="sssm" placeholder="SSSM ID">
<input type="text" id="family" placeholder="Family ID">
<input type="text" id="apar" placeholder="APAR ID">
<input type="text" id="adhar" placeholder="Aadhar Card">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="category" placeholder="Category">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="scholer" placeholder="Scholar Number">
<input type="text" id="admissionDate" placeholder="Admission Date (dd/mm/yyyy)">
<select id="class">
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>
<input type="text" id="dob" placeholder="Date Of Birth (dd/mm/yyyy)">
<textarea id="message" placeholder="Message"></textarea>
<label>Student Photo</label>
<input type="file" id="photo">
<button type="submit">Submit Admission</button>
<div class="success" id="msg"></div>
</form>

<h3>Controls</h3>
<input type="text" id="search" placeholder="Search Name / Mobile">
<select id="classFilter">
<option value="all">All Classes</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>
<select id="classImport">
<option value="">Select Class for Bulk Import</option>
<option>Nursery</option><option>LKG</option><option>UKG</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
</select>
<input type="file" id="excelImport">
<button class="export" onclick="exportAll()">Export All Students</button>

<h3>Total Students: <span id="total">0</span></h3>
<table>
<thead>
<tr><th>Name</th><th>Father</th><th>Mobile</th><th>Class</th><th>Photo</th><th>Actions</th></tr>
</thead>
<tbody id="studentList"></tbody>
</table>
</div>

<div class="popup" id="popup"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const session=localStorage.getItem("session")||"2025-26";

/* IMAGE UPLOAD */
async function uploadImgBB(file){
const formData=new FormData();
formData.append("image",file);
const res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{method:"POST",body:formData});
const data=await res.json();
return data.data.url;
}

/* ADD STUDENT */
document.getElementById("form").addEventListener("submit",async function(e){
e.preventDefault();
let photoFile=document.getElementById("photo").files[0];
let photoURL=photoFile?await uploadImgBB(photoFile):"";
await addDoc(collection(db,"admissions"),{
schoolId,session,
name:name.value,father:father.value,mobile:mobile.value,
village:village.value,city:city.value,post:post.value,district:district.value,state:state.value,
national:national.value,sssm:sssm.value,family:family.value,apar:apar.value,adhar:adhar.value,
caste:caste.value,category:category.value,roll:roll.value,scholer:scholer.value,
admissionDate:admissionDate.value,class:class.value,dob:dob.value,message:message.value,photo:photoURL
});
msg.innerText="Admission Submitted Successfully";
form.reset();
loadStudents();
});

/* LOAD STUDENTS */
let admissions=[];
async function loadStudents(){
const snapshot=await getDocs(collection(db,"admissions"));
let html="",count=0;
admissions=[];
snapshot.forEach(docSnap=>{
let data=docSnap.data();
if(data.schoolId!==schoolId || data.session!==session) return;
data.id=docSnap.id;
admissions.push(data);
count++;
html+=`<tr>
<td>${data.name}</td>
<td>${data.father}</td>
<td>${data.mobile}</td>
<td>${data.class}</td>
<td><img src="${data.photo||''}"></td>
<td>
<button onclick="editStudent('${data.id}')">Edit</button>
<button onclick="uploadPhoto('${data.id}')">Photo</button>
<button onclick="printStudent('${data.id}')">Print</button>
<button onclick="deleteStudent('${data.id}')">Delete</button>
</td>
</tr>`;
});
studentList.innerHTML=html;
total.innerText=count;
}
loadStudents();

/* DELETE */
window.deleteStudent=async function(id){if(confirm("Delete Student?")){await deleteDoc(doc(db,"admissions",id));loadStudents();}}

/* EDIT POPUP */
window.editStudent=function(id){
let s=admissions.find(x=>x.id==id);
popup.style.display="block";
popup.innerHTML=`<h3>Edit Student</h3>
<input id="ename" value="${s.name}" placeholder="Name">
<input id="efather" value="${s.father}" placeholder="Father">
<input id="emobile" value="${s.mobile}" placeholder="Mobile">
<input id="evillage" value="${s.village}" placeholder="Village">
<input id="epost" value="${s.post}" placeholder="Post">
<input id="edistrict" value="${s.district}" placeholder="District">
<input id="estate" value="${s.state}" placeholder="State">
<input id="edob" type="date" value="${s.dob}">
<input id="eadhar" value="${s.adhar}" placeholder="Aadhar">
<select id="eclass">
<option ${s.class=="Nursery"?"selected":""}>Nursery</option>
<option ${s.class=="LKG"?"selected":""}>LKG</option>
<option ${s.class=="UKG"?"selected":""}>UKG</option>
<option ${s.class=="1"?"selected":""}>1</option>
<option ${s.class=="2"?"selected":""}>2</option>
<option ${s.class=="3"?"selected":""}>3</option>
<option ${s.class=="4"?"selected":""}>4</option>
<option ${s.class=="5"?"selected":""}>5</option>
<option ${s.class=="6"?"selected":""}>6</option>
<option ${s.class=="7"?"selected":""}>7</option>
<option ${s.class=="8"?"selected":""}>8</option>
<option ${s.class=="9"?"selected":""}>9</option>
<option ${s.class=="10"?"selected":""}>10</option>
<option ${s.class=="11"?"selected":""}>11</option>
<option ${s.class=="12"?"selected":""}>12</option>
</select>
<br><br>
<button onclick="saveEdit('${id}')">Update</button>
<button onclick="popup.style.display='none'">Cancel</button>
`;
}

/* SAVE EDIT */
window.saveEdit=async function(id){
await updateDoc(doc(db,"admissions",id),{
name:ename.value,father:efather.value,mobile:emobile.value,
village:evillage.value,post:epost.value,district:edistrict.value,state:estate.value,
dob:edob.value,adhar:eadhar.value,class:eclass.value
});
popup.style.display="none";
loadStudents();
}

/* PHOTO UPLOAD */
window.uploadPhoto=async function(id){
const fileInput=document.createElement("input");fileInput.type="file";
fileInput.onchange=async e=>{
let file=e.target.files[0];
if(!file) return;
let url=await uploadImgBB(file);
await updateDoc(doc(db,"admissions",id),{photo:url});
loadStudents();
}
fileInput.click();
}

/* PRINT */
window.printStudent=function(id){window.open("print-form.html?id="+id);}

/* EXPORT ALL */
window.exportAll=function(){
const ws=XLSX.utils.json_to_sheet(admissions);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Students");
XLSX.writeFile(wb,"all_students.xlsx");
}

/* SEARCH & FILTER */
search.addEventListener("keyup",loadStudents);
classFilter.addEventListener("change",loadStudents);

/* BULK EXCEL IMPORT */
excelImport.addEventListener("change",async function(e){
let selectedClass=classImport.value;if(!selectedClass){alert("Select Class");return;}
const reader=new FileReader();
reader.onload=async function(evt){
const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets[wb.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);
for(let s of json){
s.class=selectedClass;s.schoolId=schoolId;s.session=session;
await addDoc(collection(db,"admissions"),s);
}
alert("Bulk Students Added");
loadStudents();
}
reader.readAsArrayBuffer(e.target.files[0]);
});
</script>
</body>
</html>
