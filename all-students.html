<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.search,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
}

.edit{background:#ffc107;}
.delete{background:red;color:white;}
.view{background:#004aad;color:white;}
.photo{background:#28a745;color:white;}
.id{background:#6f42c1;color:white;}
.pdf{background:#17a2b8;color:white;}

.stats{
margin-top:20px;
background:white;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<div class="stats">
<h3>Total Students : <span id="total">0</span></h3>
<div id="classStats"></div>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

students=[];

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
data.id=docSnap.id;

students.push(data);

count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ''}" width="40"></td>

<td>

<button class="view" onclick="viewStudent('${data.id}')">Form</button>
<button class="edit" onclick="editStudent('${data.id}')">Edit</button>
<button class="photo" onclick="uploadPhoto('${data.id}')">Photo</button>
<button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>
<button class="id" onclick="generateID('${data.id}')">ID Card</button>
<button class="pdf" onclick="downloadPDF('${data.id}')">PDF</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

window.viewStudent=function(id){

let s=students.find(x=>x.id==id);

let win=window.open("");

win.document.write(`

<style>

body{
font-family:Arial;
padding:20px;
}

.school{
text-align:center;
font-size:22px;
font-weight:bold;
}

.info{
text-align:center;
font-size:14px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border:1px solid #000;
padding:8px;
}

.photo{
position:absolute;
right:40px;
top:120px;
}

@media print{

body{
background:#ffeb3b !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.container{
background:#004aad !important;
color:white !important;
padding:20px;
}

}

</style>

<div class="container">

<div class="school">New Mahankal Public School Nagguradiya</div>

<div class="info">
DISE Code : 1234567888 <br>
PS ID : 1247754336
</div>

<img class="photo" src="${s.photo}" width="120">

<table>

<tr><td>Name</td><td>${s.name}</td><td>Father</td><td>${s.father}</td></tr>
<tr><td>Mobile</td><td>${s.mobile}</td><td>Village</td><td>${s.village}</td></tr>
<tr><td>City</td><td>${s.city}</td><td>Post</td><td>${s.post}</td></tr>
<tr><td>District</td><td>${s.district}</td><td>State</td><td>${s.state}</td></tr>
<tr><td>Aadhar</td><td>${s.adhar}</td><td>APAR</td><td>${s.apar}</td></tr>
<tr><td>SSSM</td><td>${s.sssm}</td><td>Family</td><td>${s.family}</td></tr>
<tr><td>Roll</td><td>${s.roll}</td><td>Scholar</td><td>${s.scholer}</td></tr>
<tr><td>Caste</td><td>${s.caste}</td><td>Category</td><td>${s.category}</td></tr>
<tr><td>DOB</td><td>${s.dob}</td><td>Admission Date</td><td>${s.admissionDate}</td></tr>
<tr><td>Class</td><td>${s.class}</td><td></td><td></td></tr>

</table>

<br>
<button onclick="window.print()">Print</button>

</div>

`);

}

window.generateID=function(id){

let s=students.find(x=>x.id==id);

let win=window.open("");

win.document.write(`

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
border:3px solid #004aad;
border-radius:10px;
text-align:center;
}

.head{
background:#004aad;
color:white;
padding:10px;
font-size:18px;
}

.details{
padding:10px;
}

@media print{

body{
background:#ffeb3b !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}

.card{
background:#004aad !important;
color:white !important;
}

}

</style>

<div class="card">

<div class="head">
Student ID Card<br>
New Mahankal Public School<br>
Nagguradiya
</div>

<img src="${s.photo}" width="90"><br><br>

<div class="details">

<b>${s.name}</b>

<p>Father : ${s.father}</p>

<p>Class : ${s.class}</p>

<p>Roll : ${s.roll}</p>

<p>Mobile : ${s.mobile}</p>

<p>DISE : 1234567888</p>

</div>

<button onclick="window.print()">Print</button>

</div>

`);

}

loadStudents();

</script>

</body>
  </html>
