<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.topbtn{
background:#28a745;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:10px;
}

.search,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
}

.edit{background:#ffc107;}
.delete{background:red;color:white;}
.view{background:#004aad;color:white;}
.photo{background:#28a745;color:white;}
.print{background:#17a2b8;color:white;}
.promote{background:#6f42c1;color:white;}

.stats{
margin-top:20px;
background:white;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<button class="topbtn" onclick="addStudent()">+ Add New Student</button>

<input type="text" id="search" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<div class="stats">
<h3>Total Students : <span id="total">0</span></h3>
<div id="classStats"></div>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

students=[];

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

if(data.schoolId !== schoolId) return;

data.id=docSnap.id;

students.push(data);

count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ''}" width="40"></td>

<td>

<button class="view" onclick="viewStudent('${data.id}')">Form</button>

<button class="edit" onclick="editStudent('${data.id}')">Edit</button>

<button class="photo" onclick="uploadPhoto('${data.id}')">Photo</button>

<button class="promote" onclick="promoteStudent('${data.id}')">Promote</button>

<button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>

<button class="print" onclick="openPrintForm('${data.id}')">Print Form</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.addStudent=function(){
window.location.href="admission.html";
}

window.promoteStudent=async function(id){

let s=students.find(x=>x.id==id);

let nextClass=parseInt(s.class)+1;

if(nextClass>12){
alert("Already in highest class");
return;
}

await updateDoc(doc(db,"admissions",id),{
class:String(nextClass)
});

loadStudents();

}

window.openPrintForm=function(id){
window.location.href="print-form.html?id="+id;
}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

loadStudents();

</script>

</body>
  </html>
