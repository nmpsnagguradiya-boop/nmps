<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.search,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
}

.edit{background:#ffc107;}
.delete{background:red;color:white;}
.view{background:#004aad;color:white;}
.photo{background:#28a745;color:white;}
.print{background:#17a2b8;color:white;}

.stats{
margin-top:20px;
background:white;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Search Student">

<select id="classFilter">
<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<div class="stats">
<h3>Total Students : <span id="total">0</span></h3>
<div id="classStats"></div>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

async function loadStudents(){

const querySnapshot=await getDocs(collection(db,"admissions"));

let html="";
let count=0;
let classCount={};

students=[];

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();
data.id=docSnap.id;

students.push(data);

count++;

if(!classCount[data.class]){
classCount[data.class]=0;
}

classCount[data.class]++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ''}" width="40"></td>

<td>

<button class="view" onclick="viewStudent('${data.id}')">Form</button>

<button class="edit" onclick="editStudent('${data.id}')">Edit</button>

<button class="photo" onclick="uploadPhoto('${data.id}')">Photo</button>

<button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>

<button class="print" onclick="openPrintForm('${data.id}')">Print Form</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

let statsHTML="";

for(let c in classCount){
statsHTML+=`Class ${c} : ${classCount[c]} Students <br>`;
}

document.getElementById("classStats").innerHTML=statsHTML;

}

window.openPrintForm=function(id){

window.location.href="print-form.html?id="+id;

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){
await deleteDoc(doc(db,"admissions",id));
loadStudents();
}

}

window.editStudent=async function(id){

let s=students.find(x=>x.id==id);

let name=prompt("Name",s.name);
let father=prompt("Father",s.father);
let mobile=prompt("Mobile",s.mobile);
let village=prompt("Village",s.village);
let city=prompt("City",s.city);
let post=prompt("Post",s.post);
let district=prompt("District",s.district);
let state=prompt("State",s.state);
let adhar=prompt("Aadhar",s.adhar);
let apar=prompt("APAR",s.apar);
let sssm=prompt("SSSM",s.sssm);
let family=prompt("Family ID",s.family);
let roll=prompt("Roll",s.roll);
let scholer=prompt("Scholar",s.scholer);
let caste=prompt("Caste",s.caste);
let category=prompt("Category",s.category);
let dob=prompt("DOB",s.dob);
let admissionDate=prompt("Admission Date",s.admissionDate);

await updateDoc(doc(db,"admissions",id),{

name,father,mobile,village,city,post,district,state,
adhar,apar,sssm,family,roll,scholer,caste,category,dob,admissionDate

});

loadStudents();

}

window.uploadPhoto=async function(id){

let input=document.createElement("input");
input.type="file";

input.onchange=async function(){

let file=input.files[0];

let formData=new FormData();
formData.append("image",file);

let res=await fetch("https://api.imgbb.com/1/upload?key=21000d5a5d14fcef4b6af4d13647da5a",{
method:"POST",
body:formData
});

let data=await res.json();

await updateDoc(doc(db,"admissions",id),{
photo:data.data.url
});

loadStudents();

};

input.click();

}

window.viewStudent=function(id){

let s=students.find(x=>x.id==id);

let win=window.open("");

win.document.write(`

<style>

body{font-family:Arial;padding:20px;}

.form{
padding:20px;
}

@media print{

body{background:#ffeb3b;}

.form{
background:#004aad;
color:white;
padding:25px;
border-radius:10px;
}

}

</style>

<div class="form">

<h2>Student Admission Form</h2>

<p>Name : ${s.name}</p>
<p>Father : ${s.father}</p>
<p>Mobile : ${s.mobile}</p>
<p>Village : ${s.village}</p>
<p>City : ${s.city}</p>
<p>Post : ${s.post}</p>
<p>District : ${s.district}</p>
<p>State : ${s.state}</p>
<p>Aadhar : ${s.adhar}</p>
<p>APAR : ${s.apar}</p>
<p>SSSM : ${s.sssm}</p>
<p>Family ID : ${s.family}</p>
<p>Roll : ${s.roll}</p>
<p>Scholar : ${s.scholer}</p>
<p>Caste : ${s.caste}</p>
<p>Category : ${s.category}</p>
<p>DOB : ${s.dob}</p>
<p>Admission Date : ${s.admissionDate}</p>
<p>Class : ${s.class}</p>

<img src="${s.photo}" width="120">

<br><br>

<button onclick="window.print()">Print</button>

</div>

`);

}

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{
let name=row.children[0].innerText.toLowerCase();
row.style.display=name.includes(filter)?"":"none";
});

});

document.getElementById("classFilter").addEventListener("change",function(){

let filter=this.value;

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(row=>{
let cls=row.children[1].innerText;
row.style.display=(filter==""||cls==filter)?"":"none";
});

});

loadStudents();

</script>

</body>
</html>
