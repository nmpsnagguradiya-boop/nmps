<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>All Students</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.topbar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.topbtn{
background:#28a745;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.search{
padding:10px;
width:200px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

table th{
background:#004aad;
color:white;
padding:10px;
}

table td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
}

.edit{background:#ffc107;}
.delete{background:red;color:white;}
.view{background:#004aad;color:white;}
.print{background:#17a2b8;color:white;}
.promote{background:#6f42c1;color:white;}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:none;
max-height:80vh;
overflow:auto;
width:95%;
max-width:500px;
}

.popup input,.popup select{
width:100%;
padding:8px;
margin-top:6px;
}

</style>

</head>

<body>

<header>All Students</header>

<div class="container">

<div class="topbar">

<button class="topbtn" onclick="addStudent()">+ Add Student</button>

<select id="sessionFilter">
<option value="">All Session</option>
<option>2024-25</option>
<option>2025-26</option>
<option>2026-27</option>
</select>

<select id="classFilter">
<option value="">All Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<input class="search" id="search" placeholder="Search Name / Mobile">

<button class="topbtn" onclick="exportClass()">Export Excel</button>

<input type="file" id="importExcel">

<button class="topbtn" onclick="bulkPromote()">Bulk Promote</button>

</div>

<h3>Total Students : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Session</th>
<th>Mobile</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<div class="popup" id="popup"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,deleteDoc,doc,updateDoc,addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId = localStorage.getItem("schoolId") || "school_001";

let students=[];

async function loadStudents(){

students=[];

const snapshot=await getDocs(collection(db,"admissions"));

snapshot.forEach(docSnap=>{

let data=docSnap.data();

if(data.schoolId!==schoolId) return;

data.id=docSnap.id;

students.push(data);

});

renderTable();

}

function renderTable(){

let html="";
let count=0;

let search=document.getElementById("search").value.toLowerCase();
let classFilter=document.getElementById("classFilter").value;
let sessionFilter=document.getElementById("sessionFilter").value;

students.forEach(data=>{

if(search && !data.name.toLowerCase().includes(search) && !data.mobile.includes(search)) return;

if(classFilter && data.class!=classFilter) return;

if(sessionFilter && data.session!=sessionFilter) return;

count++;

html+=`

<tr>

<td>${data.name}</td>
<td>${data.class}</td>
<td>${data.session || "-"}</td>
<td>${data.mobile}</td>
<td><img src="${data.photo || ''}" width="40"></td>

<td>

<button class="view" onclick="viewStudent('${data.id}')">Form</button>
<button class="edit" onclick="editStudent('${data.id}')">Edit</button>
<button class="promote" onclick="promoteStudent('${data.id}')">Promote</button>
<button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>
<button class="print" onclick="openPrintForm('${data.id}')">Print</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;
document.getElementById("total").innerText=count;

}

window.addStudent=function(){
window.location.href="admission.html";
}

window.viewStudent=function(id){

let s=students.find(x=>x.id==id);

alert(
"Name : "+s.name+
"\nFather : "+s.father+
"\nMobile : "+s.mobile+
"\nClass : "+s.class+
"\nSession : "+(s.session||"")
);

}

window.editStudent=function(id){

let s=students.find(x=>x.id==id);

document.getElementById("popup").style.display="block";

document.getElementById("popup").innerHTML=`

<h3>Edit Student</h3>

<input id="name" value="${s.name}">
<input id="father" value="${s.father}">
<input id="mobile" value="${s.mobile}">

<select id="class">
<option>${s.class}</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<input id="session" value="${s.session||''}" placeholder="Session">

<br><br>

<button onclick="saveEdit('${id}')">Update</button>
<button onclick="closePopup()">Cancel</button>

`;

}

window.saveEdit=async function(id){

await updateDoc(doc(db,"admissions",id),{

name:document.getElementById("name").value,
father:document.getElementById("father").value,
mobile:document.getElementById("mobile").value,
class:document.getElementById("class").value,
session:document.getElementById("session").value

});

closePopup();
loadStudents();

}

window.promoteStudent=function(id){

document.getElementById("popup").style.display="block";

document.getElementById("popup").innerHTML=`

<h3>Promote Student</h3>

<input id="newSession" placeholder="New Session">

<select id="newClass">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<br><br>

<button onclick="savePromote('${id}')">Promote</button>
<button onclick="closePopup()">Cancel</button>

`;

}

window.savePromote=async function(id){

let s=students.find(x=>x.id==id);

await addDoc(collection(db,"admissions"),{

...s,
class:document.getElementById("newClass").value,
session:document.getElementById("newSession").value,
schoolId:schoolId

});

closePopup();
loadStudents();

}

window.deleteStudent=async function(id){

if(confirm("Delete Student?")){

await deleteDoc(doc(db,"admissions",id));
loadStudents();

}

}

window.bulkPromote=function(){

alert("Bulk Promote System Coming");

}

window.openPrintForm=function(id){

window.location.href="print-form.html?id="+id;

}

window.exportClass=function(){

const ws=XLSX.utils.json_to_sheet(students);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"students.xlsx");

}

document.getElementById("importExcel").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=async function(evt){

const data=new Uint8Array(evt.target.result);

const workbook=XLSX.read(data,{type:'array'});

const sheet=workbook.Sheets[workbook.SheetNames[0]];

const json=XLSX.utils.sheet_to_json(sheet);

for(let s of json){

s.schoolId=schoolId;

await addDoc(collection(db,"admissions"),s);

}

loadStudents();

}

reader.readAsArrayBuffer(e.target.files[0]);

});

document.getElementById("search").addEventListener("keyup",renderTable);
document.getElementById("classFilter").addEventListener("change",renderTable);
document.getElementById("sessionFilter").addEventListener("change",renderTable);

window.closePopup=function(){
document.getElementById("popup").style.display="none";
}

loadStudents();

</script>

</body>
  </html>
