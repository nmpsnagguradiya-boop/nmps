<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admission Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f2f2;}

header{background:#004aad;color:white;padding:16px;text-align:center;font-size:22px;}

.container{padding:20px;}

.controls{margin-bottom:15px;}

input,select{padding:8px;margin:5px;width:100%;}

table{width:100%;background:white;border-collapse:collapse;}

th,td{padding:8px;border:1px solid #ddd;text-align:center;}

img{width:50px;border-radius:5px;}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;margin:2px;}

.edit{background:#ffc107;}
.photo{background:#6f42c1;color:white;}
.delete{background:red;color:white;}
.print{background:#17a2b8;color:white;}
.export{background:#28a745;color:white;}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
width:95%;
max-width:500px;
max-height:80vh;
overflow:auto;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:none;
}

</style>
</head>

<body>

<header>Admission Admin Panel</header>

<div class="container">

<div class="controls">

<input type="text" id="search" placeholder="Search Name / Mobile">

<select id="classFilter">
<option value="all">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<button class="export" onclick="exportAll()">Export All Students</button>

</div>

<h3>Total Admissions : <span id="total">0</span></h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Mobile</th>
<th>Village</th>
<th>Class</th>
<th>Photo</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<div class="popup" id="popup"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,updateDoc,deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const activeSession=localStorage.getItem("activeSession")||"2025-26";

let admissions=[];

loadAdmissions();

async function loadAdmissions(){

admissions=[];

const snapshot=await getDocs(collection(db,"admissions"));

snapshot.forEach(docSnap=>{

const data=docSnap.data();

if(data.schoolId!==schoolId) return;
if(data.session!==activeSession) return;

data.id=docSnap.id;

admissions.push(data);

});

renderTable();

document.getElementById("total").innerText=admissions.length;

}

function renderTable(){

const search=document.getElementById("search").value.toLowerCase();
const classFilter=document.getElementById("classFilter").value;

const table=document.getElementById("list");
table.innerHTML="";

admissions.forEach(data=>{

if(search && !data.name.toLowerCase().includes(search) && !data.mobile.includes(search)) return;
if(classFilter!="all" && data.class!=classFilter) return;

table.innerHTML+=`

<tr>

<td>${data.name}</td>
<td>${data.father}</td>
<td>${data.mobile}</td>
<td>${data.village}</td>
<td>${data.class}</td>

<td><img src="${data.photo||""}"></td>

<td>

<button class="edit" onclick="editStudent('${data.id}')">Edit</button>
<button class="print" onclick="printForm('${data.id}')">Print</button>
<button class="delete" onclick="remove('${data.id}')">Delete</button>

</td>

</tr>

`;

});

}

/* EDIT POPUP */

window.editStudent=function(id){

const s=admissions.find(x=>x.id==id);

document.getElementById("popup").style.display="block";

document.getElementById("popup").innerHTML=`

<h3>Edit Student</h3>

<input id="name" value="${s.name||""}" placeholder="Name">
<input id="father" value="${s.father||""}" placeholder="Father">
<input id="mobile" value="${s.mobile||""}" placeholder="Mobile">

<input id="village" value="${s.village||""}" placeholder="Village">
<input id="post" value="${s.post||""}" placeholder="Post">
<input id="district" value="${s.district||""}" placeholder="District">
<input id="state" value="${s.state||""}" placeholder="State">

<input id="dob" value="${s.dob||""}" type="date">

<input id="adhar" value="${s.adhar||""}" placeholder="Aadhar">
<input id="apar" value="${s.apar||""}" placeholder="APAR">
<input id="sssm" value="${s.sssm||""}" placeholder="SSSM">

<input id="category" value="${s.category||""}" placeholder="Category">

<input id="roll" value="${s.roll||""}" placeholder="Roll">
<input id="scholer" value="${s.scholer||""}" placeholder="Scholar">

<input id="national" value="${s.national||""}" placeholder="National ID">

<select id="class">
<option ${s.class=="Nursery"?"selected":""}>Nursery</option>
<option ${s.class=="LKG"?"selected":""}>LKG</option>
<option ${s.class=="UKG"?"selected":""}>UKG</option>
<option ${s.class=="1"?"selected":""}>1</option>
<option ${s.class=="2"?"selected":""}>2</option>
<option ${s.class=="3"?"selected":""}>3</option>
<option ${s.class=="4"?"selected":""}>4</option>
<option ${s.class=="5"?"selected":""}>5</option>
<option ${s.class=="6"?"selected":""}>6</option>
<option ${s.class=="7"?"selected":""}>7</option>
<option ${s.class=="8"?"selected":""}>8</option>
<option ${s.class=="9"?"selected":""}>9</option>
<option ${s.class=="10"?"selected":""}>10</option>
<option ${s.class=="11"?"selected":""}>11</option>
<option ${s.class=="12"?"selected":""}>12</option>
</select>

<br><br>

<button onclick="saveEdit('${id}')">Update</button>
<button onclick="closePopup()">Cancel</button>

`;

}

window.saveEdit=async function(id){

await updateDoc(doc(db,"admissions",id),{

name:document.getElementById("name").value,
father:document.getElementById("father").value,
mobile:document.getElementById("mobile").value,
village:document.getElementById("village").value,
post:document.getElementById("post").value,
district:document.getElementById("district").value,
state:document.getElementById("state").value,
dob:document.getElementById("dob").value,
adhar:document.getElementById("adhar").value,
apar:document.getElementById("apar").value,
sssm:document.getElementById("sssm").value,
category:document.getElementById("category").value,
roll:document.getElementById("roll").value,
scholer:document.getElementById("scholer").value,
national:document.getElementById("national").value,
class:document.getElementById("class").value

});

closePopup();
loadAdmissions();

}

window.closePopup=function(){
document.getElementById("popup").style.display="none";
}

/* PRINT */

window.printForm=function(id){
window.open("print-form.html?id="+id);
}

/* DELETE */

window.remove=async function(id){

if(confirm("Delete admission?")){

await deleteDoc(doc(db,"admissions",id));
loadAdmissions();

}

}

/* EXPORT */

window.exportAll=function(){

const ws=XLSX.utils.json_to_sheet(admissions);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Students");

XLSX.writeFile(wb,"all_students.xlsx");

}

document.getElementById("search").addEventListener("keyup",renderTable);
document.getElementById("classFilter").addEventListener("change",renderTable);

</script>

</body>
    </html>
