<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMPS Admin Fees Management</title>
<style>
body, html {margin:0; padding:0; font-family: Arial,sans-serif; background:#f2f2f2;}
header {background:#82caff; color:white; padding:15px; text-align:center;}
.container {max-width:1200px; margin:20px auto; padding:20px;}
.card {background:white; padding:20px; margin:20px 0; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, select {width:100%; padding:8px; margin:5px 0;}
button {background:#82caff; border:none; color:white; padding:10px 15px; margin:5px 0; cursor:pointer; border-radius:5px;}
table {width:100%; border-collapse: collapse; margin-top:15px;}
table, th, td {border:1px solid #ddd;}
th, td {padding:8px; text-align:left;}
img.qr-preview {width:80px; height:80px; margin-top:5px;}
.filters {display:flex; gap:10px; margin-bottom:10px;}
.filters select, .filters button {width:auto; padding:5px;}
</style>
</head>
<body>

<header>
  <h2>NMPS Admin Fees Management</h2>
</header>

<div class="container">
  <div class="card">
    <h3>Update Student Fees</h3>
    <form id="feesForm">
      <input type="text" id="studentName" placeholder="Student Name" required>
      <input type="text" id="className" placeholder="Class" required>
      <input type="text" id="accountNumber" placeholder="Account Number" required>
      <label>Upload QR Code</label>
      <input type="file" id="qrCode" accept="image/*">
      <img id="qrPreview" class="qr-preview" src="" alt="">
      <input type="number" id="vehicleFees" placeholder="Vehicle Fees">
      <input type="number" id="oldFees" placeholder="Old Fees">
      <input type="number" id="totalFees" placeholder="Total Fees">
      <input type="number" id="installment" placeholder="Installment">
      <input type="number" id="totalUpdate" placeholder="Total Update">
      <button type="submit">Add/Update Fees</button>
    </form>
  </div>

  <div class="card">
    <h3>Filter Students</h3>
    <div class="filters">
      <select id="filterClass">
        <option value="">All Classes</option>
      </select>
      <button onclick="sortFeesDesc()">Highest Fees First</button>
      <button onclick="showPending()">Pending Fees</button>
      <button onclick="showAll()">Show All</button>
    </div>

    <table id="feesTable">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Class</th>
          <th>Account Number</th>
          <th>QR Code</th>
          <th>Vehicle Fees</th>
          <th>Old Fees</th>
          <th>Total Fees</th>
          <th>Installment</th>
          <th>Total Update</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
  authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
  projectId: "nmpsnagguradiya-b9b94",
  storageBucket: "nmpsnagguradiya-b9b94.appspot.com",
  messagingSenderId: "811957568318",
  appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const feesForm = document.getElementById('feesForm');
const qrInput = document.getElementById('qrCode');
const qrPreview = document.getElementById('qrPreview');
let allRecords = [];

// QR preview
qrInput.addEventListener('change', ()=>{
  const file = qrInput.files[0];
  if(file) qrPreview.src = URL.createObjectURL(file);
});

// Add/Update fees
feesForm.addEventListener('submit', async function(e){
  e.preventDefault();
  const studentName = document.getElementById('studentName').value;
  const className = document.getElementById('className').value;
  const accountNumber = document.getElementById('accountNumber').value;
  const vehicleFees = +document.getElementById('vehicleFees').value || 0;
  const oldFees = +document.getElementById('oldFees').value || 0;
  const totalFees = +document.getElementById('totalFees').value || 0;
  const installment = +document.getElementById('installment').value || 0;
  const totalUpdate = +document.getElementById('totalUpdate').value || 0;
  
  let qrURL = '';
  if(qrInput.files[0]){
    const file = qrInput.files[0];
    const storageRef = ref(storage, 'qrCodes/'+Date.now()+'_'+file.name);
    await uploadBytes(storageRef, file);
    qrURL = await getDownloadURL(storageRef);
  }

  // Check if student exists, update
  const studentDoc = doc(db,'fees',studentName+'_'+className);
  await setDoc(studentDoc,{
    studentName,className,accountNumber,qrURL,vehicleFees,oldFees,totalFees,installment,totalUpdate
  });

  feesForm.reset();
  qrPreview.src='';
});

// Live snapshot
onSnapshot(collection(db,'fees'), (snapshot)=>{
  allRecords = [];
  snapshot.forEach(docSnap=>{
    allRecords.push(docSnap.data());
  });
  populateFilters();
  renderTable(allRecords);
});

// Populate class filter
function populateFilters(){
  const filterClass = document.getElementById('filterClass');
  const classes = [...new Set(allRecords.map(r=>r.className))];
  filterClass.innerHTML = '<option value="">All Classes</option>';
  classes.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    filterClass.appendChild(opt);
  });
}

// Render table
function renderTable(records){
  const tbody = document.querySelector('#feesTable tbody');
  tbody.innerHTML='';
  records.forEach((f, idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td>${f.studentName}</td>
      <td>${f.className}</td>
      <td>${f.accountNumber}</td>
      <td>${f.qrURL ? '<img src="'+f.qrURL+'" width="50"/>' : ''}</td>
      <td>${f.vehicleFees}</td>
      <td>${f.oldFees}</td>
      <td>${f.totalFees}</td>
      <td>${f.installment}</td>
      <td>${f.totalUpdate}</td>
      <td>
        <button onclick="editRecord('${f.studentName}','${f.className}')">Edit</button>
        <button onclick="deleteRecord('${f.studentName}','${f.className}')">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// Edit record
function editRecord(name,className){
  const record = allRecords.find(r=>r.studentName===name && r.className===className);
  if(!record) return;
  document.getElementById('studentName').value = record.studentName;
  document.getElementById('className').value = record.className;
  document.getElementById('accountNumber').value = record.accountNumber;
  document.getElementById('vehicleFees').value = record.vehicleFees;
  document.getElementById('oldFees').value = record.oldFees;
  document.getElementById('totalFees').value = record.totalFees;
  document.getElementById('installment').value = record.installment;
  document.getElementById('totalUpdate').value = record.totalUpdate;
  qrPreview.src = record.qrURL;
}

// Delete record
async function deleteRecord(name,className){
  if(confirm('Delete this record?')){
    const studentDoc = doc(db,'fees',name+'_'+className);
    await deleteDoc(studentDoc);
  }
}

// Filters
document.getElementById('filterClass').addEventListener('change', function(){
  const cls = this.value;
  if(cls) renderTable(allRecords.filter(r=>r.className===cls));
  else renderTable(allRecords);
});

function sortFeesDesc(){
  const sorted = [...allRecords].sort((a,b)=>b.totalFees - a.totalFees);
  renderTable(sorted);
}

function showPending(){
  renderTable(allRecords.filter(r=>r.totalUpdate>0));
}

function showAll(){
  renderTable(allRecords);
}

</script>

</body>
</html>
