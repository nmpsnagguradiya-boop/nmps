<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Fees Receipt</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
text-align:center;
}

/* RECEIPT BOX */

.receipt{
background:white;
padding:20px;
width:800px;
margin:auto;
border:2px solid black;
}

/* SCHOOL HEADER */

.school{
font-size:22px;
font-weight:bold;
}

.address{
font-size:14px;
margin-bottom:20px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
border:1px solid #000;
padding:8px;
text-align:left;
}

/* BUTTONS */

button{
padding:10px 15px;
margin:10px;
font-weight:bold;
cursor:pointer;
}

/* THERMAL STYLE */

.thermal{
width:300px;
font-size:12px;
}

/* PRINT */

@media print{

button{
display:none;
}

body{
background:white;
}

}

</style>

</head>

<body>

<button onclick="printA4()">Print A4 Receipt</button>

<button onclick="printThermal()">Print Thermal Receipt</button>

<div id="receiptBox" class="receipt">

<div class="school" id="schoolName">YOUR SCHOOL NAME</div>

<div class="address" id="schoolAddress">
Village Nag Guradiya, District Ujjain
</div>

<h3>Fees Receipt</h3>

<p><b>Receipt No :</b> <span id="receiptNo"></span></p>

<table>

<tr>
<td>Student Name</td>
<td id="name"></td>
</tr>

<tr>
<td>Father Name</td>
<td id="father"></td>
</tr>

<tr>
<td>Village</td>
<td id="village"></td>
</tr>

<tr>
<td>Class</td>
<td id="class"></td>
</tr>

<tr>
<td>Mobile</td>
<td id="mobile"></td>
</tr>

<tr>
<td>School Fees</td>
<td id="fees"></td>
</tr>

<tr>
<td>Vehicle Fees</td>
<td id="vehicle"></td>
</tr>

<tr>
<td>Total Fees</td>
<td id="total"></td>
</tr>

<tr>
<td>Paid Amount</td>
<td id="paid"></td>
</tr>

<tr>
<td>Pending</td>
<td id="pending"></td>
</tr>

<tr>
<td>Date</td>
<td id="date"></td>
</tr>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

/* GET STUDENT ID FROM URL */

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

/* AUTO RECEIPT NUMBER */

let receiptNumber="RC-"+Date.now()

document.getElementById("receiptNo").innerText=receiptNumber

/* LOAD STUDENT */

async function loadStudent(){

let snap=await getDoc(doc(db,"admissions",id))

let s=snap.data()

let fees=s.fees||0
let vehicle=s.vehicleFees||0
let total=fees+vehicle
let paid=s.paid||0
let pending=total-paid

document.getElementById("name").innerText=s.name
document.getElementById("father").innerText=s.father
document.getElementById("village").innerText=s.village
document.getElementById("class").innerText=s.class
document.getElementById("mobile").innerText=s.mobile

document.getElementById("fees").innerText=fees
document.getElementById("vehicle").innerText=vehicle
document.getElementById("total").innerText=total
document.getElementById("paid").innerText=paid
document.getElementById("pending").innerText=pending

document.getElementById("date").innerText=new Date().toLocaleDateString()

}

loadStudent()

/* PRINT FUNCTIONS */

window.printA4=function(){

document.getElementById("receiptBox").classList.remove("thermal")

window.print()

}

window.printThermal=function(){

document.getElementById("receiptBox").classList.add("thermal")

window.print()

}

</script>

</body>

</html>
