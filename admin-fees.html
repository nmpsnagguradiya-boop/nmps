<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>School Fees Management</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

select,input,button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th{
background:#004aad;
color:white;
padding:8px;
}

td{
padding:8px;
border:1px solid #ccc;
text-align:center;
}

.deposit{background:#28a745;color:white;border:none}
.history{background:#ffc107;border:none}
.whatsapp{background:#25D366;color:white;border:none}

.report{
background:white;
padding:15px;
margin-top:20px;
border-radius:6px;
}

</style>

</head>

<body>

<header>School Fees Management</header>

<div class="container">

<select id="classFilter">

<option value="">All Classes</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<br>

<input type="number" id="feesAmount" placeholder="School Fees">

<button onclick="addFees()">Add Fees</button>

<input type="number" id="vehicleFees" placeholder="Vehicle Fees">

<button onclick="addVehicleFees()">Add Vehicle Fees</button>

<button onclick="downloadExcel()">Download Excel Report</button>

<div class="report">

<h3>Total Collection : ₹ <span id="collection">0</span></h3>

<h3>Total Pending : ₹ <span id="pending">0</span></h3>

</div>

<table>

<thead>

<tr>

<th>Select</th>
<th>Name</th>
<th>Father</th>
<th>Village</th>
<th>Class</th>
<th>Mobile</th>
<th>Fees</th>
<th>Vehicle</th>
<th>Installment</th>
<th>Deposit</th>
<th>Receipt</th>
<th>History</th>
<th>WhatsApp</th>

</tr>

</thead>

<tbody id="studentList"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94",
storageBucket:"nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId:"811957568318",
appId:"1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let students=[];

async function loadStudents(){

const snap=await getDocs(collection(db,"admissions"));

let html="";

let totalCollection=0;
let totalPending=0;

students=[];

snap.forEach(docSnap=>{

let s=docSnap.data();

s.id=docSnap.id;

students.push(s);

let fees=s.fees||0;

let vehicle=s.vehicleFees||0;

let total=fees+vehicle;

let paid=(s.installment||0)*(total/3);

let pending=total-paid;

totalCollection+=paid;

totalPending+=pending;

html+=`

<tr>

<td><input type="checkbox" value="${s.id}"></td>

<td>${s.name||''}</td>

<td>${s.father||''}</td>

<td>${s.village||''}</td>

<td>${s.class||''}</td>

<td>${s.mobile||''}</td>

<td>${fees}</td>

<td>${vehicle}</td>

<td>${s.installment||0}/3</td>

<td>

<button class="deposit" onclick="depositFees('${s.id}')">
Deposit
</button>

</td>

<td>

<button onclick="downloadReceipt('${s.id}')">
PDF
</button>

</td>

<td>

<button class="history" onclick="viewHistory('${s.id}')">
History
</button>

</td>

<td>

<button class="whatsapp" onclick="sendWhatsApp('${s.id}')">
WhatsApp
</button>

</td>

</tr>

`;

});

document.getElementById("studentList").innerHTML=html;

document.getElementById("collection").innerText=totalCollection;

document.getElementById("pending").innerText=totalPending;

}

window.addFees=async function(){

let amount=parseInt(document.getElementById("feesAmount").value);

let checked=document.querySelectorAll("#studentList input:checked");

checked.forEach(async c=>{

await updateDoc(doc(db,"admissions",c.value),{
fees:amount
});

});

alert("Fees Added");

loadStudents();

}

window.addVehicleFees=async function(){

let amount=parseInt(document.getElementById("vehicleFees").value);

let checked=document.querySelectorAll("#studentList input:checked");

checked.forEach(async c=>{

await updateDoc(doc(db,"admissions",c.value),{
vehicleFees:amount
});

});

alert("Vehicle Fees Added");

loadStudents();

}

window.depositFees=async function(id){

let s=students.find(x=>x.id==id);

let inst=(s.installment||0)+1;

if(inst>3){

alert("All Installments Paid");

return;

}

let total=(s.fees||0)+(s.vehicleFees||0);

let instAmount=total/3;

await updateDoc(doc(db,"admissions",id),{
installment:inst
});

await addDoc(collection(db,"fees_history"),{

studentId:id,

name:s.name,

class:s.class,

mobile:s.mobile,

amount:instAmount,

installment:inst,

date:new Date().toLocaleDateString()

});

alert("Installment "+inst+" Deposited");

loadStudents();

}

window.viewHistory=async function(id){

let q=query(collection(db,"fees_history"),where("studentId","==",id));

let snap=await getDocs(q);

let text="Fees History\n\n";

snap.forEach(d=>{

let h=d.data();

text+=
"Date : "+h.date+
"\nInstallment : "+h.installment+
"\nAmount : "+h.amount+
"\n\n";

});

alert(text);

}

window.downloadReceipt=function(id){

let s=students.find(x=>x.id==id);

const { jsPDF }=window.jspdf;

let pdf=new jsPDF();

pdf.text("School Fees Receipt",20,20);

pdf.text("Student : "+s.name,20,40);

pdf.text("Class : "+s.class,20,50);

pdf.text("Mobile : "+s.mobile,20,60);

pdf.text("Fees : "+(s.fees||0),20,80);

pdf.text("Vehicle Fees : "+(s.vehicleFees||0),20,90);

pdf.text("Installment : "+(s.installment||0),20,110);

pdf.save("receipt_"+s.name+".pdf");

}

window.sendWhatsApp=function(id){

let s=students.find(x=>x.id==id);

let total=(s.fees||0)+(s.vehicleFees||0);

let paid=(s.installment||0)*(total/3);

let msg=
"School Fees Receipt%0A"+
"Student : "+s.name+"%0A"+
"Class : "+s.class+"%0A"+
"Paid : ₹"+paid+"%0A"+
"Installment : "+(s.installment||0)+"/3";

let phone=s.mobile.replace(/\D/g,'');

let url="https://wa.me/91"+phone+"?text="+msg;

window.open(url);

}

window.downloadExcel=function(){

let csv="Name,Father,Village,Class,Mobile,Fees,Vehicle Fees,Installment\n";

students.forEach(s=>{

csv+=
(s.name||"")+","+
(s.father||"")+","+
(s.village||"")+","+
(s.class||"")+","+
(s.mobile||"")+","+
(s.fees||0)+","+
(s.vehicleFees||0)+","+
(s.installment||0)+"\n";

});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="fees-report.csv";

a.click();

}

document.getElementById("classFilter").addEventListener("change",function(){

let cls=this.value;

let rows=document.querySelectorAll("#studentList tr");

rows.forEach(r=>{

let c=r.children[4].innerText;

r.style.display=(cls==""||c==cls)?"":"none";

});

});

loadStudents();

</script>

</body>

</html>
